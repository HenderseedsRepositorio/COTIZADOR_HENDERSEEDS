    return {
      aplicador: $('ot-aplicador').value.trim(),
      fecha: $('ot-fecha').value,
      tipo: App.getTipo(),
      costoLabor: App.getCostoLabor(),
      notas: $('ot-notas').value.trim(),
      aplicaciones: aplicaciones,
      campana: data.campana,
    };
  },

  exportarPDF() {
    App._generatePDF(App._buildPDFOrder());
  },

  exportarOrdenPDF(oid) {
    const o = data.ordenes.find(x => x.id === oid);
    if (!o) return;
    App._generatePDF(o);
  },

  _generatePDF(o) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const W = 210, margin = 14, contentW = W - margin * 2;

    const apps = o.aplicaciones || [];
    const cid = apps[0]?.campoId || '';
    const campo = data.campos.find(c => c.id === cid);
    const fecha = o.fecha ? new Date(o.fecha + 'T12:00:00').toLocaleDateString('es-AR') : dateStr();

    const navy = [13, 45, 94];
    const accent = [45, 111, 196];
    const gris = [100, 116, 139];
    const cols = [margin, margin + 90, margin + 120];

    let y = 15;

    // Header
    doc.setFillColor(...navy);
    doc.rect(0, 0, W, 32, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(16);
    doc.text('ORDEN DE TRABAJO', margin, 14);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'normal');
    doc.text(fecha, margin, 22);
    doc.text('Henderseeds SRL', W - margin, 14, { align: 'right' });
    doc.text('Campana ' + (o.campana || data.campana), W - margin, 22, { align: 'right' });

    y = 40;

    doc.setTextColor(...navy); doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.text('Campo:', margin, y); doc.setFont('helvetica', 'normal'); doc.text(campo?.nombre || '--', margin + 20, y);
    doc.setFont('helvetica', 'bold'); doc.text('Aplicador:', W / 2, y); doc.setFont('helvetica', 'normal'); doc.text(o.aplicador || '--', W / 2 + 24, y);
    y += 6;
    doc.setFont('helvetica', 'bold'); doc.text('Labor:', margin, y); doc.setFont('helvetica', 'normal'); doc.text(o.tipo || '--', margin + 20, y);
    y += 10;

    const allProds = {};
    apps.forEach((app, ai) => {
      if (y > 250) { doc.addPage(); y = 15; }
      const appCampo = data.campos.find(c => c.id === (app.campoId || cid));
      const lote = appCampo?.lotes.find(l => l.id === app.loteId);
      const has = app.hectareas || 0;

      doc.setFillColor(...accent);
      doc.rect(margin, y, contentW, 7, 'F');
      doc.setTextColor(255, 255, 255); doc.setFont('helvetica', 'bold'); doc.setFontSize(8);
      doc.text((lote?.nombre || 'Lote ?') + ' · ' + has + ' has' + (app.cultivo ? ' · ' + app.cultivo : ''), margin + 3, y + 5);
      y += 9;

      doc.setFillColor(240, 244, 251); doc.rect(margin, y, contentW, 7, 'F');
      doc.setTextColor(...navy); doc.setFont('helvetica', 'bold'); doc.setFontSize(7.5);
      doc.text('PRODUCTO', cols[0] + 3, y + 4.5);
      doc.text('DOSIS', cols[1] + 2, y + 4.5);
      doc.text('VOL. TOTAL', cols[2] + 2, y + 4.5);
      y += 7;

      (app.productos || []).forEach((r, i) => {
        if (y > 265) { doc.addPage(); y = 15; }
        if (i % 2 === 0) { doc.setFillColor(248, 250, 252); doc.rect(margin, y, contentW, 7, 'F'); }
        const vol = has > 0 ? fmt(r.dosis * has) + ' ' + (r.unidad || 'L') : '--';

        doc.setTextColor(...navy); doc.setFont('helvetica', 'normal'); doc.setFontSize(7.5);
        const nombre = r.producto.length > 40 ? r.producto.substring(0, 38) + '...' : r.producto;
        doc.text(nombre, cols[0] + 3, y + 4.5);
        doc.text(r.dosis + ' ' + (r.unidad || 'L') + '/ha', cols[1] + 2, y + 4.5);
        doc.setFont('helvetica', 'bold');
        doc.text(vol, cols[2] + 2, y + 4.5);
        y += 7;

        const key = r.producto;
        if (!allProds[key]) allProds[key] = { producto: r.producto, unidad: r.unidad || 'L', totalVol: 0 };
        allProds[key].totalVol += has > 0 ? r.dosis * has : 0;
      });
      y += 4;
    });

    if (apps.length > 1 && Object.keys(allProds).length) {
      if (y > 240) { doc.addPage(); y = 15; }
      y += 2;
      doc.setFillColor(...navy); doc.rect(margin, y, contentW, 8, 'F');
      doc.setTextColor(255, 255, 255); doc.setFont('helvetica', 'bold'); doc.setFontSize(8);
      doc.text('RESUMEN RETIRO TOTAL', margin + 3, y + 5.5);
      doc.text('VOL. TOTAL', cols[2] + 2, y + 5.5);
      y += 8;

      Object.values(allProds).forEach((p, i) => {
        if (y > 265) { doc.addPage(); y = 15; }
        if (i % 2 === 0) { doc.setFillColor(248, 250, 252); doc.rect(margin, y, contentW, 7, 'F'); }
        doc.setTextColor(...navy); doc.setFont('helvetica', 'normal'); doc.setFontSize(7.5);
        doc.text(p.producto, cols[0] + 3, y + 4.5);
        doc.setFont('helvetica', 'bold');
        doc.text(p.totalVol > 0 ? fmt(p.totalVol) + ' ' + p.unidad : '--', cols[2] + 2, y + 4.5);
        y += 7;
      });
      y += 4;
    }

    if (o.notas) {
      if (y > 260) { doc.addPage(); y = 15; }
      doc.setFontSize(8); doc.setTextColor(...navy); doc.setFont('helvetica', 'bold');
      doc.text('Notas:', margin, y + 4);
      doc.setFont('helvetica', 'normal'); doc.setTextColor(...gris);
      const lines = doc.splitTextToSize(o.notas, contentW - 20);
      doc.text(lines, margin + 16, y + 4);
      y += 4 + lines.length * 4;
    }

    doc.setFontSize(7); doc.setTextColor(...gris); doc.setFont('helvetica', 'italic');
    doc.text('Henderseeds SRL -- ' + fecha, margin, y + 6);

    const fileName = 'OT_' + (campo?.nombre || 'orden').replace(/\s+/g, '_') + '.pdf';
    try {
      const pdfBlob = doc.output('blob');
      const file = new File([pdfBlob], fileName, { type: 'application/pdf' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: 'Orden de Trabajo' });
      } else {
        doc.save(fileName);
      }
    } catch(err) {
      if (err.name !== 'AbortError') doc.save(fileName);
    }
  },

  /* ── Delete order ── */
  deleteOrden(oid) {
    if (!confirm('Eliminar esta orden?')) return;
    data.ordenes = data.ordenes.filter(o => o.id !== oid);
    Storage.save(data);
    App.renderOrdenes();
  },
};

/* ── Init ── */
document.addEventListener('DOMContentLoaded', () => {
  App.init();

  $('ordenes-list').addEventListener('click', e => {
    const btn = e.target.closest('[data-oid][data-estado]');
    if (btn) {
      e.stopPropagation();
      App.cambiarEstadoOrden(btn.dataset.oid, btn.dataset.estado);
    }
  });

  // Update totals when labor cost changes
  $('ot-costo-labor').addEventListener('input', () => App._renderTotales());
});
</script>
</body>
</html>
