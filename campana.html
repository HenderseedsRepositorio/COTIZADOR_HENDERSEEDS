<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento de Campaña — Henderseeds</title>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0d2d5e;
  --navy-light: #1a4a8a;
  --navy-sky: #2d6fc4;
  --accent: #2d6fc4;
  --accent-dark: #1a4a8a;
  --accent-bg: #e8f0fe;
  --accent-light: #5b9af5;
  --green: #16a34a;
  --green-bg: #dcfce7;
  --orange: #d97706;
  --orange-bg: #fef3c7;
  --red: #ef4444;
  --bg: #f0f4fb;
  --card: #ffffff;
  --border: #e2e8f0;
  --text: #0d2033;
  --text-sec: #64748b;
  --text-mut: #94a3b8;
  --radius: 14px;
  --radius-sm: 9px;
  --shadow: 0 2px 14px rgba(13,45,94,.08), 0 1px 3px rgba(13,45,94,.04);
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --title: 'Archivo Black', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.4; -webkit-font-smoothing: antialiased; padding-bottom: 70px; }
input, select, button, textarea { font-family: inherit; font-size: inherit; }
.main { max-width: 920px; margin: 0 auto; padding: 8px 8px 52px; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.status-bar { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 4px 0 6px; font-size: .7rem; color: var(--text-mut); }
.tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 8px; }
.tab-btn { flex: 1; background: none; border: none; border-bottom: 3px solid transparent; color: var(--text-mut); font-size: .72rem; font-weight: 500; padding: 10px 2px; cursor: pointer; transition: all .2s; font-family: var(--font); margin-bottom: -2px; white-space: nowrap; }
.tab-btn.active { border-bottom-color: var(--accent); color: var(--navy); font-weight: 700; }
.card { background: var(--card); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow); }
.inp { width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; background: white; color: var(--text); outline: none; transition: border-color .15s, box-shadow .15s; }
.inp:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(45,111,196,.12); }
.inp-sm { padding: 6px 8px; font-size: 13px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.form-lbl { font-size: .7rem; font-weight: 700; color: var(--accent-dark); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 5px; }
textarea.inp { resize: vertical; min-height: 60px; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 13px 18px; border: none; border-radius: 99px; font-size: .82rem; font-weight: 700; cursor: pointer; font-family: var(--font); transition: opacity .15s; }
.btn:hover { opacity: .87; }
.btn-accent { background: var(--accent); color: white; }
.btn-green { background: #25d366; color: white; }
.btn-outline { background: var(--navy-light); color: #fff; }
.btn-danger { background: var(--red); color: white; }
.btn-sm { font-size: .7rem; padding: 6px 14px; }
.btn-add { width: 100%; padding: 12px; border: 2px dashed var(--accent); border-radius: var(--radius); background: var(--accent-bg); color: var(--accent-dark); font-weight: 700; font-size: .8rem; cursor: pointer; margin-bottom: 10px; transition: all .15s; }
.btn-add:hover { background: var(--accent); color: white; }
.chip-bar { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.chip { flex: 1; min-width: 0; padding: 8px 6px; border-radius: 10px; font-size: .7rem; font-weight: 700; border: 1.5px solid var(--border); background: white; cursor: pointer; text-align: center; transition: all .15s; line-height: 1.2; font-family: var(--font); }
.chip.active { background: var(--accent); color: white; border-color: var(--accent); }
.chip.green.active { background: var(--green); border-color: var(--green); }
.chip.orange.active { background: var(--orange); border-color: var(--orange); }
.ot-productos-detail { font-size:12px; color:var(--text-sec); margin-top:6px; }
.ot-productos-detail table { width:100%; border-collapse:collapse; }
.ot-productos-detail th { font-weight:600; color:var(--text-mut); font-size:11px; text-transform:uppercase; padding:2px 4px 2px 0; }
.ot-productos-detail td { padding:3px 4px 3px 0; font-family:var(--mono); font-size:11px; }
.ot-productos-detail td:first-child { font-family:var(--font); font-weight:500; color:var(--text); }
.ot-card-wrap { display:flex; gap:0; }
.ot-card-main { flex:1; min-width:0; }
.ot-status-col { display:flex; flex-direction:column; gap:5px; padding:10px 0 10px 12px; border-left:2px solid var(--bg); margin-left:10px; justify-content:center; min-width:62px; }
.ot-status-col button { border:2px solid transparent; border-radius:8px; padding:6px 10px; font-size:11px; font-weight:700; cursor:pointer; opacity:.35; transition:all .15s; white-space:nowrap; text-align:center; }
.ot-status-col button:hover { opacity:.65; }
.ot-status-col button.active { opacity:1; transform:scale(1.08); box-shadow:0 2px 8px rgba(0,0,0,.2); }
.ot-status-col .st-pend { background:#fff8e1; color:#856404; }
.ot-status-col .st-pend.active { background:#ffc107; color:#fff; border-color:#e6ac00; }
.ot-status-col .st-curso { background:#e3f2fd; color:#004085; }
.ot-status-col .st-curso.active { background:#1976d2; color:#fff; border-color:#1565c0; }
.ot-status-col .st-comp { background:#e8f5e9; color:var(--green); }
.ot-status-col .st-comp.active { background:#388e3c; color:#fff; border-color:#2e7d32; }
.ot-section-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--accent); padding:6px 0 2px; }
.app-block { border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px; margin-bottom:6px; position:relative; z-index:1; }
.app-block.active-app { z-index:20; }
.app-block-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.app-block-title { font-family:var(--title); font-size:13px; font-weight:700; color:var(--navy); text-transform:uppercase; }
.app-block-rm { background:none; border:none; font-size:16px; color:var(--text-mut); cursor:pointer; padding:2px 6px; }
.app-block-rm:hover { color:var(--orange); }

/* ── Lote chips in app block ── */
.app-lotes-list { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
.app-lote-chip {
  display:inline-flex; align-items:center; gap:4px;
  background:var(--accent-bg); border:1px solid var(--accent); border-radius:8px;
  padding:4px 8px; font-size:12px; font-weight:600; color:var(--navy);
}
.app-lote-chip .chip-has {
  font-family:var(--mono); color:var(--accent-dark);
  width:62px; padding:4px 6px; font-size:13px; border:1px solid var(--accent); border-radius:4px;
  text-align:right; background:white; outline:none;
}
.app-lote-chip .chip-has:focus { border-color:var(--navy); background:var(--accent-bg); }
.app-lote-chip .chip-rm { background:none; border:none; font-size:14px; color:var(--text-mut); cursor:pointer; padding:0 2px; line-height:1; }
.app-lote-chip .chip-rm:hover { color:var(--red); }
.app-total-has { font-size:12px; font-weight:700; color:var(--accent-dark); margin-top:6px; font-family:var(--mono); }

.dropdown { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius-sm) var(--radius-sm); max-height: 250px; overflow-y: auto; z-index: 50; box-shadow: 0 8px 24px rgba(0,0,0,.12); display: none; }
.dropdown.show { display: block; }
.dd-cat { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--accent); padding: 8px 12px 4px; background: var(--bg); }
.dd-item { padding: 8px 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 13px; border-bottom: 1px solid var(--bg); }
.dd-item:hover, .dd-item.highlighted { background: var(--accent-bg); }
.rows-scroll { overflow-x: auto; margin: 0 -12px; padding: 0 12px; }
.rows-header { display: grid; grid-template-columns: 1fr 68px 62px 58px 62px 68px 24px; gap: 6px; padding: 6px 10px; font-size: 10px; font-weight: 700; color: var(--text-sec); text-transform: uppercase; letter-spacing: .3px; }
.row-item { display: grid; grid-template-columns: 1fr 68px 62px 58px 62px 68px 24px; gap: 6px; align-items: center; background: var(--card); border-radius: var(--radius-sm); padding: 10px; margin-bottom: 6px; box-shadow: var(--shadow); animation: slideIn .2s ease; min-height: 48px; }
.row-inp { width: 100%; padding: 3px 4px; border: 1px solid var(--border); border-radius: 4px; font-family: var(--mono); font-size: 12px; font-weight: 600; text-align: right; color: var(--text); background: white; outline: none; }
.row-inp:focus { border-color: var(--accent); background: var(--accent-bg); }
.row-new { display: grid; grid-template-columns: 1fr 68px 62px 58px 62px 68px 24px; gap: 6px; align-items: center; background: var(--bg); border: 1px dashed var(--border); border-radius: var(--radius-sm); padding: 8px 10px; margin-bottom: 5px; position: relative; }
.row-new-search { position: static; }
.row-new-search input { width: 100%; padding: 5px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; font-family: var(--font); outline: none; background: white; }
.row-new-search input:focus { border-color: var(--accent); }
.row-new-search input::placeholder { color: var(--text-mut); }
.app-dropdown .dropdown { left: 0; right: 0; top: 100%; }
.row-prod { display: flex; flex-direction: column; min-width: 0; }
.row-prod-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-prod-meta { font-size: 10px; color: var(--text-mut); }
.row-val { font-family: var(--mono); font-size: 12px; font-weight: 500; text-align: right; }
.row-val.costo { color: var(--accent); font-weight: 700; font-size: 13px; }
.row-rm { background: none; border: none; color: var(--text-mut); font-size: 16px; cursor: pointer; padding: 2px; line-height: 1; text-align: center; min-width:34px; min-height:34px; display:flex; align-items:center; justify-content:center; }
.row-rm:hover { color: var(--red); }
.ot-totales { background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 55%, var(--navy-sky) 100%); color: white; border-radius: var(--radius); padding: 14px 18px; margin-top: 8px; }
.ot-tot-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: .78rem; }
.ot-tot-row span:first-child { opacity: .7; font-size: .72rem; }
.ot-tot-row.big { border-top: 1px solid rgba(255,255,255,.15); margin-top: 6px; padding-top: 8px; font-size: 1.05rem; font-weight: 700; }
.ot-tot-row.big span:first-child { opacity: 1; }
.ot-tot-mono { font-family: var(--mono); }
.lote-card { border-left: 4px solid var(--accent); }
.badge { display:inline-block; font-size:9px; font-weight:700; padding:2px 6px; border-radius:4px; text-transform:uppercase; letter-spacing:.3px; }
.badge-pendiente { background:#fff8e1; color:#856404; }
.badge-en_curso { background:#e3f2fd; color:#1565c0; }
.badge-completada { background:#e8f5e9; color:#2e7d32; }
.ot-card { cursor: pointer; transition: border-color .15s; border: 1.5px solid transparent; border-left: 4px solid var(--text-mut); }
.ot-card.estado-pendiente { border-left-color: #ffc107; }
.ot-card.estado-en_curso { border-left-color: #1976d2; }
.ot-card.estado-completada { border-left-color: #388e3c; }
.ot-card:hover { border-color: var(--accent); }
.ot-detail { font-size: 12px; color: var(--text-sec); line-height: 1.5; }
.bar-chart { margin: 12px 0; }
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.bar-label { font-size: 12px; font-weight: 600; width: 100px; flex-shrink: 0; }
.bar-track { flex: 1; height: 22px; background: var(--bg); border-radius: 6px; overflow: hidden; position: relative; }
.bar-fill { height: 100%; border-radius: 6px; transition: width .4s ease; display: flex; align-items: center; padding-left: 6px; }
.bar-fill span { font-size: 10px; font-weight: 700; color: white; white-space: nowrap; }
.bar-amount { font-family: var(--mono); font-size: 12px; font-weight: 600; width: 80px; text-align: right; flex-shrink: 0; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.stat-box { background: var(--bg); border-radius: var(--radius-sm); padding: 12px; text-align: center; }
.stat-val { font-family: var(--mono); font-size: 1.2rem; font-weight: 700; color: var(--navy); }
.stat-lbl { font-size: .7rem; color: var(--text-sec); text-transform: uppercase; font-weight: 700; letter-spacing: .3px; margin-top: 2px; }
.wa-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 936px; background: white; border-top: 1px solid var(--border); padding: 10px 8px; display: none; gap: 8px; z-index: 90; }
.wa-bar .btn { flex: 1; }
.modal-overlay { position: fixed; inset: 0; background: rgba(13,45,94,.5); display: none; align-items: center; justify-content: center; z-index: 200; padding: 16px; backdrop-filter: blur(2px); }
.modal-overlay.show { display: flex; }
.modal { background: var(--card); border-radius: var(--radius); padding: 20px; width: 100%; max-width: 420px; box-shadow: 0 16px 48px rgba(0,0,0,.25); animation: fadeUp .2s ease both; max-height: 90vh; overflow-y: auto; }
.modal-title { font-family: var(--title); font-size: 14px; color: var(--navy); text-transform: uppercase; margin-bottom: 14px; }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; }
.modal-actions .btn { flex: 1; }
.backup-bar { display: flex; gap: 6px; margin-bottom: 10px; align-items: center; justify-content: flex-end; }
.backup-bar .btn { font-size: .7rem; padding: 5px 12px; }
.backup-file-input { display: none; }
.toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:var(--navy); color:white; padding:10px 22px; border-radius:99px; font-size:13px; font-weight:600; z-index:999; animation:toastIn .3s ease, toastOut .3s ease 2.2s forwards; pointer-events:none; white-space:nowrap; box-shadow:0 4px 16px rgba(0,0,0,.25); }
@keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
@keyframes toastOut { to { opacity:0; transform:translateX(-50%) translateY(-10px); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
.fu { animation: fadeUp .26s ease both; }
.empty { text-align: center; padding: 40px 20px; color: var(--text-mut); }
.empty-icon { font-size: 32px; margin-bottom: 8px; }
@media (max-width: 639px) {
  .status-bar { flex-wrap: wrap; justify-content: center; gap: 4px 10px; }
  .rows-header { display: none; }
  .row-item { display: flex; flex-wrap: wrap; gap: 4px 8px; min-width: 0; grid-template-columns: none; }
  .row-item .row-prod { width: calc(100% - 30px); }
  .row-item .row-inp { width: 72px; font-size: 13px; padding: 5px 6px; }
  .row-item .row-val { font-size: 11px; }
  .row-item .row-rm { margin-left: auto; }
  .row-mob-line { display: flex; width: 100%; gap: 6px; align-items: center; justify-content: space-between; }
  .row-new { display: flex; gap: 6px; min-width: 0; grid-template-columns: none; }
  .row-new .row-new-search { flex: 1; }
  .row-new .row-val, .row-new > span:last-child { display: none; }
  .wa-bar { padding: 8px 6px; gap: 6px; }
  .wa-bar .btn { font-size: .72rem; padding: 10px 8px; }
  .bar-label { width: 70px; font-size: 11px; }
  .bar-amount { width: 65px; font-size: 11px; }
  .ot-actions { flex-wrap: wrap; }
  .ot-actions .btn { min-height: 40px; }
  .ot-actions .btn-danger { margin-left: auto; }
}
@media (min-width: 640px) { .row-mob-line { display: contents; } }
@media (max-width: 380px) { body { font-size: 14px; } .tab-btn { font-size: .7rem; padding: 9px 2px; } .card { padding: 10px; } }
</style>
</head>
<body>

<div class="modal-overlay" id="modal-overlay"><div class="modal" id="modal-body"></div></div>

<div class="main">
  <div class="card fu" style="padding:8px 16px;margin-bottom:2px;display:flex;align-items:center;justify-content:space-between;">
    <span style="font-family:var(--title);font-size:11px;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;">Seguimiento Campana</span>
    <img src="assets/logo-henderseeds.png" alt="Henderseeds" style="height:30px;width:auto;object-fit:contain;">
  </div>

  <!-- Login -->
  <div id="productor-gate" class="card fu" style="text-align:center;padding:30px 20px;margin-top:20px;max-width:360px;margin-left:auto;margin-right:auto;">
    <div style="font-family:var(--title);font-size:16px;color:var(--navy);text-transform:uppercase;margin-bottom:6px;">Seguimiento de Lotes</div>
    <div style="font-size:13px;color:var(--text-sec);margin-bottom:16px;">Seleccioná tu usuario</div>
    <div id="user-buttons" style="display:flex;flex-direction:column;gap:8px;max-width:240px;margin:0 auto;"></div>
  </div>

  <div id="app-main" style="display:none;">
  <div class="status-bar">
    <span style="font-weight:700;font-size:.7rem;color:var(--navy);">Seguimiento</span>
    <span id="productor-label" style="font-weight:700;font-size:.7rem;color:var(--navy);cursor:pointer;" onclick="App.logoutProductor()"></span>
    <span>Campana: <select id="campana-select" style="border:none;background:none;color:var(--navy-sky);font-weight:700;font-size:.7rem;font-family:var(--font);cursor:pointer;">
    </select></span>
    <span style="display:inline-flex;align-items:center;gap:3px;"><span id="status-dot" style="width:7px;height:7px;border-radius:50%;background:var(--text-mut);display:inline-block;"></span><span id="status-text" style="font-size:.7rem;font-weight:600;">Datos locales</span></span>
  </div>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="lotes">Lotes</button>
    <button class="tab-btn" data-tab="nueva-ot">Nueva OT</button>
    <button class="tab-btn" data-tab="ordenes">Ordenes</button>
    <button class="tab-btn" data-tab="analisis">Analisis</button>
  </nav>

  <section id="tab-lotes" class="tab-content active">
    <div class="backup-bar">
      <button class="btn btn-sm btn-outline" onclick="App.exportData()">Descargar backup</button>
      <button class="btn btn-sm btn-accent" onclick="document.getElementById('import-file').click()">Restaurar</button>
      <input type="file" id="import-file" class="backup-file-input" accept=".json" onchange="App.importData(this)">
    </div>
    <div id="lotes-list"></div>
    <button class="btn-add" onclick="App.openLoteModal()">+ Agregar Lote</button>
  </section>

  <section id="tab-nueva-ot" class="tab-content">
    <div class="card fu" style="margin-bottom:6px;position:relative;z-index:30;">
      <div class="form-row" style="margin-bottom:8px;">
        <div><label class="form-lbl" for="ot-fecha">Fecha aplicacion</label><input type="date" id="ot-fecha" class="inp inp-sm"></div>
        <div style="position:relative;"><label class="form-lbl" for="ot-aplicador">Aplicador</label>
          <input type="text" id="ot-aplicador" class="inp inp-sm" placeholder="Nombre..." autocomplete="off" oninput="App.filterAplicadores()" onfocus="App.filterAplicadores(true)">
          <div class="dropdown" id="aplicador-dd" style="z-index:60;"></div>
        </div>
      </div>
      <div class="form-row">
        <div style="position:relative;"><label class="form-lbl" for="ot-tipo">Tipo de labor</label>
          <input type="text" id="ot-tipo" class="inp inp-sm" value="Pulverizacion terrestre" placeholder="Ej: Pulverizacion..." autocomplete="off" oninput="App.filterTipos()" onfocus="App.filterTipos(true)">
        </div>
        <div><label class="form-lbl" for="ot-costo-labor">Costo labor USD/ha</label>
          <input type="number" inputmode="decimal" id="ot-costo-labor" class="inp inp-sm" value="" placeholder="0.00" step="0.01" min="0" style="font-family:var(--mono);">
        </div>
      </div>
    </div>
    <div id="ot-apps-container"></div>
    <button class="btn btn-outline" style="width:100%;margin:8px 0;border-style:dashed;" onclick="App.addAplicacion()">+ Agregar Aplicacion</button>
    <div id="ot-resumen" class="card fu" style="display:none;"></div>
    <div id="ot-totales" class="ot-totales" style="display:none;"></div>
    <div class="card fu" style="margin-top:6px;">
      <label class="form-lbl" for="ot-notas">Notas</label>
      <textarea id="ot-notas" class="inp inp-sm" placeholder="Instrucciones, condiciones climaticas..." rows="2"></textarea>
      <label class="form-lbl" style="margin-top:10px;">Estado</label>
      <div class="chip-bar" id="ot-estado-bar">
        <button class="chip orange active" data-estado="pendiente" onclick="App.setEstado(this)">Pendiente</button>

<script>
const $ = id => document.getElementById(id);
const fmt = n => Number(n).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtInt = n => Number(n).toLocaleString('es-AR', { maximumFractionDigits: 0 });
const dateStr = (d = new Date()) => d.toLocaleDateString('es-AR');
const dateISO = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML.replace(/'/g, '&#39;'); }
function showToast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2600); }

const Storage = {
  _counter: 0,
  _productorKey() { return 'sc_data_' + (currentProductor || 'default'); },
  defaults() { return { lotes: [], ordenes: [], aplicadores: [], campana: '2025/26' }; },
  load() {
    try { const d = JSON.parse(localStorage.getItem(this._productorKey())); if (d && (d.lotes || d.campos || d.campolotes)) return d; } catch(e) {}
    // Fallback: try old key for migration
    try { const d = JSON.parse(localStorage.getItem('sc_data')); if (d && (d.lotes || d.campos)) return d; } catch(e) {}
    return this.defaults();
  },
  save(d) { localStorage.setItem(this._productorKey(), JSON.stringify(d)); Cloud.queueSync(); },
  nextId(prefix) { return prefix + '_' + Date.now() + '_' + (++this._counter); }
};

const API_URL = 'https://script.google.com/macros/s/AKfycbyoK9r8Scj6WBhl_XUUiAU_kcpTVtGKSlDH9WHmVlRGNo-jt-QbLqlg5BNY5RGAhHV8kw/exec';
function debounce(fn, ms) { let t; return function(...a) { clearTimeout(t); t = setTimeout(() => fn.apply(this, a), ms); }; }
const debouncedRenderOrdenes = debounce(() => App.renderOrdenes(), 200);
let catalogo = JSON.parse(localStorage.getItem('sc_catalogo_cache') || 'null') || {};
async function loadCatalog() {
  try { const res = await fetch(API_URL + '?action=getCatalogoAgro&_t=' + Date.now(), { cache: 'no-store' }); const d = await res.json();
    if (d.ok && d.catalogo) { catalogo = d.catalogo; localStorage.setItem('sc_catalogo_cache', JSON.stringify(catalogo)); }
  } catch(e) {}
}

/* ══════════════════════════════════════
   CLOUD SYNC (Google Sheets)
   ══════════════════════════════════════ */
const Cloud = {
  _syncTimer: null,
  _syncing: false,

  setStatus(msg, isError) {
    const el = $('status-text'), dot = $('status-dot');
    if (el) { el.textContent = msg; el.style.color = isError ? 'var(--red)' : ''; }
    if (dot) {
      if (isError) dot.style.background = 'var(--red)';
      else if (msg.startsWith('Guardado') || msg === 'Datos cargados') dot.style.background = 'var(--green)';
      else if (msg.startsWith('Guardando') || msg.startsWith('Cargando')) dot.style.background = 'var(--orange)';
      else dot.style.background = 'var(--text-mut)';
    }
  },

  // Debounced sync — waits 3s after last change before syncing
  queueSync() {
    if (!currentProductor) return;
    if (Cloud._syncTimer) clearTimeout(Cloud._syncTimer);
    Cloud._syncTimer = setTimeout(() => Cloud.saveToCloud(), 3000);
    Cloud.setStatus('Cambios sin guardar...');
  },

  async saveToCloud() {
    if (!currentProductor || Cloud._syncing) return;
    Cloud._syncing = true;
    Cloud.setStatus('Guardando...');
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'saveCampana', productor: currentProductor, data })
      });
      const result = await res.json();
      if (result.ok) {
        Cloud.setStatus('Guardado ' + new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }));
      } else {
        Cloud.setStatus('Error: ' + (result.error || '?'), true);
      }
    } catch(e) {
      Cloud.setStatus('Sin conexion (local OK)', true);
    }
    Cloud._syncing = false;
  },

  async loadFromCloud() {
    if (!currentProductor) return null;
    Cloud.setStatus('Cargando...');
    try {
      const res = await fetch(API_URL + '?action=loadCampana&productor=' + encodeURIComponent(currentProductor) + '&_t=' + Date.now(), { cache: 'no-store' });
      const result = await res.json();
      if (result.ok && result.data) {
        Cloud.setStatus('Datos cargados');
        return result.data;
      } else if (result.ok && result.isNew) {
        Cloud.setStatus('Productor nuevo');
        return null;
      } else {
        Cloud.setStatus('Error al cargar', true);
        return null;
      }
    } catch(e) {
      Cloud.setStatus('Offline — datos locales', true);
      return null;
    }
  },

  async loadProductores() {
    try {
      const res = await fetch(API_URL + '?action=listProductores&_t=' + Date.now(), { cache: 'no-store' });
      const result = await res.json();
      if (result.ok) return result.productores || [];
    } catch(e) {}
    return [];
  }
};

/* ══════════════════════════════════════
   PRODUCTOR LOGIN
   ══════════════════════════════════════ */
let currentProductor = '';
const USUARIOS = [
  { id: 'JAM', nombre: 'JAM', productor: 'Juan Augusto' },
  { id: 'Ginar', nombre: 'Ginar', productor: 'Ginar' },
  { id: 'DMyAG', nombre: 'DM y AG', productor: 'DMyAG' },
  { id: 'FabioyTomas', nombre: 'Fabio y Tomas', productor: 'FabioyTomas' }
];
const savedUserId = localStorage.getItem('sc_user_id');

function migrateData(d) {
  if (!d) return Storage.defaults();
  if (d.campos && !d.lotes) {
    d.lotes = [];
    d.campos.forEach(c => (c.lotes || []).forEach(l => d.lotes.push({ id: l.id, nombre: c.nombre + ', ' + l.nombre, hectareas: l.hectareas || 0, cultivo: l.cultivo || '' })));
    delete d.campos; delete d.campolotes;
  }
  if (d.campolotes && !d.lotes) {
    d.lotes = d.campolotes.map(cl => ({ id: cl.id, nombre: cl.campo + ', ' + cl.lote, hectareas: cl.hectareas || 0, cultivo: cl.cultivo || '' }));
    delete d.campolotes;
  }
  if (!d.lotes) d.lotes = [];
  d.ordenes = d.ordenes || [];
  d.ordenes.forEach(o => {
    if (!o.aplicaciones && o.productos) o.aplicaciones = [{ lotes: [{ loteId: o.loteId || '', hectareas: o.hectareas, cultivo: o.cultivo }], productos: o.productos }];
    if (o.aplicaciones) o.aplicaciones.forEach(a => {
      if (!a.lotes) { a.lotes = a.loteId ? [{ loteId: a.loteId, hectareas: a.hectareas || 0, cultivo: a.cultivo || '' }] : []; delete a.loteId; delete a.hectareas; delete a.cultivo; }
    });
  });
  return d;
}

let data = Storage.defaults();

// Migration runs inside migrateData() on login

// Helper: total has for an aplicacion
function appTotalHas(a) { return (a.lotes || []).reduce((s, l) => s + (l.hectareas || 0), 0); }

let editingOrdenId = null, aplicaciones = [], currentAppIdx = 0, currentOTRows = [];
let rowIdCounter = 0, filtroOT = 'todas', highlightIdx = -1, ddItems = [];
let aplicadorHighlight = -1, aplicadorMatches = [], formDirty = false;

function openModal(html) { $('modal-body').innerHTML = html; $('modal-overlay').classList.add('show'); const f = $('modal-body').querySelector('input,select,textarea'); if (f) setTimeout(() => f.focus(), 50); }
function closeModal() { $('modal-overlay').classList.remove('show'); $('modal-body').innerHTML = ''; }
document.addEventListener('click', e => { if (e.target.id === 'modal-overlay') closeModal(); });

/* ══════════════════════════════════════
   APP
   ══════════════════════════════════════ */
const App = {
  async loginProductor(userId) {
    const u = USUARIOS.find(x => x.id === userId);
    if (!u) return;

    // Remember selection
    localStorage.setItem('sc_user_id', userId);

    currentProductor = u.productor;
    localStorage.setItem('sc_productor', u.productor);

    // Disable buttons while loading
    document.querySelectorAll('#user-buttons button').forEach(b => { b.disabled = true; b.style.opacity = '0.5'; });
    const activeBtn = document.querySelector(`#user-buttons button[data-uid="${userId}"]`);
    if (activeBtn) { activeBtn.textContent = 'Cargando...'; activeBtn.style.opacity = '1'; }

    try {
      const cloudData = await Cloud.loadFromCloud();
      if (cloudData) {
        data = migrateData(cloudData);
        Storage.save(data);
        if (Cloud._syncTimer) { clearTimeout(Cloud._syncTimer); Cloud._syncTimer = null; }
      } else {
        data = migrateData(Storage.load());
      }

      // Auto-import initial data for JAM if empty
      if (userId === 'JAM' && (!data.ordenes || !data.ordenes.length) && typeof JAM_INITIAL_DATA !== 'undefined') {
        data = JAM_INITIAL_DATA;
        Storage.save(data);
        Cloud.saveToCloud();
      }

      $('productor-gate').style.display = 'none';
      $('app-main').style.display = '';
      $('productor-label').textContent = u.nombre + ' ▾';

      App.init();
    } finally {
      document.querySelectorAll('#user-buttons button').forEach(b => { b.disabled = false; b.style.opacity = '1'; b.textContent = USUARIOS.find(x => x.id === b.dataset.uid)?.nombre || ''; });
    }
  },

  logoutProductor() {
    if (formDirty && !confirm('Hay cambios sin guardar. Salir?')) return;
    if (Cloud._syncTimer) { clearTimeout(Cloud._syncTimer); Cloud._syncTimer = null; }
    Cloud.saveToCloud();
    currentProductor = '';
    localStorage.removeItem('sc_productor');
    localStorage.removeItem('sc_user_id');
    $('productor-gate').style.display = '';
    $('app-main').style.display = 'none';
    formDirty = false;
  },


  init() {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
      if (formDirty && btn.dataset.tab !== 'nueva-ot') { if (!confirm('Hay una OT sin guardar. Salir de todos modos?')) return; }
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active'); $('tab-' + btn.dataset.tab).classList.add('active');
      if (btn.dataset.tab === 'ordenes') App.renderOrdenes();
      if (btn.dataset.tab === 'analisis') App.renderAnalisis();
      if (btn.dataset.tab === 'nueva-ot') App.refreshSelectors();
    }));
    document.addEventListener('click', e => {
      if (!e.target.closest('.row-new-search') && !e.target.closest('#ot-dropdown')) App.hideDropdown();
      if (!e.target.closest('#ot-aplicador') && !e.target.closest('#aplicador-dd')) App.hideAplicadorDD();
      if (!e.target.closest('#ot-tipo') && !e.target.closest('#tipo-dd')) App.hideTipoDD();
    });
    let lastScrollY = window.scrollY;
    window.addEventListener('scroll', () => {
      const dd = $('ot-dropdown');
      if (dd.classList.contains('show')) {
        const activeInput = document.querySelector('.app-block.active-app .app-search');
        if (activeInput) {
          const rect = activeInput.getBoundingClientRect();
          dd.style.top = rect.bottom + 'px';
          dd.style.left = rect.left + 'px';
          dd.style.width = rect.width + 'px';
        }
        if (Math.abs(window.scrollY - lastScrollY) > 50) {
          App.hideDropdown();
        }
      }
      if (Math.abs(window.scrollY - lastScrollY) > 50) {
        App.hideAplicadorDD(); App.hideTipoDD();
        lastScrollY = window.scrollY;
      }
    }, true);
    document.addEventListener('keydown', e => {
      const inp = e.target.closest('.app-search');
      if (!inp) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); App.moveHighlight(1); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); App.moveHighlight(-1); }
      else if (e.key === 'Enter') { e.preventDefault(); if (highlightIdx >= 0) App.selectFromDropdown(highlightIdx); else if (inp.value.trim()) App.addManual(inp.value.trim()); }
      else if (e.key === 'Escape') App.hideDropdown();
    });
    $('ot-aplicador').addEventListener('keydown', e => {
      const dd = $('aplicador-dd'); if (!dd.classList.contains('show')) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); App.moveAplicadorHighlight(1); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); App.moveAplicadorHighlight(-1); }
      else if (e.key === 'Enter') { e.preventDefault(); App.selectAplicadorHighlight(); }
      else if (e.key === 'Escape') App.hideAplicadorDD();
    });
    const cs = $('campana-select');
    const y = new Date().getFullYear();
    for (let i = y - 3; i <= y + 1; i++) { const v = `${i}/${String(i+1).slice(2)}`; const o = document.createElement('option'); o.value = v; o.textContent = v; cs.appendChild(o); }
    if (data.campana && !cs.querySelector(`option[value="${data.campana}"]`)) { const o = document.createElement('option'); o.value = data.campana; o.textContent = data.campana; cs.appendChild(o); }
    cs.value = data.campana; cs.addEventListener('change', function() { data.campana = this.value; Storage.save(data); });
    $('ot-fecha').value = dateISO();
    window.addEventListener('beforeunload', e => { if (formDirty) { e.preventDefault(); e.returnValue = ''; } });
    App._initAplicaciones(); App.renderLotes(); App.refreshSelectors();
    loadCatalog().then(() => App._assignCatalogPrices());
  },

  _assignCatalogPrices() {
    if (!Object.keys(catalogo).length || !data.ordenes.length) return;
    // Build lookup: product name (lowercase) -> precio_usd
    const lookup = {};
    Object.values(catalogo).forEach(items => items.forEach(p => {
      lookup[p.producto.toLowerCase()] = p.precio_usd || 0;
    }));
    let updated = false;
    data.ordenes.forEach(o => {
      (o.aplicaciones || []).forEach(a => {
        (a.productos || []).forEach(p => {
          if ((!p.precio || p.precio === 0) && lookup[p.producto.toLowerCase()]) {
            p.precio = lookup[p.producto.toLowerCase()];
            updated = true;
          }
        });
      });
    });
    if (updated) Storage.save(data);
  },

  /* ── LOTES CRUD ── */
  renderLotes() {
    const el = $('lotes-list');
    if (!data.lotes.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">🌾</div><p>Sin lotes registrados</p><p style="font-size:12px;margin-top:4px;">Agrega tu primer lote para empezar</p></div>'; return; }
    el.innerHTML = data.lotes.map(l => `<div class="card lote-card fu"><div style="display:flex;justify-content:space-between;align-items:center;">
      <div style="flex:1;min-width:0;"><div style="font-family:var(--title);font-size:14px;color:var(--navy);text-transform:uppercase;">${esc(l.nombre)}</div>
      <div style="font-size:12px;color:var(--text-sec);margin-top:2px;">${esc(String(l.hectareas))} has${l.cultivo ? ' · ' + esc(l.cultivo) : ''}</div></div>
      <div style="display:flex;gap:4px;flex-shrink:0;">
        <button class="btn btn-sm btn-accent" style="font-size:12px;padding:8px 12px;min-height:36px;border-radius:8px;" onclick="App.openLoteModal('${esc(l.id)}')">✏️</button>
        <button class="btn btn-sm btn-danger" style="font-size:12px;padding:8px 12px;min-height:36px;border-radius:8px;" onclick="App.removeLote('${esc(l.id)}')">&times;</button>
      </div></div></div>`).join('');
  },
  openLoteModal(lid) {
    const l = lid ? data.lotes.find(x => x.id === lid) : null;
    openModal(`<div class="modal-title">${l ? 'Editar Lote' : 'Nuevo Lote'}</div>
      <div style="margin-bottom:10px;"><label class="form-lbl" for="m-lote-nombre">Nombre *</label><input type="text" id="m-lote-nombre" class="inp inp-sm" value="${esc(l?.nombre || '')}" placeholder="Ej: LT1, DP3..."></div>
      <div class="form-row" style="margin-bottom:10px;">
        <div><label class="form-lbl" for="m-lote-has">Hectareas *</label><input type="number" id="m-lote-has" class="inp inp-sm" value="${l?.hectareas || ''}" placeholder="0" min="0" step="1" style="font-family:var(--mono);"></div>
        <div><label class="form-lbl" for="m-lote-cultivo">Cultivo</label><input type="text" id="m-lote-cultivo" class="inp inp-sm" value="${esc(l?.cultivo || '')}" placeholder="Ej: Soja 1ra"></div>
      </div>
      <div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-accent" onclick="App.saveLote('${lid || ''}')">Guardar</button></div>`);
  },
  saveLote(lid) {
    const nombre = $('m-lote-nombre').value.trim();
    if (!nombre) { $('m-lote-nombre').style.borderColor = 'var(--red)'; return; }
    const has = parseFloat($('m-lote-has').value) || 0, cultivo = $('m-lote-cultivo').value.trim();
    if (has <= 0 && !confirm('Las hectareas estan en 0. Los calculos de volumen y monto no funcionaran.\n\nGuardar de todos modos?')) return;
    if (lid) { const l = data.lotes.find(x => x.id === lid); if (l) { l.nombre = nombre; l.hectareas = has; l.cultivo = cultivo; } }
    else data.lotes.push({ id: Storage.nextId('l'), nombre, hectareas: has, cultivo });
    Storage.save(data); closeModal(); App.renderLotes(); App.refreshSelectors();
  },
  removeLote(lid) {
    const linkedOrders = data.ordenes.filter(o => (o.aplicaciones || []).some(a => (a.lotes || []).some(l => l.loteId === lid)));
    const msg = linkedOrders.length
      ? `Este lote esta vinculado a ${linkedOrders.length} orden(es). Si lo eliminas, esas ordenes mostraran "?" en lugar del nombre.\n\nEliminar de todos modos?`
      : 'Eliminar este lote?';
    if (!confirm(msg)) return;
    data.lotes = data.lotes.filter(x => x.id !== lid); Storage.save(data); App.renderLotes(); App.refreshSelectors();
  },

  /* ── EXPORT/IMPORT ── */
  exportData() {
    const b = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }); const u = URL.createObjectURL(b);
    const a = document.createElement('a'); a.href = u; a.download = 'henderseeds-campana-backup-' + dateISO() + '.json'; a.click(); URL.revokeObjectURL(u);
  },
  importData(input) {
    const file = input.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const imp = JSON.parse(e.target.result);
        if (!imp.ordenes) { alert('Archivo no valido.'); return; }
        if (!confirm('Esto reemplazara todos los datos actuales. Continuar?')) return;
        data = imp;
        if (data.campos && !data.lotes) { data.lotes = []; data.campos.forEach(c => (c.lotes || []).forEach(l => data.lotes.push({ id: l.id, nombre: c.nombre + ', ' + l.nombre, hectareas: l.hectareas || 0, cultivo: l.cultivo || '' }))); delete data.campos; }

  _saving: false,
  saveOrden() {
    if (App._saving) return;
    const valid = aplicaciones.some(a => a.lotes.length && a.productos.length);
    if (!valid) { alert('Agrega al menos un lote con productos.'); return; }

      id: editingOrdenId || Storage.nextId('ot'),
      aplicador: $('ot-aplicador').value.trim(), fecha: $('ot-fecha').value,
      tipo, costoLabor, estado: App.getEstado(), notas: $('ot-notas').value.trim(),
      aplicaciones: aplicaciones.map(a => ({ lotes: a.lotes.map(l => ({ ...l })), tipo, costoLabor, productos: a.productos.map(p => ({ ...p })) })),
      createdAt: editingOrdenId ? (data.ordenes.find(o => o.id === editingOrdenId)?.createdAt || new Date().toISOString()) : new Date().toISOString(),
      updatedAt: new Date().toISOString(), campana: data.campana,
    };
    if (orden.aplicador && !data.aplicadores.includes(orden.aplicador)) data.aplicadores.push(orden.aplicador);
    const isEdit = !!editingOrdenId;
    if (editingOrdenId) { const idx = data.ordenes.findIndex(o => o.id === editingOrdenId); if (idx >= 0) data.ordenes[idx] = orden; } else data.ordenes.push(orden);
    Storage.save(data); App.resetOTForm();

    const filtLote = $('ord-lote')?.value || '';
    if (filtLote) ordenes = ordenes.filter(o => (o.aplicaciones || []).some(a => (a.lotes || []).some(l => l.loteId === filtLote)));
    const filtDesde = $('ord-desde')?.value || '', filtHasta = $('ord-hasta')?.value || '';
    if (filtDesde) ordenes = ordenes.filter(o => (o.fecha || '') >= filtDesde);

    if (q) ordenes = ordenes.filter(o => {

    // Fix #15: Summary totals

      sumEl.textContent = `${ordenes.length} orden${ordenes.length > 1 ? 'es' : ''} · ${fmtInt(sumHas)} has · USD ${fmt(sumMonto)} total`;

        let appInsHa = 0;
        const prodRows = (a.productos || []).map(p => {

              <td colspan="3" style="padding-top:4px;">Subtotal insumos</td>

              <td></td>

            ${o.costoLabor > 0 ? `<tr style="font-size:11px;color:var(--text-sec);"><td colspan="3">Labor</td><td style="text-align:right;font-family:var(--mono);">$${fmt(o.costoLabor)}</td><td></td></tr>` : ''}
            <tr style="font-weight:700;font-size:12px;">

            </tr>

        </div>`;
      }).join('');

      const allProds = {};
      apps.forEach(a => { const has = appTotalHas(a); (a.productos || []).forEach(p => {
        if (!allProds[p.producto]) allProds[p.producto] = { producto: p.producto, unidad: p.unidad || 'L', totalVol: 0, totalCost: 0 };
        allProds[p.producto].totalVol += has > 0 ? p.dosis * has : 0;

      const summaryRows = Object.values(allProds).map(p => `<tr><td>${esc(p.producto)}</td><td style="text-align:right;font-family:var(--mono);">${p.totalVol > 0 ? fmt(p.totalVol) + ' ' + esc(p.unidad) : '--'}</td><td style="text-align:right;font-family:var(--mono);color:var(--accent);">$${fmt(p.totalCost)}</td></tr>`).join('');

      const grandTotalHa = (orderTotalHas > 0 ? orderTotalMonto / orderTotalHas : (orderTotalHa / (apps.length || 1))) + (o.costoLabor || 0);

      return `<div class="card ot-card estado-${o.estado || 'pendiente'}"><div class="ot-card-wrap"><div class="ot-card-main">
        <div class="ot-detail">${esc(o.aplicador || 'Sin aplicador')} · ${esc(o.tipo || '--')} · ${fecha}
          <span style="float:right;font-family:var(--mono);font-weight:700;color:var(--navy);font-size:13px;">$${fmt(grandTotalHa)}/ha</span></div>

          <div style="overflow-x:auto"><table class="ot-prod-table" style="width:100%;border-collapse:collapse;"><tr><th style="text-align:left;">Producto</th><th style="text-align:right;width:80px;">Vol. total</th><th style="text-align:right;width:70px;">USD</th></tr>${summaryRows}</table></div>` : ''}
        </div></div>
        <div class="ot-status-col">

          <button class="st-curso${o.estado === 'en_curso' ? ' active' : ''}" data-oid="${esc(o.id)}" data-estado="en_curso">Curso</button>
          <button class="st-comp${o.estado === 'completada' ? ' active' : ''}" data-oid="${esc(o.id)}" data-estado="completada">Comp.</button>
        </div></div>
        <div class="ot-actions" style="display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--bg);">
          <button style="display:flex;align-items:center;justify-content:center;padding:7px;border-radius:8px;cursor:pointer;border:none;background:var(--accent);color:white;" onclick="App.editOrden('${esc(o.id)}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></button>
          <button style="display:flex;align-items:center;justify-content:center;padding:7px;border-radius:8px;cursor:pointer;border:none;background:#25d366;color:white;" onclick="App.compartirOrdenWA('${esc(o.id)}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></button>
          <button style="display:flex;align-items:center;justify-content:center;padding:7px;border-radius:8px;cursor:pointer;border:none;background:#e2e8f0;color:var(--text-sec);" onclick="App.duplicarOrden('${esc(o.id)}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
          <button style="display:flex;align-items:center;justify-content:center;padding:7px;border-radius:8px;cursor:pointer;border:none;background:var(--red);color:white;" onclick="App.deleteOrden('${esc(o.id)}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>

    el.querySelectorAll('.ot-status-col button').forEach(btn => btn.addEventListener('click', function(e) { e.preventDefault(); e.stopPropagation(); if (this.dataset.oid && this.dataset.estado) App.cambiarEstadoOrden(this.dataset.oid, this.dataset.estado); }));

  /* ── ANALISIS ── */
  renderAnalisis() {
    const el = $('analisis-body'), filtLote = $('an-lote').value;
    const filtEstado = $('an-estado')?.value || '';

    let ordenes = data.ordenes.filter(o => o.campana === data.campana);
    if (filtEstado) ordenes = ordenes.filter(o => o.estado === filtEstado);
    if (filtLote) ordenes = ordenes.filter(o => (o.aplicaciones || []).some(a => (a.lotes || []).some(l => l.loteId === filtLote)));

    if (!ordenes.length) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">📊</div><p>Sin datos para analizar</p><p style="font-size:12px;margin-top:4px;">Crea ordenes de trabajo para ver el analisis</p></div>';
      return;
    }

    const catColors = { 'Herbicidas':'#16a34a','Fungicidas':'#2d6fc4','Insecticidas':'#d97706','Fertilizantes':'#8b5cf6','Coadyuvantes':'#ec4899','Otros':'#94a3b8','Semillas':'#0d9488','Inoculantes':'#6366f1','Labor':'#f97316' };

    // ── Aggregate data ──
    let totalHas = 0, totalCostInsumos = 0, totalCostLabor = 0, totalApps = 0, totalProdsUsed = 0;
    const byCategory = {}, byProduct = {}, byLote = {}, byTipo = {}, byMonth = {};
    const lotesSeen = new Set(), productosUnicos = new Set();
    const timeline = []; // { fecha, costoAcum }

    ordenes.forEach(o => {
      const costoLabor = o.costoLabor || 0;
      (o.aplicaciones || []).forEach(a => {
        const aLotes = (a.lotes || []).filter(l => !filtLote || l.loteId === filtLote);
        if (!aLotes.length) return;
        const has = aLotes.reduce((s, l) => s + (l.hectareas || 0), 0);
        aLotes.forEach(l => {
          const currentLote = data.lotes.find(x => x.id === l.loteId);
          const loteHas = currentLote ? currentLote.hectareas : (l.hectareas || 0);
          if (!lotesSeen.has(l.loteId)) { lotesSeen.add(l.loteId); totalHas += loteHas; }
          // Per-lote aggregation
          if (!byLote[l.loteId]) byLote[l.loteId] = { nombre: '', has: loteHas, costoInsumos: 0, costoLabor: 0, apps: 0 };
          const lData = data.lotes.find(x => x.id === l.loteId);
          byLote[l.loteId].nombre = lData?.nombre || '?';
        });
        totalApps++;

        let appInsumos = 0;
        (a.productos || []).forEach(p => {
          const cost = p.precio * p.dosis * has;
          const costHa = p.precio * p.dosis;
          appInsumos += cost;
          totalCostInsumos += cost;
          productosUnicos.add(p.producto);

          // By category
          const cat = p.categoria || 'Otros';
          byCategory[cat] = (byCategory[cat] || 0) + cost;

          // By product
          if (!byProduct[p.producto]) byProduct[p.producto] = { nombre: p.producto, cat, unidad: p.unidad || 'L', volTotal: 0, costoTotal: 0, costoHa: 0, nApps: 0 };
          byProduct[p.producto].volTotal += has > 0 ? p.dosis * has : 0;
          byProduct[p.producto].costoTotal += cost;
          byProduct[p.producto].costoHa += costHa;
          byProduct[p.producto].nApps++;
        });

        // Labor
        const lc = costoLabor * has;
        totalCostLabor += lc;
        if (lc > 0) byCategory['Labor'] = (byCategory['Labor'] || 0) + lc;

        // Per-lote costs
        aLotes.forEach(l => {
          const lHas = l.hectareas || 0;
          const ratio = has > 0 ? lHas / has : 0;
          byLote[l.loteId].costoInsumos += appInsumos * ratio;
          byLote[l.loteId].costoLabor += lc * ratio;
          byLote[l.loteId].apps++;
        });

        // By tipo de labor
        const tipo = o.tipo || 'Otros';
        byTipo[tipo] = (byTipo[tipo] || 0) + appInsumos + lc;

        // Timeline by month
        const mes = o.fecha ? o.fecha.substring(0, 7) : 'Sin fecha';
        byMonth[mes] = (byMonth[mes] || 0) + appInsumos + lc;
      });
    });

    const totalCost = totalCostInsumos + totalCostLabor;
    const costoHa = totalHas > 0 ? totalCost / totalHas : 0;
    const insumosHa = totalHas > 0 ? totalCostInsumos / totalHas : 0;
    const laborHa = totalHas > 0 ? totalCostLabor / totalHas : 0;
    totalProdsUsed = productosUnicos.size;

    // ── Build HTML ──
    let html = '';

    // KPIs
    html += `<div class="card fu"><div class="stat-grid" style="margin-bottom:0;">
      <div class="stat-box"><div class="stat-val">USD ${fmt(totalCost)}</div><div class="stat-lbl">Inversion total</div></div>
      <div class="stat-box"><div class="stat-val" style="color:var(--green);">USD ${fmt(costoHa)}</div><div class="stat-lbl">Costo / ha</div></div>
      <div class="stat-box"><div class="stat-val">${fmtInt(totalHas)}</div><div class="stat-lbl">Hectareas</div></div>
      <div class="stat-box"><div class="stat-val">${totalApps}</div><div class="stat-lbl">Aplicaciones</div></div>
      <div class="stat-box"><div class="stat-val">USD ${fmt(insumosHa)}</div><div class="stat-lbl">Insumos / ha</div></div>
      <div class="stat-box"><div class="stat-val">USD ${fmt(laborHa)}</div><div class="stat-lbl">Labor / ha</div></div>
    </div></div>`;

    // ── Desglose por categoría ──
    if (Object.keys(byCategory).length) {
      const maxCat = Math.max(...Object.values(byCategory), 1);
      html += `<div class="card fu"><div style="font-family:var(--title);font-size:11px;text-transform:uppercase;color:var(--text-sec);margin-bottom:10px;">Desglose por categoria</div><div class="bar-chart" style="margin:0;">`;
      Object.entries(byCategory).sort((a, b) => b[1] - a[1]).forEach(([cat, val]) => {
        const pct = (val / totalCost * 100).toFixed(1);
        const w = (val / maxCat * 100).toFixed(0);
        const perHa = totalHas > 0 ? fmt(val / totalHas) : '--';
        html += `<div class="bar-row"><span class="bar-label">${esc(cat)}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${catColors[cat] || '#94a3b8'};"><span>${pct}%</span></div></div>
          <span class="bar-amount" title="$${perHa}/ha">$${fmt(val)}</span></div>`;
      });
      html += '</div></div>';
    }

    // ── Comparativa por lote (only when "Todos") ──
    const loteEntries = Object.values(byLote);
    if (!filtLote && loteEntries.length > 1) {
      const maxLoteCost = Math.max(...loteEntries.map(l => (l.costoInsumos + l.costoLabor) / (l.has || 1)), 1);
      html += `<div class="card fu"><div style="font-family:var(--title);font-size:11px;text-transform:uppercase;color:var(--text-sec);margin-bottom:10px;">Costo/ha por lote</div><div class="bar-chart" style="margin:0;">`;
      loteEntries.sort((a, b) => ((b.costoInsumos + b.costoLabor) / (b.has || 1)) - ((a.costoInsumos + a.costoLabor) / (a.has || 1))).forEach(l => {
        const costHa = l.has > 0 ? (l.costoInsumos + l.costoLabor) / l.has : 0;
        const w = (costHa / maxLoteCost * 100).toFixed(0);
        html += `<div class="bar-row"><span class="bar-label">${esc(l.nombre)}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:var(--navy-sky);"><span>${l.apps} apps</span></div></div>
          <span class="bar-amount">$${fmt(costHa)}/ha</span></div>`;
      });
      html += '</div></div>';
    }

    // ── Por tipo de labor ──
    if (Object.keys(byTipo).length > 1) {
      const maxTipo = Math.max(...Object.values(byTipo), 1);
      const tipoColors = ['#2d6fc4','#16a34a','#d97706','#8b5cf6','#ec4899','#0d9488'];
      html += `<div class="card fu"><div style="font-family:var(--title);font-size:11px;text-transform:uppercase;color:var(--text-sec);margin-bottom:10px;">Inversion por tipo de labor</div><div class="bar-chart" style="margin:0;">`;
      Object.entries(byTipo).sort((a, b) => b[1] - a[1]).forEach(([tipo, val], ti) => {
        const w = (val / maxTipo * 100).toFixed(0);
        html += `<div class="bar-row"><span class="bar-label">${esc(tipo)}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${tipoColors[ti % tipoColors.length]};"><span>${(val/totalCost*100).toFixed(0)}%</span></div></div>
          <span class="bar-amount">$${fmt(val)}</span></div>`;
      });
      html += '</div></div>';
    }

    // ── Timeline mensual ──
    const months = Object.entries(byMonth).sort((a, b) => a[0].localeCompare(b[0]));
    if (months.length > 0) {
      const maxMonth = Math.max(...months.map(m => m[1]), 1);
      let acum = 0;
      const monthNames = { '01':'Ene','02':'Feb','03':'Mar','04':'Abr','05':'May','06':'Jun','07':'Jul','08':'Ago','09':'Sep','10':'Oct','11':'Nov','12':'Dic' };
      html += `<div class="card fu"><div style="font-family:var(--title);font-size:11px;text-transform:uppercase;color:var(--text-sec);margin-bottom:10px;">Inversion mensual</div>`;
      html += '<div style="display:flex;gap:6px;align-items:flex-end;height:120px;padding:0 4px;">';
      months.forEach(([mes, val]) => {
        acum += val;
        const h = Math.max((val / maxMonth * 100), 4);
        const label = mes !== 'Sin fecha' ? (monthNames[mes.split('-')[1]] || mes.split('-')[1]) + ' ' + mes.split('-')[0].slice(2) : '?';
        html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;">
          <span style="font-family:var(--mono);font-size:9px;font-weight:700;color:var(--navy);">$${fmtInt(val)}</span>
          <div style="width:100%;height:${h}%;background:linear-gradient(180deg,var(--accent),var(--navy));border-radius:4px 4px 0 0;min-height:4px;"></div>
          <span style="font-size:9px;color:var(--text-mut);font-weight:600;">${label}</span>
        </div>`;
      });
      html += '</div>';
      if (months.length > 1) html += `<div style="text-align:right;margin-top:6px;font-size:11px;color:var(--text-sec);">Acumulado: <strong style="color:var(--navy);font-family:var(--mono);">USD ${fmt(acum)}</strong></div>`;
      html += '</div>';
    }

    // ── Top productos ──
    const prodEntries = Object.values(byProduct).sort((a, b) => b.costoTotal - a.costoTotal);
    if (prodEntries.length) {
      html += `<div class="card fu"><div style="font-family:var(--title);font-size:11px;text-transform:uppercase;color:var(--text-sec);margin-bottom:10px;">Productos utilizados (${totalProdsUsed})</div>`;
      html += `<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:12px;">
        <tr style="border-bottom:2px solid var(--border);">
          <th style="text-align:left;padding:6px 4px;font-size:10px;text-transform:uppercase;color:var(--text-mut);">Producto</th>
          <th style="text-align:center;padding:6px 4px;font-size:10px;text-transform:uppercase;color:var(--text-mut);">Cat.</th>
          <th style="text-align:right;padding:6px 4px;font-size:10px;text-transform:uppercase;color:var(--text-mut);">Vol. total</th>
          <th style="text-align:right;padding:6px 4px;font-size:10px;text-transform:uppercase;color:var(--text-mut);">USD total</th>
          <th style="text-align:right;padding:6px 4px;font-size:10px;text-transform:uppercase;color:var(--text-mut);">USD/ha</th>
          <th style="text-align:center;padding:6px 4px;font-size:10px;text-transform:uppercase;color:var(--text-mut);">Apps</th>
        </tr>`;
      prodEntries.forEach((p, i) => {
        const bgColor = i % 2 === 0 ? 'var(--bg)' : 'white';
        const catDot = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${catColors[p.cat] || '#94a3b8'};margin-right:3px;"></span>`;
        const avgHa = p.nApps > 0 ? p.costoHa / p.nApps : 0;
        html += `<tr style="background:${bgColor};">
          <td style="padding:5px 4px;font-weight:600;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.nombre)}</td>
          <td style="padding:5px 4px;text-align:center;font-size:10px;">${catDot}${esc(p.cat)}</td>
          <td style="padding:5px 4px;text-align:right;font-family:var(--mono);font-size:11px;">${p.volTotal > 0 ? fmt(p.volTotal) + ' ' + esc(p.unidad) : '--'}</td>
          <td style="padding:5px 4px;text-align:right;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent);">$${fmt(p.costoTotal)}</td>
          <td style="padding:5px 4px;text-align:right;font-family:var(--mono);font-size:11px;">$${fmt(avgHa)}</td>
          <td style="padding:5px 4px;text-align:center;font-size:11px;">${p.nApps}</td>
        </tr>`;
      });
      html += '</table></div></div>';
    }

    // ── Historial de aplicaciones ──
    const histTitle = filtLote ? 'Historial del lote' : 'Historial de aplicaciones';
    html += `<div class="card fu"><div style="font-family:var(--title);font-size:11px;text-transform:uppercase;color:var(--text-sec);margin-bottom:10px;">${histTitle}</div>`;
    let costoAcum = 0;
    ordenes.sort((a, b) => new Date(a.fecha || 0) - new Date(b.fecha || 0)).forEach(o => {
      (o.aplicaciones || []).forEach(a => {
        const aLotes = (a.lotes || []).filter(l => !filtLote || l.loteId === filtLote);
        if (!aLotes.length) return;
        const has = aLotes.reduce((s, l) => s + (l.hectareas || 0), 0);
        const lotesStr = aLotes.map(al => { const l = data.lotes.find(x => x.id === al.loteId); return l?.nombre || '?'; }).join(', ');
        const insumosHa = (a.productos || []).reduce((s, p) => s + p.precio * p.dosis, 0);
        const netoHa = insumosHa + (o.costoLabor || 0);
        const montoTotal = netoHa * has;
        if (filtLote) costoAcum += netoHa;
        const fecha = o.fecha ? new Date(o.fecha + 'T12:00:00').toLocaleDateString('es-AR') : '--';
        const estadoBadge = o.estado === 'completada' ? 'badge-completada' : o.estado === 'en_curso' ? 'badge-en_curso' : 'badge-pendiente';
        const estadoLabel = o.estado === 'completada' ? 'Comp.' : o.estado === 'en_curso' ? 'Curso' : 'Pend.';
        const nProds = (a.productos || []).length;
        const prodsStr = (a.productos || []).map(p => esc(p.producto)).join(', ');

        html += `<div style="padding:8px 0;border-bottom:1px solid var(--bg);">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:6px;">
            <div style="flex:1;min-width:0;">
              <div style="font-size:12px;"><span style="font-weight:700;">${fecha}</span>
                <span class="badge ${estadoBadge}" style="margin-left:4px;">${estadoLabel}</span></div>
              <div style="font-size:11px;color:var(--text-sec);margin-top:2px;">${esc(lotesStr)} · ${has} has · ${esc(o.tipo || '--')} · ${nProds} prod</div>
              ${filtLote ? `<div style="font-size:10px;color:var(--text-mut);margin-top:2px;">${prodsStr}</div>` : ''}
            </div>
            <div style="text-align:right;flex-shrink:0;">
              <div style="font-family:var(--mono);font-weight:700;color:var(--accent);font-size:13px;">$${fmt(netoHa)}/ha</div>
              ${has > 0 ? `<div style="font-family:var(--mono);font-size:10px;color:var(--text-mut);">$${fmt(montoTotal)} total</div>` : ''}
              ${filtLote ? `<div style="font-family:var(--mono);font-size:10px;color:var(--navy);font-weight:700;">Acum: $${fmt(costoAcum)}/ha</div>` : ''}
            </div>
          </div>
        </div>`;
      });
    });
    html += '</div>';

    el.innerHTML = html;
  },

  /* ── WA ── */
  _buildWAMsg(o) {
    const apps = o.aplicaciones || [];
    const fecha = o.fecha ? new Date(o.fecha + 'T12:00:00').toLocaleDateString('es-AR') : dateStr();
    const costoLabor = o.costoLabor || 0;
    let msg = `*ORDEN DE TRABAJO*\nFecha: ${fecha}\nLabor: ${o.tipo || '--'}\n`;
    if (o.aplicador) msg += `Aplicador: ${o.aplicador}\n`; msg += '\n';
    let grandTotalHa = 0, grandTotalMonto = 0, grandTotalHas = 0;

    apps.forEach(a => {
      const has = appTotalHas(a); grandTotalHas += has;
      const lotesStr = (a.lotes || []).map(al => { const l = data.lotes.find(x => x.id === al.loteId); return l?.nombre || '?'; }).join(', ');
      msg += `*${lotesStr}*\n${has} has\n`;
      let insHa = 0;
      (a.productos || []).forEach((r, i) => {
        const costoHa = r.precio * r.dosis;
        insHa += costoHa;
        const vol = has > 0 ? fmt(r.dosis * has) : '--';
        msg += `  ${i+1}. ${r.producto} - ${r.dosis} ${r.unidad||'L'}/ha`;
        if (r.precio > 0) msg += ` (USD ${fmt(r.precio)}/${r.unidad||'L'} = USD ${fmt(costoHa)}/ha)`;
        msg += ` - Vol: ${vol} ${r.unidad||'L'}\n`;
      });
      grandTotalHa += insHa; grandTotalMonto += insHa * has;
      msg += `  Subtotal: USD ${fmt(insHa + costoLabor)}/ha\n\n`;
    });

    if (apps.length > 1) {
      const allP = {};
      apps.forEach(a => { const has = appTotalHas(a); (a.productos || []).forEach(p => { if (!allP[p.producto]) allP[p.producto] = { p: p.producto, u: p.unidad||'L', v: 0 }; allP[p.producto].v += has > 0 ? p.dosis * has : 0; }); });
      msg += '*RESUMEN RETIRO:*\n'; Object.values(allP).forEach(p => msg += `  ${p.p}: ${p.v > 0 ? fmt(p.v)+' '+p.u : '--'}\n`); msg += '\n';
    }
    const avg = (grandTotalHas > 0 ? grandTotalMonto / grandTotalHas : (grandTotalHa / (apps.length || 1))) + costoLabor;
    if (costoLabor > 0) msg += `Labor: USD ${fmt(costoLabor)}/ha\n`;
    msg += `*Total: USD ${fmt(avg)}/ha*`;
    if (grandTotalHas > 0) msg += ` -- *USD ${fmt(grandTotalMonto + costoLabor * grandTotalHas)} total*`;
    msg += '\n'; if (o.notas) msg += `\nNotas: ${o.notas}\n`;
    msg += `\n_Campana ${o.campana || data.campana}_`;
    return msg;
  },
  compartirOrdenWA(oid) { const o = data.ordenes.find(x => x.id === oid); if (o) window.open('https://wa.me/?text=' + encodeURIComponent(App._buildWAMsg(o)), '_blank'); },
  compartirWA() { window.open('https://wa.me/?text=' + encodeURIComponent(App._buildWAMsg({ aplicador: $('ot-aplicador').value.trim(), fecha: $('ot-fecha').value, tipo: App.getTipo(), costoLabor: App.getCostoLabor(), notas: $('ot-notas').value.trim(), aplicaciones, campana: data.campana })), '_blank'); },

  /* ── PDF ── */
  exportarPDF() { App._generatePDF({ aplicador: $('ot-aplicador').value.trim(), fecha: $('ot-fecha').value, tipo: App.getTipo(), costoLabor: App.getCostoLabor(), notas: $('ot-notas').value.trim(), aplicaciones, campana: data.campana }); },
  exportarOrdenPDF(oid) { const o = data.ordenes.find(x => x.id === oid); if (o) App._generatePDF(o); },

  _generatePDF(o) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const W = 210, H = 297, m = 12, cW = W - m * 2;
    const apps = o.aplicaciones || [];
    const fecha = o.fecha ? new Date(o.fecha + 'T12:00:00').toLocaleDateString('es-AR') : dateStr();
    const productor = currentProductor || '';

    // Colors
    const dark = [20, 30, 48];
    const blue = [37, 99, 186];
    const lightBg = [245, 247, 252];
    const midGray = [120, 130, 145];
    const white = [255, 255, 255];

    // Helper: check page break
    const checkPage = (need) => { if (y + need > H - 15) { doc.addPage(); y = 15; } };

    let y = 0;

    // ═══ HEADER — clean, dark, professional ═══
    doc.setFillColor(...dark);
    doc.rect(0, 0, W, 38, 'F');

    // Accent line
    doc.setFillColor(...blue);
    doc.rect(0, 38, W, 2, 'F');

    doc.setTextColor(...white);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(20);
    doc.text('ORDEN DE TRABAJO', m, 16);

    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    doc.text(fecha, m, 25);
    if (o.tipo) doc.text(o.tipo, m, 32);

    // Right side: productor + campana
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    if (productor) doc.text(productor, W - m, 16, { align: 'right' });
    doc.setFont('helvetica', 'normal');
    doc.text('Campana ' + (o.campana || data.campana), W - m, 25, { align: 'right' });

    y = 48;

    // ═══ INFO BAR — aplicador, lotes summary ═══
    const allLoteNames = [];
    let grandTotalHas = 0;
    apps.forEach(a => {
      (a.lotes || []).forEach(al => {
        const l = data.lotes.find(x => x.id === al.loteId);
        const name = l?.nombre || '?';
        if (!allLoteNames.includes(name)) allLoteNames.push(name);
        grandTotalHas += al.hectareas || 0;
      });
    });

    doc.setFillColor(...lightBg);
    doc.roundedRect(m, y, cW, 18, 2, 2, 'F');

    doc.setFontSize(8);
    doc.setTextColor(...midGray);
    doc.text('APLICADOR', m + 4, y + 5);
    doc.text('LOTES', m + 65, y + 5);
    doc.text('HECTAREAS', W - m - 30, y + 5);

    doc.setFontSize(10);
    doc.setTextColor(...dark);
    doc.setFont('helvetica', 'bold');
    doc.text(o.aplicador || 'Sin asignar', m + 4, y + 13);
    doc.setFont('helvetica', 'normal');
    const lotesDisplay = allLoteNames.join(', ');
    doc.text(lotesDisplay.length > 35 ? lotesDisplay.substring(0, 33) + '...' : lotesDisplay, m + 65, y + 13);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(12);
    doc.text(fmtInt(grandTotalHas) + ' has', W - m - 4, y + 13, { align: 'right' });

    y += 26;

    // ═══ APLICACIONES ═══
    const allProds = {};
    let pdfGrandInsHa = 0, pdfGrandMonto = 0, pdfGrandHas = 0;
    const costoLabor = o.costoLabor || 0;

    apps.forEach((app, ai) => {
      const has = appTotalHas(app);
      pdfGrandHas += has;
      const lotesStr = (app.lotes || []).map(al => {
        const l = data.lotes.find(x => x.id === al.loteId);
        return (l?.nombre || '?') + ' (' + (al.hectareas || 0) + ' has)';
      }).join('  ·  ');

      checkPage(30);

      // App header bar
      doc.setFillColor(...blue);
      doc.roundedRect(m, y, cW, 9, 1.5, 1.5, 'F');
      doc.setTextColor(...white);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      doc.text(lotesStr, m + 4, y + 6.5);
      doc.text(has + ' has total', W - m - 4, y + 6.5, { align: 'right' });
      y += 12;

      // Table header — 6 columns
      const colX = { producto: m + 2, formulacion: m + 52, precio: m + 92, dosis: m + 115, costoHa: m + 143, vol: m + 165 };

      doc.setFillColor(230, 235, 245);
      doc.rect(m, y, cW, 7, 'F');
      doc.setTextColor(...midGray);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(6.5);
      doc.text('PRODUCTO', colX.producto, y + 5);
      doc.text('FORMULACION', colX.formulacion, y + 5);
      doc.text('PRECIO', colX.precio, y + 5);
      doc.text('DOSIS/HA', colX.dosis, y + 5);
      doc.text('USD/HA', colX.costoHa, y + 5);
      doc.text('VOL. TOTAL', colX.vol, y + 5);
      y += 8;

      // Product rows
      let appInsHa = 0;
      (app.productos || []).forEach((r, i) => {
        checkPage(11);
        if (i % 2 === 0) { doc.setFillColor(250, 251, 254); doc.rect(m, y, cW, 10, 'F'); }

        const vol = has > 0 ? r.dosis * has : 0;
        const volStr = vol > 0 ? fmt(vol) + ' ' + (r.unidad || 'L') : '--';
        const ch = r.precio * r.dosis;
        appInsHa += ch;

        // Producto
        doc.setTextColor(...dark); doc.setFont('helvetica', 'bold'); doc.setFontSize(8);
        const nombre = r.producto.length > 24 ? r.producto.substring(0, 22) + '...' : r.producto;
        doc.text(nombre, colX.producto, y + 6.5);

        // Formulacion
        doc.setFont('helvetica', 'normal'); doc.setFontSize(7); doc.setTextColor(...midGray);
        doc.text((r.formulacion || '--').substring(0, 18), colX.formulacion, y + 6.5);

        // Precio unitario
        doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(...midGray);
        doc.text(r.precio > 0 ? '$' + fmt(r.precio) : '--', colX.precio, y + 6.5);

        // Dosis — blue, bold
        doc.setFont('helvetica', 'bold'); doc.setFontSize(9); doc.setTextColor(...blue);
        doc.text(r.dosis + ' ' + (r.unidad || 'L') + '/ha', colX.dosis, y + 7);

        // $/ha — bold
        doc.setFont('helvetica', 'bold'); doc.setFontSize(9); doc.setTextColor(...dark);
        doc.text('$' + fmt(ch), colX.costoHa, y + 7);

        // Vol total
        doc.setFont('helvetica', 'bold'); doc.setFontSize(9); doc.setTextColor(...dark);
        doc.text(volStr, colX.vol, y + 7);

        y += 10;

        if (!allProds[r.producto]) allProds[r.producto] = { producto: r.producto, formulacion: r.formulacion || '', unidad: r.unidad || 'L', totalVol: 0, totalCost: 0 };
        allProds[r.producto].totalVol += vol;
        allProds[r.producto].totalCost += ch * has;
      });

      pdfGrandInsHa += appInsHa;
      pdfGrandMonto += appInsHa * has;

      // Subtotal row
      checkPage(14);
      doc.setFillColor(235, 240, 250); doc.rect(m, y, cW, 8, 'F');
      doc.setTextColor(...dark); doc.setFont('helvetica', 'bold'); doc.setFontSize(8);
      doc.text('Subtotal insumos', colX.producto, y + 5.5);
      doc.setFontSize(9); doc.setTextColor(...blue);
      doc.text('$' + fmt(appInsHa) + '/ha', colX.costoHa, y + 5.5);
      if (has > 0) { doc.setFontSize(7); doc.setTextColor(...midGray); doc.text('$' + fmt(appInsHa * has) + ' total', colX.vol, y + 5.5); }
      y += 10;

      if (costoLabor > 0) {
        doc.setTextColor(...midGray); doc.setFont('helvetica', 'normal'); doc.setFontSize(7);
        doc.text('Labor: $' + fmt(costoLabor) + '/ha', colX.producto, y + 4);
        doc.setFont('helvetica', 'bold');
        doc.text('Total: $' + fmt(appInsHa + costoLabor) + '/ha', colX.costoHa, y + 4);
        y += 6;
      }
      y += 4;
    });

    // ═══ RESUMEN RETIRO + COSTOS ═══
    const prodList = Object.values(allProds);
    if (prodList.length) {
      checkPage(20 + prodList.length * 10);

      y += 2;
      doc.setFillColor(...dark);
      doc.roundedRect(m, y, cW, 9, 1.5, 1.5, 'F');
      doc.setTextColor(...white);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(10);
      doc.text('RESUMEN — RETIRO DE DEPOSITO', m + 4, y + 6.5);
      y += 13;

      doc.setFillColor(230, 235, 245); doc.rect(m, y, cW, 7, 'F');
      doc.setTextColor(...midGray); doc.setFont('helvetica', 'bold'); doc.setFontSize(6.5);
      doc.text('PRODUCTO', m + 2, y + 5);
      doc.text('FORMULACION', m + 70, y + 5);
      doc.text('VOLUMEN TOTAL', m + 115, y + 5);
      doc.text('COSTO TOTAL', m + 155, y + 5);
      y += 9;

      prodList.forEach((p, i) => {
        checkPage(11);
        if (i % 2 === 0) { doc.setFillColor(250, 251, 254); doc.rect(m, y, cW, 10, 'F'); }
        doc.setTextColor(...dark); doc.setFont('helvetica', 'bold'); doc.setFontSize(8);
        doc.text(p.producto.length > 30 ? p.producto.substring(0, 28) + '...' : p.producto, m + 2, y + 7);
        doc.setFont('helvetica', 'normal'); doc.setFontSize(7); doc.setTextColor(...midGray);
        doc.text(p.formulacion.substring(0, 20), m + 70, y + 7);
        doc.setFont('helvetica', 'bold'); doc.setFontSize(10); doc.setTextColor(...blue);
        doc.text(p.totalVol > 0 ? fmt(p.totalVol) + ' ' + p.unidad : '--', m + 115, y + 7);
        doc.setFontSize(9); doc.setTextColor(...dark);
        doc.text(p.totalCost > 0 ? '$' + fmt(p.totalCost) : '--', m + 155, y + 7);
        y += 10;
      });
      y += 4;
    }

    // ═══ TOTAL GENERAL ═══
    checkPage(22);
    const avgInsHa = pdfGrandHas > 0 ? pdfGrandMonto / pdfGrandHas : (apps.length > 0 ? pdfGrandInsHa / apps.length : 0);
    const grandTotalHa = avgInsHa + costoLabor;
    const grandTotalUSD = pdfGrandMonto + costoLabor * pdfGrandHas;

    doc.setFillColor(...dark); doc.roundedRect(m, y, cW, 18, 2, 2, 'F');
    doc.setTextColor(180, 190, 210); doc.setFont('helvetica', 'normal'); doc.setFontSize(8);
    doc.text('Insumos: $' + fmt(avgInsHa) + '/ha', m + 5, y + 6);
    if (costoLabor > 0) doc.text('  +  Labor: $' + fmt(costoLabor) + '/ha', m + 60, y + 6);
    doc.setTextColor(...white); doc.setFont('helvetica', 'bold'); doc.setFontSize(13);
    doc.text('TOTAL: USD ' + fmt(grandTotalHa) + '/ha', m + 5, y + 14);
    if (pdfGrandHas > 0) {
      doc.setFontSize(10); doc.text('USD ' + fmt(grandTotalUSD), W - m - 5, y + 14, { align: 'right' });
      doc.setFontSize(7); doc.setFont('helvetica', 'normal'); doc.setTextColor(180, 190, 210);
      doc.text(fmtInt(pdfGrandHas) + ' has', W - m - 5, y + 6, { align: 'right' });
    }
    y += 24;

    // ═══ NOTAS ═══
    if (o.notas) {
      checkPage(20);
      doc.setFillColor(...lightBg);
      const notasLines = doc.splitTextToSize(o.notas, cW - 12);
      const notasH = 10 + notasLines.length * 4;
      doc.roundedRect(m, y, cW, notasH, 2, 2, 'F');

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(8);
      doc.setTextColor(...dark);
      doc.text('NOTAS', m + 5, y + 6);

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(...midGray);
      doc.text(notasLines, m + 5, y + 12);
      y += notasH + 4;
    }

    // ═══ FOOTER ═══
    const pageCount = doc.internal.getNumberOfPages();
    for (let p = 1; p <= pageCount; p++) {
      doc.setPage(p);
      doc.setFillColor(...dark);
      doc.rect(0, H - 10, W, 10, 'F');
      doc.setTextColor(180, 185, 195);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(7);
      doc.text('Orden de trabajo — ' + fecha, m, H - 4);
      doc.text('Pagina ' + p + '/' + pageCount, W - m, H - 4, { align: 'right' });
    }

    // ═══ SAVE ═══
    const fn = 'OT_' + (allLoteNames[0] || 'orden').replace(/\s+/g, '_') + '_' + (o.fecha || dateISO()) + '.pdf';
    try {
      const blob = doc.output('blob');
      const file = new File([blob], fn, { type: 'application/pdf' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: 'Orden de Trabajo' });
      } else {
        doc.save(fn);
      }
    } catch(err) {
      if (err.name !== 'AbortError') doc.save(fn);
    }
  },

  updateOrdenPrecio(oid, producto, valor) {
    const o = data.ordenes.find(x => x.id === oid);
    if (!o) return;
    const precio = parseFloat(valor) || 0;
    (o.aplicaciones || []).forEach(a => {
      (a.productos || []).forEach(p => {
        if (p.producto === producto) p.precio = precio;
      });
    });
    Storage.save(data);
    App.renderOrdenes();
  },

  duplicarOrden(oid) {
    const o = data.ordenes.find(x => x.id === oid); if (!o) return;
    const dup = JSON.parse(JSON.stringify(o));
    dup.id = Storage.nextId('ot'); dup.fecha = dateISO(); dup.estado = 'pendiente';
    dup.createdAt = new Date().toISOString(); dup.updatedAt = new Date().toISOString();
    data.ordenes.push(dup); Storage.save(data); App.renderOrdenes(); showToast('Orden duplicada');
  },
  deleteOrden(oid) { if (!confirm('Eliminar esta orden?')) return; data.ordenes = data.ordenes.filter(o => o.id !== oid); Storage.save(data); App.renderOrdenes(); showToast('Orden eliminada'); },
};

document.addEventListener('DOMContentLoaded', () => {
  // Render user buttons
  $('user-buttons').innerHTML = USUARIOS.map(u =>
    `<button data-uid="${u.id}" onclick="App.loginProductor('${u.id}')" style="padding:12px 20px;border:1.5px solid var(--accent);border-radius:12px;background:var(--accent-bg);color:var(--navy);font-weight:700;font-size:14px;cursor:pointer;font-family:var(--font);min-width:80px;">${u.nombre}</button>`
  ).join('');

  // Auto-login from saved user
  if (savedUserId && USUARIOS.find(u => u.id === savedUserId)) {
    App.loginProductor(savedUserId);
  }

  // Delegated listeners (always active)
  $('ordenes-list').addEventListener('click', e => { const btn = e.target.closest('[data-oid][data-estado]'); if (btn) { e.stopPropagation(); App.cambiarEstadoOrden(btn.dataset.oid, btn.dataset.estado); } });
  $('ot-costo-labor').addEventListener('input', () => App._renderTotales());

});
</script>
