<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento de Campaña — Henderseeds</title>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0d2d5e;
  --navy-light: #1a4a8a;
  --navy-sky: #2d6fc4;
  --accent: #2d6fc4;
  --accent-dark: #1a4a8a;
  --accent-bg: #e8f0fe;
  --accent-light: #5b9af5;
  --green: #16a34a;
  --green-bg: #dcfce7;
  --orange: #d97706;
  --orange-bg: #fef3c7;
  --red: #ef4444;
  --bg: #f0f4fb;
  --card: #ffffff;
  --border: #e2e8f0;
  --text: #0d2033;
  --text-sec: #64748b;
  --text-mut: #94a3b8;
  --radius: 14px;
  --radius-sm: 9px;
  --shadow: 0 2px 14px rgba(13,45,94,.08), 0 1px 3px rgba(13,45,94,.04);
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --title: 'Archivo Black', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.4; -webkit-font-smoothing: antialiased; padding-bottom: 70px; }
input, select, button, textarea { font-family: inherit; font-size: inherit; }
.main { max-width: 920px; margin: 0 auto; padding: 8px 8px 52px; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.status-bar { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 4px 0 6px; font-size: .7rem; color: var(--text-mut); }
.tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 8px; }
.tab-btn { flex: 1; background: none; border: none; border-bottom: 3px solid transparent; color: var(--text-mut); font-size: .72rem; font-weight: 500; padding: 10px 2px; cursor: pointer; transition: all .2s; font-family: var(--font); margin-bottom: -2px; white-space: nowrap; }
.tab-btn.active { border-bottom-color: var(--accent); color: var(--navy); font-weight: 700; }
.card { background: var(--card); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow); }
.inp { width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; background: white; color: var(--text); outline: none; transition: border-color .15s, box-shadow .15s; }
.inp:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(45,111,196,.12); }
.inp-sm { padding: 6px 8px; font-size: 13px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.form-lbl { font-size: .7rem; font-weight: 700; color: var(--accent-dark); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 5px; }
textarea.inp { resize: vertical; min-height: 60px; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 13px 18px; border: none; border-radius: 99px; font-size: .82rem; font-weight: 700; cursor: pointer; font-family: var(--font); transition: opacity .15s; }
.btn:hover { opacity: .87; }
.btn-accent { background: var(--accent); color: white; }
.btn-green { background: #25d366; color: white; }
.btn-outline { background: var(--navy-light); color: #fff; }
.btn-danger { background: var(--red); color: white; }
.btn-sm { font-size: .7rem; padding: 6px 14px; }
.btn-add { width: 100%; padding: 12px; border: 2px dashed var(--accent); border-radius: var(--radius); background: var(--accent-bg); color: var(--accent-dark); font-weight: 700; font-size: .8rem; cursor: pointer; margin-bottom: 10px; transition: all .15s; }
.btn-add:hover { background: var(--accent); color: white; }
.chip-bar { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.chip { flex: 1; min-width: 0; padding: 8px 6px; border-radius: 10px; font-size: .7rem; font-weight: 700; border: 1.5px solid var(--border); background: white; cursor: pointer; text-align: center; transition: all .15s; line-height: 1.2; font-family: var(--font); }
.chip.active { background: var(--accent); color: white; border-color: var(--accent); }
.chip.green.active { background: var(--green); border-color: var(--green); }
.chip.orange.active { background: var(--orange); border-color: var(--orange); }
.ot-productos-detail { font-size:12px; color:var(--text-sec); margin-top:6px; }
.ot-productos-detail table { width:100%; border-collapse:collapse; }
.ot-productos-detail th { font-weight:600; color:var(--text-mut); font-size:11px; text-transform:uppercase; padding:2px 4px 2px 0; }
.ot-productos-detail td { padding:3px 4px 3px 0; font-family:var(--mono); font-size:11px; }
.ot-productos-detail td:first-child { font-family:var(--font); font-weight:500; color:var(--text); }
.ot-card-wrap { display:flex; gap:0; }
.ot-card-main { flex:1; min-width:0; }
.ot-status-col { display:flex; flex-direction:column; gap:5px; padding:10px 0 10px 12px; border-left:2px solid var(--bg); margin-left:10px; justify-content:center; min-width:62px; }
.ot-status-col button { border:2px solid transparent; border-radius:8px; padding:6px 10px; font-size:11px; font-weight:700; cursor:pointer; opacity:.35; transition:all .15s; white-space:nowrap; text-align:center; }
.ot-status-col button:hover { opacity:.65; }
.ot-status-col button.active { opacity:1; transform:scale(1.08); box-shadow:0 2px 8px rgba(0,0,0,.2); }
.ot-status-col .st-pend { background:#fff8e1; color:#856404; }
.ot-status-col .st-pend.active { background:#ffc107; color:#fff; border-color:#e6ac00; }
.ot-status-col .st-curso { background:#e3f2fd; color:#004085; }
.ot-status-col .st-curso.active { background:#1976d2; color:#fff; border-color:#1565c0; }
.ot-status-col .st-comp { background:#e8f5e9; color:var(--green); }
.ot-status-col .st-comp.active { background:#388e3c; color:#fff; border-color:#2e7d32; }
.ot-section-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--accent); padding:6px 0 2px; }
.app-block { border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px; margin-bottom:6px; position:relative; z-index:1; }
.app-block.active-app { z-index:20; }
.app-block-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.app-block-title { font-family:var(--title); font-size:13px; font-weight:700; color:var(--navy); text-transform:uppercase; }
.app-block-rm { background:none; border:none; font-size:16px; color:var(--text-mut); cursor:pointer; padding:2px 6px; }
.app-block-rm:hover { color:var(--orange); }

/* ── Lote chips in app block ── */
.app-lotes-list { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
.app-lote-chip {
  display:inline-flex; align-items:center; gap:4px;
  background:var(--accent-bg); border:1px solid var(--accent); border-radius:8px;
  padding:4px 8px; font-size:12px; font-weight:600; color:var(--navy);
}
.app-lote-chip .chip-has {
  font-family:var(--mono); color:var(--accent-dark);
  width:62px; padding:4px 6px; font-size:13px; border:1px solid var(--accent); border-radius:4px;
  text-align:right; background:white; outline:none;
}
.app-lote-chip .chip-has:focus { border-color:var(--navy); background:var(--accent-bg); }
.app-lote-chip .chip-rm { background:none; border:none; font-size:14px; color:var(--text-mut); cursor:pointer; padding:0 2px; line-height:1; }
.app-lote-chip .chip-rm:hover { color:var(--red); }
.app-total-has { font-size:12px; font-weight:700; color:var(--accent-dark); margin-top:6px; font-family:var(--mono); }

.dropdown { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius-sm) var(--radius-sm); max-height: 250px; overflow-y: auto; z-index: 50; box-shadow: 0 8px 24px rgba(0,0,0,.12); display: none; }
.dropdown.show { display: block; }
.dd-cat { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--accent); padding: 8px 12px 4px; background: var(--bg); }
.dd-item { padding: 8px 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 13px; border-bottom: 1px solid var(--bg); }
.dd-item:hover, .dd-item.highlighted { background: var(--accent-bg); }
.rows-scroll { overflow-x: auto; margin: 0 -12px; padding: 0 12px; }
.rows-header { display: grid; grid-template-columns: 1fr 68px 62px 58px 62px 68px 24px; gap: 6px; padding: 6px 10px; font-size: 10px; font-weight: 700; color: var(--text-sec); text-transform: uppercase; letter-spacing: .3px; }
.row-item { display: grid; grid-template-columns: 1fr 68px 62px 58px 62px 68px 24px; gap: 6px; align-items: center; background: var(--card); border-radius: var(--radius-sm); padding: 10px; margin-bottom: 6px; box-shadow: var(--shadow); animation: slideIn .2s ease; min-height: 48px; }
.row-inp { width: 100%; padding: 3px 4px; border: 1px solid var(--border); border-radius: 4px; font-family: var(--mono); font-size: 12px; font-weight: 600; text-align: right; color: var(--text); background: white; outline: none; }
.row-inp:focus { border-color: var(--accent); background: var(--accent-bg); }
.row-new { display: grid; grid-template-columns: 1fr 68px 62px 58px 62px 68px 24px; gap: 6px; align-items: center; background: var(--bg); border: 1px dashed var(--border); border-radius: var(--radius-sm); padding: 8px 10px; margin-bottom: 5px; position: relative; }
.row-new-search { position: static; }
.row-new-search input { width: 100%; padding: 5px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; font-family: var(--font); outline: none; background: white; }
.row-new-search input:focus { border-color: var(--accent); }
.row-new-search input::placeholder { color: var(--text-mut); }
.app-dropdown .dropdown { left: 0; right: 0; top: 100%; }
.row-prod { display: flex; flex-direction: column; min-width: 0; }
.row-prod-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-prod-meta { font-size: 10px; color: var(--text-mut); }
.row-val { font-family: var(--mono); font-size: 12px; font-weight: 500; text-align: right; }
.row-val.costo { color: var(--accent); font-weight: 700; font-size: 13px; }
.row-rm { background: none; border: none; color: var(--text-mut); font-size: 16px; cursor: pointer; padding: 2px; line-height: 1; text-align: center; min-width:34px; min-height:34px; display:flex; align-items:center; justify-content:center; }
.row-rm:hover { color: var(--red); }
.ot-totales { background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 55%, var(--navy-sky) 100%); color: white; border-radius: var(--radius); padding: 14px 18px; margin-top: 8px; }
.ot-tot-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: .78rem; }
.ot-tot-row span:first-child { opacity: .7; font-size: .72rem; }
.ot-tot-row.big { border-top: 1px solid rgba(255,255,255,.15); margin-top: 6px; padding-top: 8px; font-size: 1.05rem; font-weight: 700; }
.ot-tot-row.big span:first-child { opacity: 1; }
.ot-tot-mono { font-family: var(--mono); }
.lote-card { border-left: 4px solid var(--accent); }
.badge { display:inline-block; font-size:9px; font-weight:700; padding:2px 6px; border-radius:4px; text-transform:uppercase; letter-spacing:.3px; }
.badge-pendiente { background:#fff8e1; color:#856404; }
.badge-en_curso { background:#e3f2fd; color:#1565c0; }
.badge-completada { background:#e8f5e9; color:#2e7d32; }
.ot-card { cursor: pointer; transition: border-color .15s; border: 1.5px solid transparent; border-left: 4px solid var(--text-mut); }
.ot-card.estado-pendiente { border-left-color: #ffc107; }
.ot-card.estado-en_curso { border-left-color: #1976d2; }
.ot-card.estado-completada { border-left-color: #388e3c; }
.ot-card:hover { border-color: var(--accent); }
.ot-detail { font-size: 12px; color: var(--text-sec); line-height: 1.5; }
.bar-chart { margin: 12px 0; }
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.bar-label { font-size: 12px; font-weight: 600; width: 100px; flex-shrink: 0; }
.bar-track { flex: 1; height: 22px; background: var(--bg); border-radius: 6px; overflow: hidden; position: relative; }
.bar-fill { height: 100%; border-radius: 6px; transition: width .4s ease; display: flex; align-items: center; padding-left: 6px; }
.bar-fill span { font-size: 10px; font-weight: 700; color: white; white-space: nowrap; }
.bar-amount { font-family: var(--mono); font-size: 12px; font-weight: 600; width: 80px; text-align: right; flex-shrink: 0; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
.stat-box { background: var(--bg); border-radius: var(--radius-sm); padding: 8px; text-align: center; }
.stat-val { font-family: var(--mono); font-size: 1rem; font-weight: 700; color: var(--navy); }
.stat-lbl { font-size: .62rem; color: var(--text-sec); text-transform: uppercase; font-weight: 700; letter-spacing: .3px; margin-top: 1px; }
.lote-compare { display: grid; grid-template-columns: 1fr; gap: 6px; }
.lote-card-an { background: var(--bg); border-radius: var(--radius-sm); padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; }
.lote-card-an .lc-name { font-weight: 700; font-size: 13px; color: var(--navy); }
.lote-card-an .lc-detail { font-size: 11px; color: var(--text-sec); }
.lote-card-an .lc-cost { font-family: var(--mono); font-weight: 700; font-size: 14px; color: var(--accent); text-align: right; }
.lote-card-an .lc-bar { height: 4px; border-radius: 2px; margin-top: 6px; background: var(--border); overflow: hidden; }
.lote-card-an .lc-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--navy)); }
.wa-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 936px; background: white; border-top: 1px solid var(--border); padding: 10px 8px; display: none; gap: 8px; z-index: 90; }
.wa-bar .btn { flex: 1; }
/* ── PLANOS ── */
.planos-kpi-bar { display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:4px; }
.plano-kpi { flex:0 0 auto;min-width:75px;background:var(--card);border-radius:var(--radius-sm);padding:8px 10px;text-align:center;box-shadow:var(--shadow);border-top:3px solid var(--text-mut); }
.plano-kpi .pk-val { font-family:var(--mono);font-size:.95rem;font-weight:700;color:var(--navy); }
.plano-kpi .pk-lbl { font-size:.58rem;color:var(--text-sec);text-transform:uppercase;font-weight:700;letter-spacing:.3px;margin-top:1px; }
.estab-group { background:var(--card);border-radius:var(--radius);padding:12px;margin-bottom:10px;box-shadow:var(--shadow); }
.estab-header { display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px; }
.estab-name { font-family:var(--title);font-size:13px;color:var(--navy);text-transform:uppercase; }
.estab-has { font-family:var(--mono);font-size:12px;color:var(--text-sec);font-weight:600; }
.lotes-grid { display:flex;flex-wrap:wrap;gap:6px; }
.lote-rect { position:relative;border-radius:var(--radius-sm);border:2px solid rgba(0,0,0,.12);min-height:70px;padding:8px;cursor:pointer;transition:transform .15s,box-shadow .15s;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center; }
.lote-rect:hover { transform:scale(1.03);box-shadow:0 4px 16px rgba(0,0,0,.15); }
.lote-rect .lr-code { font-family:var(--title);font-size:12px;color:rgba(0,0,0,.7); }
.lote-rect .lr-has { font-family:var(--mono);font-size:11px;color:rgba(0,0,0,.5);margin-top:2px; }
.lote-rect .lr-cultivo { font-size:10px;font-weight:600;color:rgba(0,0,0,.6);margin-top:3px; }
.lote-rect .lr-variedad { font-size:9px;color:rgba(0,0,0,.4);margin-top:1px; }
.lote-rect.cult-maiz { background:#fde68a;border-color:#d97706; }
.lote-rect.cult-girasol { background:#e9d5ff;border-color:#7c3aed; }
.lote-rect.cult-soja { background:#bbf7d0;border-color:#16a34a; }
.lote-rect.cult-trigo { background:#fed7aa;border-color:#ea580c; }
.lote-rect.cult-barbecho { background:#e2e8f0;border-color:#94a3b8; }
.lote-rect.cult-empty { background:#ffffff;border-color:var(--border);border-style:dashed; }
@media(max-width:639px){ .lotes-grid{flex-direction:column;} .lote-rect{flex:0 0 100%!important;min-height:56px;} .plano-kpi{min-width:65px;padding:6px 8px;} .plano-kpi .pk-val{font-size:.82rem;} }
.plano-canvas { position:relative;width:100%;min-height:600px;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);overflow:visible; }
.plano-estab { position:absolute;cursor:grab;user-select:none;touch-action:none; }
.plano-estab.dragging { opacity:.8;z-index:100;cursor:grabbing; }
.plano-estab .pe-label { font-family:var(--title);font-size:11px;color:#333;text-align:center;margin-bottom:2px;pointer-events:none; }
.plano-estab .pe-block { border:2.5px solid #333;overflow:hidden; }
.plano-estab .pe-cell { display:flex;flex-direction:column;justify-content:center;align-items:center;padding:3px;position:relative;cursor:pointer;pointer-events:auto; }
.plano-estab .pe-cell:hover { filter:brightness(.88); }
.pe-resize { position:absolute;width:12px;height:12px;background:rgba(45,111,196,.2);border-radius:2px;z-index:10;opacity:0;transition:opacity .2s; }
.plano-estab:hover .pe-resize { opacity:1; }
/* Click-to-swap: selected lote highlight */
.pe-cell.swap-selected { outline:3px solid var(--accent);outline-offset:-3px;animation:swapPulse 1s infinite; }
.pe-cell .pe-swap { opacity:.2;transition:opacity .2s;font-size:12px; }
.pe-cell:hover .pe-swap { opacity:.6; }
@keyframes swapPulse { 0%,100%{outline-color:var(--accent);} 50%{outline-color:#f59e0b;} }

.modal-overlay { position: fixed; inset: 0; background: rgba(13,45,94,.5); display: none; align-items: center; justify-content: center; z-index: 200; padding: 16px; backdrop-filter: blur(2px); }
.modal-overlay.show { display: flex; }
.modal { background: var(--card); border-radius: var(--radius); padding: 20px; width: 100%; max-width: 420px; box-shadow: 0 16px 48px rgba(0,0,0,.25); animation: fadeUp .2s ease both; max-height: 90vh; overflow-y: auto; }
.modal-title { font-family: var(--title); font-size: 14px; color: var(--navy); text-transform: uppercase; margin-bottom: 14px; }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; }
.modal-actions .btn { flex: 1; }
.backup-bar { display: flex; gap: 6px; margin-bottom: 10px; align-items: center; justify-content: flex-end; }
.backup-bar .btn { font-size: .7rem; padding: 5px 12px; }
.backup-file-input { display: none; }
.toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:var(--navy); color:white; padding:10px 22px; border-radius:99px; font-size:13px; font-weight:600; z-index:999; animation:toastIn .3s ease, toastOut .3s ease 2.2s forwards; pointer-events:none; white-space:nowrap; box-shadow:0 4px 16px rgba(0,0,0,.25); }
@keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
@keyframes toastOut { to { opacity:0; transform:translateX(-50%) translateY(-10px); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
.fu { animation: fadeUp .26s ease both; }
.empty { text-align: center; padding: 40px 20px; color: var(--text-mut); }
.empty-icon { font-size: 32px; margin-bottom: 8px; }
@media (max-width: 639px) {
  .status-bar { flex-wrap: wrap; justify-content: center; gap: 4px 10px; }
  .rows-header { display: none; }
  .row-item { display: flex; flex-wrap: wrap; gap: 4px 8px; min-width: 0; grid-template-columns: none; }
  .row-item .row-prod { width: calc(100% - 30px); }
  .row-item .row-inp { width: 72px; font-size: 13px; padding: 5px 6px; }
  .row-item .row-val { font-size: 11px; }
  .row-item .row-rm { margin-left: auto; }
  .row-mob-line { display: flex; width: 100%; gap: 6px; align-items: center; justify-content: space-between; }
  .row-new { display: flex; gap: 6px; min-width: 0; grid-template-columns: none; }
  .row-new .row-new-search { flex: 1; }
  .row-new .row-val, .row-new > span:last-child { display: none; }
  .wa-bar { padding: 8px 6px; gap: 6px; }
  .wa-bar .btn { font-size: .72rem; padding: 10px 8px; }
  .bar-label { width: 70px; font-size: 11px; }
  .bar-amount { width: 65px; font-size: 11px; }
  .ot-actions { flex-wrap: wrap; }
  .ot-actions .btn { min-height: 40px; }
  .ot-actions .btn-danger { margin-left: auto; }
}
@media (min-width: 640px) { .row-mob-line { display: contents; } }
@media (max-width: 380px) { body { font-size: 14px; } .tab-btn { font-size: .7rem; padding: 9px 2px; } .card { padding: 10px; } }

<!-- wa-bar removed: actions are now inline in the form -->

<script>
const $ = id => document.getElementById(id);
const fmt = n => Number(n).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtInt = n => Number(n).toLocaleString('es-AR', { maximumFractionDigits: 0 });
const dateStr = (d = new Date()) => d.toLocaleDateString('es-AR');
const dateISO = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML.replace(/'/g, '&#39;'); }
function showToast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2600); }

const Storage = {
  _counter: 0,
  _productorKey() { return 'sc_data_' + (currentProductor || 'default'); },
  defaults() { return { lotes: [], ordenes: [], aplicadores: [], campana: '2025/26', loteOrder: {} }; },
  load() {
    try { const d = JSON.parse(localStorage.getItem(this._productorKey())); if (d && (d.lotes || d.campos || d.campolotes)) return d; } catch(e) {}
    // Fallback: try old key for migration
    try { const d = JSON.parse(localStorage.getItem('sc_data')); if (d && (d.lotes || d.campos)) return d; } catch(e) {}
    return this.defaults();
  },
  save(d) { try { localStorage.setItem(this._productorKey(), JSON.stringify(d)); } catch(e) { console.error('localStorage full:', e); showToast('Error: almacenamiento lleno'); } Cloud.queueSync(); },
  nextId(prefix) { return prefix + '_' + Date.now() + '_' + (++this._counter); }
};

const API_URL = 'https://script.google.com/macros/s/AKfycbyoK9r8Scj6WBhl_XUUiAU_kcpTVtGKSlDH9WHmVlRGNo-jt-QbLqlg5BNY5RGAhHV8kw/exec';
function debounce(fn, ms) { let t; return function(...a) { clearTimeout(t); t = setTimeout(() => fn.apply(this, a), ms); }; }
const debouncedRenderOrdenes = debounce(() => App.renderOrdenes(), 200);
let catalogo = (() => { try { return JSON.parse(localStorage.getItem('sc_catalogo_cache') || 'null') || {}; } catch(e) { return {}; } })();
async function loadCatalog() {
  try { const res = await fetch(API_URL + '?action=getCatalogoAgro&_t=' + Date.now(), { cache: 'no-store' }); const d = await res.json();
    if (d.ok && d.catalogo) { catalogo = d.catalogo; localStorage.setItem('sc_catalogo_cache', JSON.stringify(catalogo)); }
  } catch(e) {}
}

/* ══════════════════════════════════════
   CLOUD SYNC (Google Sheets)
   ══════════════════════════════════════ */
const Cloud = {
  _syncTimer: null,
  _syncing: false,

  setStatus(msg, isError) {
    const el = $('status-text'), dot = $('status-dot');
    if (el) { el.textContent = msg; el.style.color = isError ? 'var(--red)' : ''; }
    if (dot) {
      if (isError) dot.style.background = 'var(--red)';
      else if (msg.startsWith('Guardado') || msg === 'Datos cargados') dot.style.background = 'var(--green)';
      else if (msg.startsWith('Guardando') || msg.startsWith('Cargando')) dot.style.background = 'var(--orange)';
      else dot.style.background = 'var(--text-mut)';
    }
  },

  // Debounced sync — waits 3s after last change before syncing
  queueSync() {
    if (!currentProductor) return;
    if (Cloud._syncTimer) clearTimeout(Cloud._syncTimer);
    Cloud._syncTimer = setTimeout(() => Cloud.saveToCloud(), 3000);
    Cloud.setStatus('Cambios sin guardar...');
  },

  async saveToCloud() {
    if (!currentProductor || Cloud._syncing) return;
    Cloud._syncing = true;
    Cloud.setStatus('Guardando...');
    const timeout = setTimeout(() => { Cloud._syncing = false; }, 15000); // Safety: reset after 15s
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'saveCampana', productor: currentProductor, data })
      });
      clearTimeout(timeout);
      const result = await res.json();
      if (result.ok) {
        Cloud.setStatus('Sincronizado ' + new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }));
        const dot = $('status-dot'); if (dot) dot.style.background = 'var(--green)';
      } else {
        Cloud.setStatus('Error: ' + (result.error || '?'), true);
      }
    } catch(e) {
      console.error('Cloud save error:', e);
      Cloud.setStatus('Sin conexion (local OK)', true);
    }
    Cloud._syncing = false;
  },

  async loadFromCloud() {
    if (!currentProductor) return null;
    Cloud.setStatus('Cargando...');
    try {
      const res = await fetch(API_URL + '?action=loadCampana&productor=' + encodeURIComponent(currentProductor) + '&_t=' + Date.now(), { cache: 'no-store', redirect: 'follow' });
      const result = await res.json();
      if (result.ok && result.data) {
        Cloud.setStatus('Datos cargados');
        return result.data;
      } else if (result.ok && result.isNew) {
        Cloud.setStatus('Productor nuevo');
        return null;
      } else {
        Cloud.setStatus('Error al cargar', true);
        return null;
      }
    } catch(e) {
      Cloud.setStatus('Offline — datos locales', true);
      return null;
    }
  },

  async loadProductores() {
    try {
      const res = await fetch(API_URL + '?action=listProductores&_t=' + Date.now(), { cache: 'no-store' });
      const result = await res.json();
      if (result.ok) return result.productores || [];
    } catch(e) {}
    return [];
  }
};

/* ══════════════════════════════════════
   PRODUCTOR LOGIN
   ══════════════════════════════════════ */
let currentProductor = '';
const USUARIOS = [
  { id: 'JAM', nombre: 'JAM', productor: 'Juan Augusto' },
  { id: 'Ginar', nombre: 'Ginar', productor: 'Ginar' },
  { id: 'DMyAG', nombre: 'DM y AG', productor: 'DMyAG' },
  { id: 'FabioyTomas', nombre: 'Fabio y Tomas', productor: 'FabioyTomas' }
];
const savedUserId = localStorage.getItem('sc_user_id');

function migrateData(d) {
  if (!d) return Storage.defaults();
  if (d.campos && !d.lotes) {
    d.lotes = [];
    d.campos.forEach(c => (c.lotes || []).forEach(l => d.lotes.push({ id: l.id, nombre: c.nombre + ', ' + l.nombre, hectareas: l.hectareas || 0, cultivo: l.cultivo || '' })));
    delete d.campos; delete d.campolotes;
  }
  if (d.campolotes && !d.lotes) {
    d.lotes = d.campolotes.map(cl => ({ id: cl.id, nombre: cl.campo + ', ' + cl.lote, hectareas: cl.hectareas || 0, cultivo: cl.cultivo || '' }));
    delete d.campolotes;
  }
  if (!d.lotes) d.lotes = [];
  d.ordenes = d.ordenes || [];
  d.ordenes.forEach(o => {
    if (!o.aplicaciones && o.productos) o.aplicaciones = [{ lotes: [{ loteId: o.loteId || '', hectareas: o.hectareas, cultivo: o.cultivo }], productos: o.productos }];
    if (o.aplicaciones) o.aplicaciones.forEach(a => {
      if (!a.lotes) { a.lotes = a.loteId ? [{ loteId: a.loteId, hectareas: a.hectareas || 0, cultivo: a.cultivo || '' }] : []; delete a.loteId; delete a.hectareas; delete a.cultivo; }
    });
  });
  return d;
}

let data = Storage.defaults();

// Migration runs inside migrateData() on login

// Helper: total has for an aplicacion
function appTotalHas(a) { return (a.lotes || []).reduce((s, l) => s + (l.hectareas || 0), 0); }

let editingOrdenId = null, aplicaciones = [], currentAppIdx = 0, currentOTRows = [];
let rowIdCounter = 0, filtroOT = 'todas', highlightIdx = -1, ddItems = [];
let aplicadorHighlight = -1, aplicadorMatches = [], formDirty = false;

function openModal(html) { $('modal-body').innerHTML = html; $('modal-overlay').classList.add('show'); const f = $('modal-body').querySelector('input,select,textarea'); if (f) setTimeout(() => f.focus(), 50); }
function closeModal() { $('modal-overlay').classList.remove('show'); $('modal-body').innerHTML = ''; }
document.addEventListener('click', e => { if (e.target.id === 'modal-overlay') closeModal(); });

/* ══════════════════════════════════════
   APP
   ══════════════════════════════════════ */
const App = {
  async loginProductor(userId) {
    const u = USUARIOS.find(x => x.id === userId);
    if (!u) return;

    // Remember selection
    localStorage.setItem('sc_user_id', userId);

    currentProductor = u.productor;
    localStorage.setItem('sc_productor', u.productor);

    // Disable buttons while loading
    document.querySelectorAll('#user-buttons button').forEach(b => { b.disabled = true; b.style.opacity = '0.5'; });
    const activeBtn = document.querySelector(`#user-buttons button[data-uid="${userId}"]`);
    if (activeBtn) { activeBtn.textContent = 'Cargando...'; activeBtn.style.opacity = '1'; }

    try {
      // FAST: Load from localStorage instantly (0ms)
      data = migrateData(Storage.load());

      // If no local data, try import file first (fast, from same server)
      const importFiles = { JAM:'import-jam-25-26.json', Ginar:'import-ginar-25-26.json', DMyAG:'import-dmag-25-26.json', FabioyTomas:'import-fabiotomas-25-26.json' };
      if ((!data.ordenes || !data.ordenes.length) && (!data.lotes || !data.lotes.length) && importFiles[userId]) {
        try {
          const res = await fetch(importFiles[userId]);
          if (res.ok) { data = await res.json(); Storage.save(data); }
        } catch(e) {}
      }

      // Show app IMMEDIATELY with local data
      $('productor-gate').style.display = 'none';
      $('app-main').style.display = '';
      $('productor-label').textContent = u.nombre + ' ▾';
      App.init();

      // BACKGROUND: Sync from cloud (doesn't block UI)
      Cloud.loadFromCloud().then(cloudData => {
        if (cloudData) {
          const migrated = migrateData(cloudData);
          // Only update if cloud has more data or different data
          const cloudOrdenes = migrated.ordenes?.length || 0;
          const localOrdenes = data.ordenes?.length || 0;
          if (cloudOrdenes > localOrdenes || JSON.stringify(migrated.lotes?.length) !== JSON.stringify(data.lotes?.length)) {
            data = migrated;
            Storage.save(data);
            if (Cloud._syncTimer) { clearTimeout(Cloud._syncTimer); Cloud._syncTimer = null; }
            // Refresh visible tab
            App.renderLotes(); App._tabRendered = { lotes: true, planos: false, ordenes: false, analisis: false };
            const at = document.querySelector('.tab-btn.active')?.dataset?.tab;
            if (at === 'planos') { App.renderPlanos(); App._tabRendered.planos = true; }
            else if (at === 'ordenes') { App.renderOrdenes(); App._tabRendered.ordenes = true; }
            else if (at === 'analisis') { App.renderAnalisis(); App._tabRendered.analisis = true; }
            App.refreshSelectors();
          }
        }
        // Merge missing lotes from import
        if (importFiles[userId] && data.lotes?.length) {
          fetch(importFiles[userId]).then(r => r.ok ? r.json() : null).then(imp => {
            if (!imp) return;
            let added = false;
            (imp.lotes || []).forEach(il => { if (!data.lotes.find(l => l.id === il.id)) { data.lotes.push(JSON.parse(JSON.stringify(il))); added = true; } });
            if (added) { Storage.save(data); App.renderLotes(); }
          }).catch(() => {});
        }
      });
    } finally {
      document.querySelectorAll('#user-buttons button').forEach(b => { b.disabled = false; b.style.opacity = '1'; b.textContent = USUARIOS.find(x => x.id === b.dataset.uid)?.nombre || ''; });
    }
  },

  setCampanaDefault() {
    const camp = data.campana;
    localStorage.setItem('sc_campana_default', camp);
    const btn = $('btn-camp-default');
    if (btn) btn.textContent = '★';
    showToast('Campaña ' + camp + ' fijada como predeterminada');
  },

  _updateCampanaDefaultBtn() {
    const btn = $('btn-camp-default');
    if (!btn) return;
    const saved = localStorage.getItem('sc_campana_default');
    btn.textContent = saved === data.campana ? '★' : '☆';
    btn.style.color = saved === data.campana ? '#d97706' : 'var(--text-mut)';
  },

  logoutProductor() {
    if (formDirty && !confirm('Hay cambios sin guardar. Salir?')) return;
    if (Cloud._syncTimer) { clearTimeout(Cloud._syncTimer); Cloud._syncTimer = null; }
    Cloud.saveToCloud();
    currentProductor = '';
    localStorage.removeItem('sc_productor');
    localStorage.removeItem('sc_user_id');
    $('productor-gate').style.display = '';
    $('app-main').style.display = 'none';
    formDirty = false;
    // Clear all views to prevent stale data when switching users
    $('lotes-list').innerHTML = '';
    $('ordenes-list').innerHTML = '';
    $('analisis-body').innerHTML = '';
    $('planos-kpis').innerHTML = '';
    $('planos-map').innerHTML = '';
    // Reset to first tab
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelector('[data-tab="lotes"]').classList.add('active');
    $('tab-lotes').classList.add('active');
  },


  init() {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
      if (formDirty && btn.dataset.tab !== 'nueva-ot') { if (!confirm('Hay una OT sin guardar. Salir de todos modos?')) return; }
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active'); $('tab-' + btn.dataset.tab).classList.add('active');
      const tab = btn.dataset.tab;
      // Lazy render: only render tab content on first visit or if data changed
      if (tab === 'ordenes' && !App._tabRendered?.ordenes) { App.renderOrdenes(); App._tabRendered.ordenes = true; }
      else if (tab === 'ordenes') App.renderOrdenes();
      if (tab === 'analisis') { App.renderAnalisis(); App._tabRendered.analisis = true; }
      if (tab === 'planos' && !App._tabRendered?.planos) { App.renderPlanos(); App._tabRendered.planos = true; }
      else if (tab === 'planos') {} // Already rendered, skip
      if (tab === 'nueva-ot') App.refreshSelectors();
    }));
    document.addEventListener('click', e => {
      if (!e.target.closest('.row-new-search') && !e.target.closest('#ot-dropdown')) App.hideDropdown();
      if (!e.target.closest('#ot-aplicador') && !e.target.closest('#aplicador-dd')) App.hideAplicadorDD();
      if (!e.target.closest('#ot-tipo') && !e.target.closest('#tipo-dd')) App.hideTipoDD();
    });
    let lastScrollY = window.scrollY;
    window.addEventListener('scroll', () => {
      const dd = $('ot-dropdown');
      if (dd.classList.contains('show')) {
        const activeInput = document.querySelector('.app-block.active-app .app-search');
        if (activeInput) {
          const rect = activeInput.getBoundingClientRect();
          dd.style.top = rect.bottom + 'px';
          dd.style.left = rect.left + 'px';
          dd.style.width = rect.width + 'px';
        }
        if (Math.abs(window.scrollY - lastScrollY) > 50) {
          App.hideDropdown();
        }
      }
      if (Math.abs(window.scrollY - lastScrollY) > 50) {
        App.hideAplicadorDD(); App.hideTipoDD();
        lastScrollY = window.scrollY;
      }
    }, true);
    document.addEventListener('keydown', e => {
      const inp = e.target.closest('.app-search');
      if (!inp) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); App.moveHighlight(1); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); App.moveHighlight(-1); }
      else if (e.key === 'Enter') { e.preventDefault(); if (highlightIdx >= 0) App.selectFromDropdown(highlightIdx); else if (inp.value.trim()) App.addManual(inp.value.trim()); }
      else if (e.key === 'Escape') App.hideDropdown();
    });
    $('ot-aplicador').addEventListener('keydown', e => {
      const dd = $('aplicador-dd'); if (!dd.classList.contains('show')) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); App.moveAplicadorHighlight(1); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); App.moveAplicadorHighlight(-1); }
      else if (e.key === 'Enter') { e.preventDefault(); App.selectAplicadorHighlight(); }
      else if (e.key === 'Escape') App.hideAplicadorDD();
    });
    const cs = $('campana-select');
    // Dynamic: current campaign year (Jul-Jun cycle) + previous + next
    const now = new Date(), campYear = now.getMonth() >= 6 ? now.getFullYear() : now.getFullYear() - 1;
    const currentCamp = campYear + '/' + String(campYear + 1).slice(2);
    const prevCamp = (campYear - 1) + '/' + String(campYear).slice(2);
    const nextCamp = (campYear + 1) + '/' + String(campYear + 2).slice(2);
    const campanas = [prevCamp, currentCamp, nextCamp];
    campanas.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; cs.appendChild(o); });
    const savedDefault = localStorage.getItem('sc_campana_default');
    if (!data.campana) data.campana = savedDefault || '2025/26';
    if (!campanas.includes(data.campana)) { const o = document.createElement('option'); o.value = data.campana; o.textContent = data.campana; cs.appendChild(o); }
    cs.value = data.campana;
    App._updateCampanaDefaultBtn();
    cs.addEventListener('change', function() {
      data.campana = this.value;
      App._updateCampanaDefaultBtn();
      // Clear pending sync before switching campaign
      if (Cloud._syncTimer) { clearTimeout(Cloud._syncTimer); Cloud._syncTimer = null; }
      Storage.save(data);
      // Invalidate caches and re-render only visible tab + lotes
      App._tabRendered = { lotes: true, planos: false, ordenes: false, analisis: false };
      App.renderLotes(); App.refreshSelectors();
      // Render the currently active tab
      const activeTab = document.querySelector('.tab-btn.active')?.dataset?.tab;
      if (activeTab === 'planos') { App.renderPlanos(); App._tabRendered.planos = true; }
      else if (activeTab === 'ordenes') { App.renderOrdenes(); App._tabRendered.ordenes = true; }
      else if (activeTab === 'analisis') { App.renderAnalisis(); App._tabRendered.analisis = true; }
    });
    $('ot-fecha').value = dateISO();
    window.addEventListener('beforeunload', e => { if (formDirty) { e.preventDefault(); e.returnValue = ''; } });
    App._migratePlanKeys();
    App._migrateCultivoToPlans();
    App._initAplicaciones(); App.renderLotes(); App.refreshSelectors();
    // Defer non-visible tabs — render only when first visited
    App._tabRendered = { lotes: true, planos: false, ordenes: false, analisis: false };
    loadCatalog().then(() => App._assignCatalogPrices());
  },

  _assignCatalogPrices() {
    if (!Object.keys(catalogo).length || !data.ordenes.length) return;
    // Build lookup: product name (lowercase) -> precio_usd
    const lookup = {};
    Object.values(catalogo).forEach(items => items.forEach(p => {
      lookup[p.producto.toLowerCase()] = p.precio_usd || 0;
    }));
    let updated = false;
    data.ordenes.forEach(o => {
      (o.aplicaciones || []).forEach(a => {
        (a.productos || []).forEach(p => {
          if ((!p.precio || p.precio === 0) && lookup[p.producto.toLowerCase()]) {
            p.precio = lookup[p.producto.toLowerCase()];
            updated = true;
          }
        });
      });
    });
    if (updated) Storage.save(data);
  },

  // Helper: get plan for a campaign, handling both '2025/26' and '25/26' key formats
  _getPlan(lote, campKey) {
    if (!lote.planes) return {};
    // Try exact key first
    if (lote.planes[campKey]) return lote.planes[campKey];
    // Try short format: '2025/26' → '25/26'
    const short = campKey.replace(/^\d{2}/, '');
    if (lote.planes[short]) return lote.planes[short];
    // Try long format: '25/26' → '2025/26'
    if (campKey.length <= 5) {
      const long = '20' + campKey;
      if (lote.planes[long]) return lote.planes[long];
    }
    return {};
  },

  // Migrate lote.cultivo to plan 2025/26 (one-time migration)
  _migrateCultivoToPlans() {
    let changed = false;
    data.lotes.forEach(l => {
      if (l.cultivo && (!l.planes || !l.planes['2025/26'] || !l.planes['2025/26'].cultivo)) {
        if (!l.planes) l.planes = {};
        l.planes['2025/26'] = l.planes['2025/26'] || {};
        l.planes['2025/26'].cultivo = l.planes['2025/26'].cultivo || l.cultivo;
        l.planes['2025/26'].variedad = l.planes['2025/26'].variedad || l.variedad || '';
        l.planes['2025/26'].densidad = l.planes['2025/26'].densidad || l.densidad || 0;
        changed = true;
      }
    });
    if (changed) Storage.save(data);
  },

  // Migrate plan keys from short to long format
  _migratePlanKeys() {
    let changed = false;
    data.lotes.forEach(l => {
      if (!l.planes) return;
      const keys = Object.keys(l.planes);
      keys.forEach(k => {
        // Convert '25/26' to '2025/26', 'fina_25/26' to 'fina_2025/26'
        let newKey = k;
        if (/^\d{2}\/\d{2}$/.test(k)) { newKey = '20' + k; }
        else if (/^fina_\d{2}\/\d{2}$/.test(k)) { newKey = 'fina_20' + k.slice(5); }
        if (newKey !== k) {
          l.planes[newKey] = l.planes[k];
          delete l.planes[k];
          changed = true;
        }
      });
    });
    if (changed) Storage.save(data);
  },

  /* ── LOTES CRUD ── */
  renderLotes() {
    const el = $('lotes-list');
    if (!data.lotes.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">🌾</div><p>Sin lotes registrados</p><p style="font-size:12px;margin-top:4px;">Agrega tu primer lote para empezar</p></div>'; return; }
    const campPlan = data.campana || '2025/26';
    const finaKey = 'fina_' + campPlan;
    const cColor = (c) => ({'cult-maiz':'#d97706','cult-girasol':'#7c3aed','cult-soja':'#16a34a','cult-trigo':'#ea580c','cult-barbecho':'#94a3b8'}[App._cultivoClass(c)] || '#94a3b8');

    const cultivoBadge = (cult, vari) => {

    };

    const priceCell = (p) => p ? `<span style="font-family:var(--mono);font-size:12px;color:var(--green);font-weight:600;">$${fmtInt(p)}</span>` : '<span style="color:var(--text-mut);font-size:12px;">—</span>';
    const gridCols = '55px 80px 40px 24px 2px 95px 48px 38px 38px 22px 2px 95px 48px 38px 38px 22px';

    // Group by establecimiento
    const groups = {};
    data.lotes.forEach(l => { const e = l.establecimiento || 'Sin estab.'; if (!groups[e]) groups[e] = []; groups[e].push(l); });
    Object.values(groups).forEach(arr => arr.sort((a,b) => a.nombre.localeCompare(b.nombre, undefined, {numeric:true})));

    let html = '';
    const totalHas = data.lotes.reduce((s,l) => s + (l.hectareas||0), 0);

    // Summary KPIs
    const gruesaCults = {}, finaCults = {};
    data.lotes.forEach(l => {
      const g = App._getPlan(l, campPlan); const f = App._getPlan(l, finaKey);
      if (g.cultivo) gruesaCults[g.cultivo] = (gruesaCults[g.cultivo]||0) + (l.hectareas||0);
      if (f.cultivo) finaCults[f.cultivo] = (finaCults[f.cultivo]||0) + (l.hectareas||0);
    });

    html += `<div class="card fu" style="padding:10px 14px;margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div><span style="font-family:var(--title);font-size:13px;color:var(--navy);">${data.lotes.length} LOTES</span>
        <span style="font-family:var(--mono);font-size:12px;color:var(--text-sec);margin-left:8px;">${fmtInt(totalHas)} ha totales</span></div>
      </div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;">
        <div><div style="font-size:9px;font-weight:700;color:var(--text-mut);text-transform:uppercase;margin-bottom:4px;">Gruesa ${esc(campPlan)}</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;">${Object.entries(gruesaCults).sort((a,b)=>b[1]-a[1]).map(([c,h])=>`<span style="font-size:10px;padding:2px 6px;border-radius:10px;background:${cBg(c)};color:${cColor(c)};font-weight:600;">${esc(c)} ${fmtInt(h)}</span>`).join('')||'<span style="font-size:10px;color:var(--text-mut);">Sin planificar</span>'}</div>
        </div>
        <div><div style="font-size:9px;font-weight:700;color:var(--text-mut);text-transform:uppercase;margin-bottom:4px;">Fina</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;">${Object.entries(finaCults).sort((a,b)=>b[1]-a[1]).map(([c,h])=>`<span style="font-size:10px;padding:2px 6px;border-radius:10px;background:${cBg(c)};color:${cColor(c)};font-weight:600;">${esc(c)} ${fmtInt(h)}</span>`).join('')||'<span style="font-size:10px;color:var(--text-mut);">Sin planificar</span>'}</div>
        </div>
      </div>
    </div>`;

    // Table header
    html += `<div style="overflow-x:auto;"><div style="min-width:920px;">`;
    html += `<div style="display:grid;grid-template-columns:${gridCols};gap:3px;padding:8px 12px;font-size:9px;font-weight:700;color:var(--text-mut);text-transform:uppercase;letter-spacing:.3px;border-bottom:2px solid var(--navy);">
      <span>Lote</span><span>Estab.</span><span style="text-align:right;">Ha</span><span></span>
      <span></span><span style="text-align:center;color:#ea580c;">Fina</span><span style="text-align:center;color:#ea580c;">Dens</span><span style="text-align:center;color:#ea580c;">Rde</span><span style="text-align:center;color:#ea580c;">USD</span><span></span>
      <span></span><span style="text-align:center;color:#d97706;">Gruesa</span><span style="text-align:center;color:#d97706;">Dens</span><span style="text-align:center;color:#d97706;">Rde</span><span style="text-align:center;color:#d97706;">USD</span><span></span>
    </div>`;

    Object.entries(groups).forEach(([est, lotes]) => {
      const estHas = lotes.reduce((s,l) => s + (l.hectareas||0), 0);
      html += `<div style="padding:6px 12px;background:var(--navy);color:white;font-family:var(--title);font-size:12px;text-transform:uppercase;margin-top:4px;border-radius:4px;display:flex;align-items:center;gap:8px;white-space:nowrap;">
        <span>${esc(est)}</span>
        <span style="font-family:var(--mono);font-weight:400;font-size:11px;opacity:.7;">${fmtInt(estHas)} ha</span>
      </div>`;

      lotes.forEach((l, i) => {
        const gruesa = App._getPlan(l, campPlan);
        const fina = App._getPlan(l, finaKey);
        const gCult = gruesa.cultivo || '';
        const bg = i % 2 === 0 ? '#fff' : '#f8fafc';
        html += `<div style="display:grid;grid-template-columns:${gridCols};gap:3px;padding:7px 12px;background:${bg};border-bottom:1px solid var(--border);align-items:center;">
          <span style="font-weight:700;font-size:13px;color:var(--navy);">${esc(l.nombre)}</span>
          <span style="font-size:11px;color:var(--text-sec);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(l.establecimiento||'')}</span>
          <span style="text-align:right;font-family:var(--mono);font-weight:700;font-size:13px;">${l.hectareas}</span>
          <span style="display:flex;gap:1px;align-items:center;">
            <button style="background:none;border:none;cursor:pointer;padding:2px;" onclick="App.openLoteModal('${esc(l.id)}')" title="Editar lote"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></button>
            <button style="background:none;border:none;cursor:pointer;padding:1px;opacity:.2;" onclick="if(confirm('Eliminar ${esc(l.nombre)}?'))App.removeLote('${esc(l.id)}')" title="Eliminar"><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2.5" stroke-linecap="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>
          </span>
          <span style="background:#ea580c;width:2px;height:100%;border-radius:1px;opacity:.25;"></span>
          <span style="text-align:center;">${cultivoBadge(fina.cultivo, fina.variedad)}</span>
          <span style="text-align:center;">${numCell(fina.densidad)}</span>
          <span style="text-align:center;">${numCell(fina.rinde)}</span>
          <span style="text-align:center;">${priceCell(fina.precio)}</span>
          <span style="text-align:center;"><button onclick="App.openPlanModal('${esc(l.id)}','${finaKey}')" style="background:none;border:none;cursor:pointer;padding:2px;display:inline-flex;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linecap="round"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></button></span>
          <span style="background:#d97706;width:2px;height:100%;border-radius:1px;opacity:.25;"></span>
          <span style="text-align:center;">${cultivoBadge(gCult, gruesa.variedad)}</span>

          <span style="text-align:center;">${numCell(gruesa.rinde)}</span>

        </div>`;

    html += `</div></div>`;
    el.innerHTML = html;
  },
  /* ── PLANOS ── */
  _cultivoClass(c) {
    if (!c) return 'cult-empty';
    const cl = c.toLowerCase();
    if (cl.includes('maiz') || cl.includes('maíz')) return 'cult-maiz';
    if (cl.includes('girasol')) return 'cult-girasol';
    if (cl.includes('soja')) return 'cult-soja';
    if (cl.includes('trigo') || cl.includes('cebada')) return 'cult-trigo';
    if (cl.includes('barbecho')) return 'cult-barbecho';
    if (cl.includes('pastura')) return 'cult-pastura';
    return 'cult-empty';
  },
  _cultivoColor(c) {
    const map = {'cult-maiz':'#d97706','cult-girasol':'#7c3aed','cult-soja':'#16a34a','cult-trigo':'#ea580c','cult-barbecho':'#94a3b8','cult-pastura':'#e11d48','cult-empty':'#cbd5e1'};
    return map[App._cultivoClass(c)] || '#cbd5e1';
  },
  renderPlanos() {
    const campPlan = data.campana || '2025/26';
    const lbl = $('plan-campana-label'); if (lbl) lbl.textContent = campPlan;
    const kpiEl = $('planos-kpis'), mapEl = $('planos-map');
    if (!data.lotes.length) { kpiEl.innerHTML=''; mapEl.innerHTML='<div class="empty"><div class="empty-icon">🗺️</div><p>Sin lotes</p></div>'; return; }

    // Group by establecimiento
    const groups = {};
    data.lotes.forEach(l => {
      const estab = l.establecimiento || 'Sin establecimiento';
      if (!groups[estab]) groups[estab] = { lotes:[], totalHas:0 };
      const plan = App._getPlan(l, campPlan);
      groups[estab].lotes.push({ ...l, plan });
      groups[estab].totalHas += l.hectareas || 0;
    });

    // Lote order per establishment (persistent, editable via click-to-swap on plano)
    if (!data.loteOrder) data.loteOrder = {};
    // Default orders for DM y AG (only applied if no custom order saved for that estab)
    const _defaultOrders = {
      'AM': ['AM5','AM6','AM7','AM8','AM4','AM2','AM3','AM1'],
      'El Frances': ['EF5','EF6','EF7','EF8','EF4','EF3','EF2','EF1'],
      'Sucesion': ['SC6','SC1','SC5','SC4','SC2','SC3'],
    };
    Object.entries(groups).forEach(([estab, gd]) => {
      const order = data.loteOrder[estab] || _defaultOrders[estab];
      if (order) {
        gd.lotes.sort((a,b) => {
          const ia = order.indexOf(a.nombre), ib = order.indexOf(b.nombre);
          return (ia===-1?999:ia) - (ib===-1?999:ib);
        });
      }
    });

    // KPIs
    const byCultivo = {};
    let totalPlan = 0, totalSinPlan = 0;
    data.lotes.forEach(l => {
      const plan = App._getPlan(l, campPlan);
      if (plan.cultivo) { byCultivo[plan.cultivo] = (byCultivo[plan.cultivo]||0) + (l.hectareas||0); totalPlan += l.hectareas||0; }
      else { totalSinPlan += l.hectareas||0; }
    });

    let kH = '<div class="planos-kpi-bar">';
    kH += `<div class="plano-kpi" style="border-top-color:var(--navy);"><div class="pk-val">${fmtInt(totalPlan+totalSinPlan)}</div><div class="pk-lbl">Total has</div></div>`;
    Object.entries(byCultivo).sort((a,b)=>b[1]-a[1]).forEach(([c,h])=>{
      kH += `<div class="plano-kpi" style="border-top-color:${App._cultivoColor(c)};"><div class="pk-val">${fmtInt(h)}</div><div class="pk-lbl">${esc(c)}</div></div>`;
    });
    if (totalSinPlan > 0) kH += `<div class="plano-kpi" style="border-top-color:var(--border);border-style:dashed;"><div class="pk-val">${fmtInt(totalSinPlan)}</div><div class="pk-lbl">Sin asignar</div></div>`;
    kH += '</div>';
    kpiEl.innerHTML = kH;

    // Map — drag & drop field planner
    const bgMap = {'cult-maiz':'#f0d060','cult-girasol':'#d4b0e8','cult-soja':'#90dba0','cult-trigo':'#f0c090','cult-barbecho':'#d0d0d0','cult-pastura':'#f8b0b0','cult-empty':'#ffffff'};

    // Load saved positions from data (syncs to Sheets)
    if (!data.planoPos) data.planoPos = {};
    const savedPos = data.planoPos;

    // Default positions + layout matching the Excel plano reference
    // layout: 'h'=horizontal (lotes side by side), 'v'=vertical (lotes stacked), 'g'=grid (auto)
    const defaultPos = {
      'San Clemente':  {x:3,y:8,w:17,h:85,layout:'custom'},
      '2 Hermanas':    {x:55,y:3,w:20,h:16,layout:'h'},
      'La Porteña':    {x:82,y:3,w:12,h:38,layout:'v'},
      'El Parche 2':   {x:44,y:24,w:10,h:18,layout:'h'},
      'El Parche':     {x:28,y:54,w:26,h:42,layout:'h'},
      'Doña josefa':   {x:56,y:54,w:32,h:42,layout:'h'},
      'Pirovano':      {x:22,y:8,w:14,h:40,layout:'h'},
      'Charterina':    {x:88,y:54,w:10,h:35,layout:'v'},
      'Ginar':         {x:30,y:5,w:18,h:45,layout:'g'},
      'La Primavera':  {x:2,y:5,w:26,h:90,layout:'h'},
      // Fabio y Tomas defaults
      'PM':               {x:2,y:3,w:30,h:28,layout:'g'},
      'Santa Maria':      {x:38,y:3,w:32,h:45,layout:'g'},
      'San Salvador':     {x:78,y:3,w:20,h:92,layout:'g'},
      'Guazone':          {x:2,y:35,w:18,h:25,layout:'g'},
      'Fito Mateos':      {x:2,y:63,w:11,h:18,layout:'h'},
      'Masceroni-Coscia': {x:34,y:52,w:24,h:42,layout:'g'},
      'El Socorro':       {x:58,y:42,w:18,h:35,layout:'h'},
      // DM y AG defaults
      'AM':               {x:28,y:2,w:40,h:28,layout:'g'},
      'Sucesion':         {x:68,y:18,w:31,h:48,layout:'g4'},
      'El Frances':       {x:1,y:18,w:28,h:50,layout:'g4'},
      'La Tapera':        {x:38,y:32,w:16,h:32,layout:'v'},
      'FM':               {x:35,y:66,w:20,h:32,layout:'g'}
    };

    const getPos = (estab) => {
      const saved = savedPos[estab];
      const def = defaultPos[estab] || {x:5,y:5,w:18,h:25,layout:'g'};
      if (saved) { if (!saved.layout) saved.layout = def.layout || 'g'; return saved; }
      return def;
    };

    // Build canvas
    let mH = `<div class="plano-canvas" id="plano-canvas" style="min-height:600px;padding:30px 10px 10px;">`;
    mH += `<div style="position:absolute;top:8px;left:50%;transform:translateX(-50%);font-family:var(--title);font-size:14px;color:var(--navy);text-transform:uppercase;letter-spacing:2px;z-index:5;">CAMPAÑA ${esc(campPlan)}</div>`;

    // Helper: standard lote cell (with swap button)
    const cellHtml = (l, estab) => {
      const cc = App._cultivoClass(l.plan.cultivo || '');
      const bg = bgMap[cc] || '#fff';
      const cultivo = l.plan.cultivo || '';
      return `<div class="pe-cell" data-swap-id="${esc(l.id)}" style="background:${bg};border-right:1.5px solid rgba(0,0,0,.2);border-bottom:1.5px solid rgba(0,0,0,.2);justify-content:center;align-items:center;text-align:center;position:relative;" onclick="App.openPlanModal('${esc(l.id)}')">
        <div class="pe-swap" onclick="event.stopPropagation();App.swapLote('${esc(l.id)}','${esc(estab||'')}')" title="Click para intercambiar posición" style="position:absolute;top:2px;right:2px;width:16px;height:16px;cursor:pointer;opacity:.25;z-index:5;display:flex;align-items:center;justify-content:center;">⇄</div>
        <div style="font-family:var(--title);font-size:11px;color:rgba(0,0,0,.55);letter-spacing:.5px;">${esc(l.nombre)}</div>
        <div style="font-family:var(--mono);font-size:13px;font-weight:700;color:rgba(0,0,0,.45);margin:1px 0;">${l.hectareas} <span style="font-size:9px;font-weight:400;">ha</span></div>
        ${cultivo ? `<div style="font-size:9px;font-weight:600;color:rgba(0,0,0,.5);">${esc(cultivo)}</div>` : ''}
        ${l.plan.variedad ? `<div style="font-size:8px;font-weight:600;color:rgba(0,0,0,.35);font-family:var(--mono);">${esc(l.plan.variedad)}${l.plan.densidad ? ' · ' + fmtInt(l.plan.densidad) : ''}</div>` : ''}
      </div>`;
    };

    // Helper: San Clemente special layout with diagonal road
    const renderSanClemente = (estab, gd, pos, campOverride) => {
      // SC has 4 lotes: SC1(girasol, top-left), SC2(maíz, top-right), SC3(maíz, mid-right), SC4(girasol, bottom)
      // A diagonal road goes from ~top-left to ~bottom-center-right
      const lotes = gd.lotes;
      const getLote = (name) => lotes.find(l => l.nombre.includes(name)) || lotes[0];
      const sc1 = getLote('SC1') || lotes[0];
      const sc2 = getLote('SC2') || lotes[1];
      const sc3 = getLote('SC3') || lotes[2];
      const sc4 = getLote('SC4') || lotes[3];

      const cellBg = (l) => bgMap[App._cultivoClass(l?.plan?.cultivo || '')] || '#fff';
      const cellClick = (l) => l ? `onclick="App.openPlanModal('${esc(l.id)}'${campOverride ? `,'${esc(campOverride)}'` : ''})"` : '';
      const cellInfo = (l) => {
        if (!l) return '';
        const cultivo = l.plan?.cultivo || '';
        return `<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;width:90%;">
          <div style="font-family:var(--title);font-size:10px;color:rgba(0,0,0,.5);letter-spacing:.5px;">${esc(l.nombre)}</div>
          <div style="font-family:var(--mono);font-size:11px;font-weight:700;color:rgba(0,0,0,.4);">${l.hectareas} <span style="font-size:8px;font-weight:400;">ha</span></div>
          ${cultivo ? `<div style="font-size:8px;font-weight:600;color:rgba(0,0,0,.45);">${esc(cultivo)}</div>` : ''}
          ${l.plan?.variedad ? `<div style="font-size:7px;color:rgba(0,0,0,.3);font-family:var(--mono);">${esc(l.plan.variedad)}</div>` : ''}
        </div>`;
      };

      let h = `<div class="plano-estab" data-estab="${esc(estab)}" style="left:${pos.x}%;top:${pos.y}%;width:${pos.w}%;height:${pos.h}%;">`;
      h += `<div class="pe-label">${esc(estab)}<br><span style="font-family:var(--mono);font-size:9px;color:#888;">${fmtInt(gd.totalHas)} ha</span></div>`;
      h += `<div class="pe-block" style="position:relative;height:calc(100% - 26px);">`;

      // 4 zones using clip-path or positioned divs
      // Top row: SC1 (left ~40%) + SC2 (right ~60%)
      h += `<div style="position:absolute;top:0;left:0;width:40%;height:45%;background:${cellBg(sc1)};border-bottom:1.5px solid rgba(0,0,0,.2);border-right:1.5px solid rgba(0,0,0,.2);cursor:pointer;" ${cellClick(sc1)}>
        ${cellInfo(sc1)}
      </div>`;
      h += `<div style="position:absolute;top:0;left:40%;width:60%;height:45%;background:${cellBg(sc2)};border-bottom:1.5px solid rgba(0,0,0,.2);cursor:pointer;" ${cellClick(sc2)}>
        ${cellInfo(sc2)}
      </div>`;

      // Middle: SC3 (right side, smaller)
      h += `<div style="position:absolute;top:45%;right:0;width:55%;height:20%;background:${cellBg(sc3)};border-bottom:1.5px solid rgba(0,0,0,.2);cursor:pointer;" ${cellClick(sc3)}>
        ${cellInfo(sc3)}
      </div>`;

      // Bottom: SC4 (full width, large)
      h += `<div style="position:absolute;bottom:0;left:0;width:100%;height:35%;background:${cellBg(sc4)};cursor:pointer;" ${cellClick(sc4)}>
        ${cellInfo(sc4)}
      </div>`;

      // Diagonal road line (SVG overlay)
      h += `<svg style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3;">
        <line x1="0%" y1="45%" x2="55%" y2="65%" stroke="#555" stroke-width="2" stroke-dasharray="6,3"/>
        <text x="20%" y="58%" fill="#666" font-size="7" font-family="var(--mono)" transform="rotate(-20,20%,58%)">calle</text>
      </svg>`;

      h += '</div>';
      h += '<div class="pe-resize" data-corner="br" style="bottom:0;right:0;cursor:nwse-resize;"></div>';
      h += '<div class="pe-resize" data-corner="bl" style="bottom:0;left:0;cursor:nesw-resize;"></div>';
      h += '<div class="pe-resize" data-corner="tr" style="top:0;right:0;cursor:nesw-resize;"></div>';
      h += '<div class="pe-resize" data-corner="tl" style="top:0;left:0;cursor:nwse-resize;"></div>';
      h += '</div>';
      return h;
    };

    Object.entries(groups).forEach(([estab, gd]) => {
      const pos = getPos(estab);

      // Special render for San Clemente
      if (estab.toLowerCase().includes('clemente') && gd.lotes.length >= 4) {
        mH += renderSanClemente(estab, gd, pos);
        return;
      }

      const nL = gd.lotes.length;
      const layout = pos.layout || 'g';
      let cols, rows;
      if (layout === 'h') { cols = nL; rows = 1; } // horizontal: all side by side
      else if (layout === 'v') { cols = 1; rows = nL; } // vertical: all stacked
      else if (layout[0]==='g' && layout.length>1) { cols = parseInt(layout.substring(1)); rows = Math.ceil(nL/cols); } // forced grid cols e.g. 'g4'
      else { // grid: auto
        const isVert = pos.h > pos.w * 1.5;
        cols = nL<=1?1: isVert?(nL<=2?1:2) : (nL<=2?2:nL<=3?3:Math.min(nL,4));
        rows = Math.ceil(nL / cols);
      }

      mH += `<div class="plano-estab" data-estab="${esc(estab)}" style="left:${pos.x}%;top:${pos.y}%;width:${pos.w}%;height:${pos.h}%;">`;
      mH += `<div class="pe-label">${esc(estab)}<br><span style="font-family:var(--mono);font-size:9px;color:#888;">${fmtInt(gd.totalHas)} ha</span></div>`;
      mH += `<div class="pe-block" style="display:grid;grid-template-columns:repeat(${cols},1fr);grid-template-rows:repeat(${rows},1fr);height:calc(100% - 26px);">`;

      gd.lotes.forEach(l => { mH += cellHtml(l, estab); });

      mH += '</div>';
      mH += '<div class="pe-resize" data-corner="br" style="bottom:0;right:0;cursor:nwse-resize;"></div>';
      mH += '<div class="pe-resize" data-corner="bl" style="bottom:0;left:0;cursor:nesw-resize;"></div>';
      mH += '<div class="pe-resize" data-corner="tr" style="top:0;right:0;cursor:nesw-resize;"></div>';
      mH += '<div class="pe-resize" data-corner="tl" style="top:0;left:0;cursor:nwse-resize;"></div>';
      mH += '</div>';
    });

    mH += '</div>';

    // Central save button between GRUESA and FINA
    mH += `<div style="display:flex;gap:10px;justify-content:center;align-items:center;margin:16px 0;padding:12px;background:var(--accent-bg);border-radius:var(--radius);border:1.5px dashed var(--accent);">
      <button class="btn btn-accent" onclick="App.guardarPlanoCompleto()" style="font-size:13px;padding:10px 24px;display:flex;align-items:center;gap:6px;border-radius:99px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Guardar todo
      </button>
      <button class="btn btn-outline btn-sm" onclick="App.openLoteModal()" style="font-size:12px;">+ Agregar lote</button>
    </div>`;

    // ── FINA: duplicate plano for winter crops ──
    const campFina = campPlan.replace(/(\d{4})\/(\d{2})/, (m,y,s) => (parseInt(y)-1)+'/'+(parseInt(y)%100));
    // FINA KPIs
    const finaKey = 'fina_' + campPlan;
    const byFinaCultivo = {};
    let finaTotal = 0, finaSinPlan = 0;
    data.lotes.forEach(l => {
      const fp = App._getPlan(l, finaKey);
      if (fp.cultivo) { byFinaCultivo[fp.cultivo] = (byFinaCultivo[fp.cultivo]||0) + (l.hectareas||0); finaTotal += l.hectareas||0; }
      else { finaSinPlan += l.hectareas||0; }
    });
    mH += `<div style="margin-top:24px;"><div style="font-family:var(--title);font-size:14px;color:var(--navy);text-align:center;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;">FINA ${esc(campPlan)}</div>`;
    // Fina KPI bar
    mH += '<div class="planos-kpi-bar">';
    Object.entries(byFinaCultivo).sort((a,b)=>b[1]-a[1]).forEach(([c,h])=>{
      mH += `<div class="plano-kpi" style="border-top-color:${App._cultivoColor(c)};"><div class="pk-val">${fmtInt(h)}</div><div class="pk-lbl">${esc(c)}</div></div>`;
    });
    if (finaSinPlan > 0) mH += `<div class="plano-kpi" style="border-top-color:var(--border);"><div class="pk-val">${fmtInt(finaSinPlan)}</div><div class="pk-lbl">Sin asignar</div></div>`;
    mH += '</div>';
    mH += `<div style="position:relative;width:100%;min-height:600px;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:30px 10px 10px;">`;

    Object.entries(groups).forEach(([estab, gd]) => {
      const pos = getPos(estab);
      const nL = gd.lotes.length;
      const layout = pos.layout || 'g';
      let cols, rows;
      if (layout === 'h') { cols = nL; rows = 1; }
      else if (layout === 'v') { cols = 1; rows = nL; }
      else if (layout[0]==='g' && layout.length>1) { cols = parseInt(layout.substring(1)); rows = Math.ceil(nL/cols); }
      else { cols = nL<=1?1:nL<=2?2:Math.min(nL,3); rows = Math.ceil(nL / cols); }

      // For San Clemente custom layout — use same structure but with fina plans
      if (estab.toLowerCase().includes('clemente') && gd.lotes.length >= 4) {
        // Reuse same renderSanClemente but with fina campaign key
        const finaLotes = gd.lotes.map(l => ({...l, plan: App._getPlan(l, 'fina_'+campPlan)}));
        const gdFina = {...gd, lotes: finaLotes};
        mH += renderSanClemente(estab, gdFina, pos, 'fina_'+campPlan);
        return;
      }

      mH += `<div data-estab-fina="${esc(estab)}" style="position:absolute;left:${pos.x}%;top:${pos.y}%;width:${pos.w}%;height:${pos.h}%;">`;
      mH += `<div style="font-family:var(--title);font-size:11px;color:#333;text-align:center;margin-bottom:2px;">${esc(estab)}<br><span style="font-family:var(--mono);font-size:9px;color:#888;">${fmtInt(gd.totalHas)} ha</span></div>`;
      mH += `<div style="border:2.5px solid #333;overflow:hidden;display:grid;grid-template-columns:repeat(${cols},1fr);grid-template-rows:repeat(${rows},1fr);height:calc(100% - 26px);">`;

      gd.lotes.forEach(l => {
        const finaKey = 'fina_' + campPlan;
        const finaPlan = App._getPlan(l, finaKey);
        const cc = App._cultivoClass(finaPlan.cultivo || '');
        const bg = bgMap[cc] || '#fff';
        const cultivo = finaPlan.cultivo || '';
        mH += `<div class="pe-cell" style="background:${bg};border-right:1.5px solid rgba(0,0,0,.2);border-bottom:1.5px solid rgba(0,0,0,.2);justify-content:center;align-items:center;text-align:center;" onclick="App.openPlanModal('${esc(l.id)}','${finaKey}')">
          <div style="font-family:var(--title);font-size:11px;color:rgba(0,0,0,.55);letter-spacing:.5px;">${esc(l.nombre)}</div>
          <div style="font-family:var(--mono);font-size:13px;font-weight:700;color:rgba(0,0,0,.45);margin:1px 0;">${l.hectareas} <span style="font-size:9px;font-weight:400;">ha</span></div>
          ${cultivo ? `<div style="font-size:9px;font-weight:600;color:rgba(0,0,0,.5);">${esc(cultivo)}</div>` : ''}
          ${finaPlan.variedad ? `<div style="font-size:8px;font-weight:600;color:rgba(0,0,0,.35);font-family:var(--mono);">${esc(finaPlan.variedad)}${finaPlan.densidad ? ' · ' + fmtInt(finaPlan.densidad) : ''}</div>` : ''}
        </div>`;
      });
      mH += '</div></div>';
    });

    mH += '</div></div>';

    mapEl.innerHTML = mH;
    App._initPlanoDrag();
  },
  _initPlanoDrag() {
    const canvas = $('plano-canvas');
    if (!canvas) return;
    // Event delegation: single set of listeners on canvas (no leak)
    if (canvas._planoInit) return;
    canvas._planoInit = true;

    let activeEl = null, mode = null, sX, sY, sL, sT, sW, sH, cn;

    canvas.addEventListener('pointerdown', e => {
      const resizer = e.target.closest('.pe-resize');
      const estab = e.target.closest('.plano-estab');
      if (!estab) return;
      if (e.target.closest('.pe-cell') || e.target.closest('.pe-block')) return;
      e.preventDefault();
      activeEl = estab;
      sX = e.clientX; sY = e.clientY;
      sL = parseFloat(estab.style.left); sT = parseFloat(estab.style.top);
      sW = parseFloat(estab.style.width); sH = parseFloat(estab.style.height);
      if (resizer) { mode = 'resize'; cn = resizer.dataset.corner; }
      else { mode = 'drag'; estab.classList.add('dragging'); }
    });
    document.addEventListener('pointermove', e => {
      if (!activeEl) return;
      const rect = canvas.getBoundingClientRect();
      const dx = (e.clientX - sX) / rect.width * 100;
      const dy = (e.clientY - sY) / rect.height * 100;
      if (mode === 'drag') {
        activeEl.style.left = Math.max(0, Math.min(90, sL + dx)) + '%';
        activeEl.style.top = Math.max(0, Math.min(90, sT + dy)) + '%';
      } else {
        if (cn==='br'){activeEl.style.width=Math.max(6,sW+dx)+'%';activeEl.style.height=Math.max(6,sH+dy)+'%';}
        else if(cn==='bl'){activeEl.style.left=Math.max(0,sL+dx)+'%';activeEl.style.width=Math.max(6,sW-dx)+'%';activeEl.style.height=Math.max(6,sH+dy)+'%';}
        else if(cn==='tr'){activeEl.style.top=Math.max(0,sT+dy)+'%';activeEl.style.width=Math.max(6,sW+dx)+'%';activeEl.style.height=Math.max(6,sH-dy)+'%';}
        else if(cn==='tl'){activeEl.style.left=Math.max(0,sL+dx)+'%';activeEl.style.top=Math.max(0,sT+dy)+'%';activeEl.style.width=Math.max(6,sW-dx)+'%';activeEl.style.height=Math.max(6,sH-dy)+'%';}
      }
    });
    document.addEventListener('pointerup', e => {
      if (!activeEl) return;
      if (mode==='drag') activeEl.classList.remove('dragging');
      activeEl = null; mode = null;
      App._savePlanoPositions(); App._syncFinaPositions();
    });
  },

  _syncFinaPositions() {
    // Update FINA plano blocks to match GRUESA positions
    const finaCanvas = document.querySelectorAll('.plano-canvas')[1]; // second canvas is FINA
    if (!finaCanvas || !data.planoPos) return;
    finaCanvas.querySelectorAll('[data-estab-fina]').forEach(el => {
      const estab = el.dataset.estabFina;
      const pos = data.planoPos[estab];
      if (pos) {
        el.style.left = pos.x + '%';
        el.style.top = pos.y + '%';
        el.style.width = pos.w + '%';
        el.style.height = pos.h + '%';
      }
    });
  },

  _savePlanoPositions() {
    const canvas = $('plano-canvas');
    if (!canvas) return;
    if (!data.planoPos) data.planoPos = {};
    canvas.querySelectorAll('.plano-estab').forEach(el => {
      const estab = el.dataset.estab;
      const prev = data.planoPos[estab] || {};
      data.planoPos[estab] = {
        x: parseFloat(el.style.left) || 0,
        y: parseFloat(el.style.top) || 0,
        w: parseFloat(el.style.width) || 20,
        h: parseFloat(el.style.height) || 30,
        layout: prev.layout || 'g'
      };
    });
    Storage.save(data);
  },

  async guardarPlanoCompleto() {
    // Save positions from canvas
    App._savePlanoPositions();
    // Disable button while saving
    const btn = document.querySelector('.btn-accent[onclick*="guardarPlanoCompleto"]');
    if (btn) { btn.disabled = true; btn.innerHTML = '⏳ Guardando...'; }
    // Force immediate cloud sync (cancel any pending)
    if (Cloud._syncTimer) { clearTimeout(Cloud._syncTimer); Cloud._syncTimer = null; }
    try {
      await Cloud.saveToCloud();
      showToast('Plano guardado y sincronizado');
    } catch(e) {
      showToast('Guardado local. Se sincronizará cuando haya conexión.');
    }

  // ── Click-to-swap: reorder lotes within establishment on plano ──
  _swapState: null, // {estab, lotId, nombre} of selected lot waiting to swap

  swapLote(lotId, estab) {
    const ss = App._swapState;
    if (ss && ss.estab === estab && ss.lotId !== lotId) {
      // Second click on same establishment → perform swap
      if (!data.loteOrder) data.loteOrder = {};
      // Get current order
      const gLotes = data.lotes.filter(l => (l.establecimiento||'') === estab);
      let order = data.loteOrder[estab] || gLotes.map(l => l.nombre);
      const iA = order.indexOf(ss.nombre), iB = order.indexOf(data.lotes.find(l=>l.id===lotId)?.nombre);
      if (iA !== -1 && iB !== -1) {
        [order[iA], order[iB]] = [order[iB], order[iA]];
        data.loteOrder[estab] = order;
        Storage.save(data);
      }
      App._swapState = null;
      App.renderPlanos();
      showToast('Lotes intercambiados');
    } else {
      // First click → select
      App._swapState = { estab, lotId, nombre: data.lotes.find(l=>l.id===lotId)?.nombre };
      // Highlight selected cell
      document.querySelectorAll('.pe-cell.swap-selected').forEach(el => el.classList.remove('swap-selected'));
      const cell = document.querySelector(`.pe-cell[data-swap-id="${lotId}"]`);
      if (cell) cell.classList.add('swap-selected');

  /* ── EXPORT/IMPORT ── */
  exportData() {
    const b = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }); const u = URL.createObjectURL(b);
    const a = document.createElement('a'); a.href = u; a.download = 'henderseeds-campana-backup-' + dateISO() + '.json'; a.click(); URL.revokeObjectURL(u);
  },
  importData(input) {
    const file = input.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const imp = JSON.parse(e.target.result);
        if (!imp.ordenes) { showToast('Archivo no válido'); return; }
        if (!confirm('Esto reemplazara todos los datos actuales. Continuar?')) return;
        data = imp;
        if (data.campos && !data.lotes) { data.lotes = []; data.campos.forEach(c => (c.lotes || []).forEach(l => data.lotes.push({ id: l.id, nombre: c.nombre + ', ' + l.nombre, hectareas: l.hectareas || 0, cultivo: l.cultivo || '' }))); delete data.campos; }
        if (data.campolotes && !data.lotes) { data.lotes = data.campolotes.map(cl => ({ id: cl.id, nombre: cl.campo + ', ' + cl.lote, hectareas: cl.hectareas || 0, cultivo: cl.cultivo || '' })); delete data.campolotes; }
        if (!data.lotes) data.lotes = [];
        data.ordenes.forEach(o => { if (o.aplicaciones) o.aplicaciones.forEach(a => { if (!a.lotes) { a.lotes = a.loteId ? [{ loteId: a.loteId, hectareas: a.hectareas || 0, cultivo: a.cultivo || '' }] : []; delete a.loteId; delete a.hectareas; delete a.cultivo; } }); });
        if (!data.aplicadores) data.aplicadores = [];
        Storage.save(data);
        // Update campaign selector — add option if missing
        const cs = $('campana-select');
        if (data.campana && !cs.querySelector('option[value="' + data.campana + '"]')) {
          const opt = document.createElement('option'); opt.value = data.campana; opt.textContent = data.campana; cs.appendChild(opt);
        }
        cs.value = data.campana;
        App.renderLotes(); App.renderPlanos(); App.renderOrdenes(); App.renderAnalisis(); App.refreshSelectors();
        showToast('Restaurado: ' + (data.lotes?.length || 0) + ' lotes, ' + (data.ordenes?.length || 0) + ' ordenes');
      } catch(err) { showToast('Error: ' + err.message); }
    };
    reader.readAsText(file); input.value = '';
  },

  filterDropdownFor(idx, input) {

    for (const [cat, items] of Object.entries(catalogo)) {

  _renderResumen() {

        <input type="number" inputmode="decimal" class="row-inp" value="${r.dosis}" step="0.1" min="0" onfocus="App.setActiveApp(${appIdx})" oninput="App.updateRow(${r.id},'dosis',this.value)">
        <span class="row-val">${vol ? fmt(vol) : '--'}</span><span class="row-val costo">${fmt(ch)}</span><span class="row-val">${monto ? fmt(monto) : '--'}</span>

  _focusDosis(rid) { const row = document.querySelector(`.row-item[data-rowid="${rid}"]`); if (row) { const d = row.querySelectorAll('.row-inp')[1]; if (d) { d.focus(); d.select(); } } },
  hideDropdown() { $('ot-dropdown').classList.remove('show'); $('ot-dropdown').style.display = 'none'; highlightIdx = -1; },
  moveHighlight(dir) { if (!ddItems.length) return; highlightIdx = Math.max(-1, Math.min(ddItems.length - 1, highlightIdx + dir)); document.querySelectorAll('#ot-dropdown .dd-item').forEach(el => el.classList.toggle('highlighted', parseInt(el.dataset.idx) === highlightIdx)); },

  updateRow(rid, field, val) {
    let r = null, appIdx = currentAppIdx;
    for (let i = 0; i < aplicaciones.length; i++) { const f = aplicaciones[i].productos.find(x => x.id === rid); if (f) { r = f; appIdx = i; break; } }
    if (!r) return; r[field] = parseFloat(val) || 0; formDirty = true;

  /* ── Aplicador ── */
  filterAplicadores(showAll) {

  filterTipos(showAll) {

    const all = [...new Set([...defs, ...(data.tiposLabor || [])])];
