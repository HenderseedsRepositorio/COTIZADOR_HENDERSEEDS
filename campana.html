  selectAplicadorHighlight() { if (aplicadorHighlight >= 0 && aplicadorMatches[aplicadorHighlight]) App.selectAplicador(aplicadorMatches[aplicadorHighlight]); },

  /* ── Save ── */
  _saving: false,
  saveOrden() {
    if (App._saving) return;
    const valid = aplicaciones.some(a => a.lotes.length && a.productos.length);
    if (!valid) { showToast('Agrega al menos un lote con productos'); return; }
    App._saving = true;
    const saveBtn = document.querySelector('#tab-nueva-ot .btn-accent[onclick="App.saveOrden()"]');
    if (saveBtn) { saveBtn.disabled = true; saveBtn.style.opacity = '.5'; }
    const tipo = App.getTipo(), costoLabor = App.getCostoLabor();
    const orden = {
      id: editingOrdenId || Storage.nextId('ot'),
      aplicador: $('ot-aplicador').value.trim(), fecha: $('ot-fecha').value,
      tipo, costoLabor, estado: App.getEstado(), notas: $('ot-notas').value.trim(),
      aplicaciones: aplicaciones.map(a => ({ lotes: a.lotes.map(l => ({ ...l })), tipo, costoLabor, productos: a.productos.map(p => ({ ...p })) })),
      createdAt: editingOrdenId ? (data.ordenes.find(o => o.id === editingOrdenId)?.createdAt || new Date().toISOString()) : new Date().toISOString(),
      updatedAt: new Date().toISOString(), campana: data.campana,
    };
    if (orden.aplicador && !data.aplicadores.includes(orden.aplicador)) data.aplicadores.push(orden.aplicador);
    const isEdit = !!editingOrdenId;
    if (editingOrdenId) { const idx = data.ordenes.findIndex(o => o.id === editingOrdenId); if (idx >= 0) data.ordenes[idx] = orden; } else data.ordenes.push(orden);
    Storage.save(data); App.resetOTForm();
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelector('[data-tab="ordenes"]').classList.add('active');
    $('tab-ordenes').classList.add('active'); App.renderOrdenes();
    App._saving = false; showToast(isEdit ? 'Orden actualizada' : 'Orden guardada');
  },
  resetOTForm() {
    editingOrdenId = null; App._initAplicaciones(); App._saving = false;
    const saveBtn = document.querySelector('#tab-nueva-ot .btn-accent[onclick="App.saveOrden()"]');
    if (saveBtn) { saveBtn.disabled = false; saveBtn.style.opacity = ''; }
    $('ot-aplicador').value = ''; $('ot-fecha').value = dateISO(); $('ot-tipo').value = 'Pulverizacion terrestre'; $('ot-costo-labor').value = ''; $('ot-notas').value = '';

    $('ot-cancel-btn').style.display = 'none'; $('ot-totales').style.display = 'none'; formDirty = false;
  },

  cambiarEstadoOrden(oid, estado) { const o = data.ordenes.find(x => x.id === oid); if (!o) return; o.estado = estado; Storage.save(data); App.renderOrdenes(); const labels = { pendiente:'Pendiente', en_curso:'En curso', completada:'Completada' }; showToast('Estado: ' + (labels[estado] || estado)); },

  editOrden(oid) {
    const o = data.ordenes.find(x => x.id === oid); if (!o) return;
    editingOrdenId = o.id;

  /* ── ORDENES LIST ── */
  setFiltroOT(el) { document.querySelectorAll('#tab-ordenes .chip-bar .chip').forEach(c => c.classList.remove('active')); el.classList.add('active'); filtroOT = el.dataset.filtro; App.renderOrdenes(); },

  renderOrdenes() {
    const el = $('ordenes-list'), q = ($('ordenes-search')?.value || '').toLowerCase().trim();
    let ordenes = data.ordenes.filter(o => o.campana === data.campana).filter(o => filtroOT === 'todas' || o.estado === filtroOT);
    const filtLote = $('ord-lote')?.value || '';
    if (filtLote) ordenes = ordenes.filter(o => (o.aplicaciones || []).some(a => (a.lotes || []).some(l => l.loteId === filtLote)));
    const filtDesde = $('ord-desde')?.value || '', filtHasta = $('ord-hasta')?.value || '';
    if (filtDesde) ordenes = ordenes.filter(o => (o.fecha || '') >= filtDesde);
    if (filtHasta) ordenes = ordenes.filter(o => (o.fecha || '') <= filtHasta);
    if (q) ordenes = ordenes.filter(o => {
      const parts = [o.aplicador]; (o.aplicaciones || []).forEach(a => { (a.lotes || []).forEach(al => { const l = data.lotes.find(x => x.id === al.loteId); parts.push(l?.nombre); }); parts.push(a.tipo, ...(a.productos || []).map(p => p.producto)); });
      return parts.join(' ').toLowerCase().includes(q);
    });
    ordenes.sort((a, b) => new Date(b.createdAt || b.fecha) - new Date(a.createdAt || a.fecha));

      sumEl.textContent = `${ordenes.length} orden${ordenes.length > 1 ? 'es' : ''} · ${fmtInt(sumHas)} has · USD ${fmt(sumMonto)} total`;

      const apps = o.aplicaciones || [];

        const totalHas = appTotalHas(a);
        orderTotalHas += totalHas;
        const lotesStr = (a.lotes || []).map(al => { const l = data.lotes.find(x => x.id === al.loteId); return esc(l?.nombre || '?'); }).join(', ');
        let appInsHa = 0;
        const prodRows = (a.productos || []).map(p => {
          const costoHa = p.precio * p.dosis;
          const vol = totalHas > 0 ? fmt(p.dosis * totalHas) + ' ' + esc(p.unidad || 'L') : '--';
          appInsHa += costoHa;
          return `<tr>
            <td>${esc(p.producto)}</td>
            <td style="text-align:right;font-family:var(--mono);font-size:10px;${p.precio > 0 ? 'color:var(--text-sec);' : 'color:var(--red);font-weight:700;'}"><input type="number" inputmode="decimal" value="${p.precio}" step="0.01" min="0" style="width:50px;border:1px solid ${p.precio > 0 ? 'var(--border)' : 'var(--red)'};border-radius:6px;padding:3px 4px;font-size:10px;font-family:var(--mono);text-align:right;color:inherit;background:${p.precio > 0 ? '#fff' : '#fef2f2'};" onchange="App.updateOrdenPrecio('${esc(o.id)}','${esc(p.producto)}',this.value)"></td>
            <td style="text-align:right;">${p.dosis} ${esc(p.unidad || 'L')}/ha</td>
            <td style="text-align:right;font-family:var(--mono);font-weight:600;color:var(--accent);">$${fmt(costoHa)}</td>
            <td style="text-align:right;">${vol}</td>
          </tr>`;
        }).join('');
        const appTotalHa = appInsHa + (o.costoLabor || 0);
        orderTotalHa += appInsHa;
        orderTotalMonto += appInsHa * totalHas;
        return `<div style="${ai > 0 ? 'margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);' : ''}">
          <div style="font-weight:700;font-size:12px;color:var(--navy);">${lotesStr} · ${totalHas} has</div>
          ${(a.productos || []).length ? `<div style="overflow-x:auto"><table class="ot-prod-table" style="margin-top:4px;width:100%;border-collapse:collapse;">
            <tr><th style="text-align:left;">Producto</th><th style="text-align:right;width:55px;">Precio</th><th style="text-align:right;width:75px;">Dosis</th><th style="text-align:right;width:60px;">$/ha</th><th style="text-align:right;width:75px;">Vol.</th></tr>
            ${prodRows}
            <tr style="border-top:1.5px solid var(--border);font-weight:700;">
              <td colspan="3" style="padding-top:4px;">Subtotal insumos</td>
              <td style="text-align:right;padding-top:4px;color:var(--accent);font-family:var(--mono);">$${fmt(appInsHa)}</td>

            <tr style="font-weight:700;font-size:12px;">
              <td colspan="3">Total</td>
              <td style="text-align:right;color:var(--navy);font-family:var(--mono);">$${fmt(appTotalHa)}/ha</td>
              <td style="text-align:right;font-family:var(--mono);font-size:10px;color:var(--text-sec);">${totalHas > 0 ? '$' + fmt(appTotalHa * totalHas) : ''}</td>
            </tr>
          </table></div>` : ''}
        </div>`;
      }).join('');

      const allProds = {};
      apps.forEach(a => { const has = appTotalHas(a); (a.productos || []).forEach(p => {
        if (!allProds[p.producto]) allProds[p.producto] = { producto: p.producto, unidad: p.unidad || 'L', totalVol: 0, totalCost: 0 };
        allProds[p.producto].totalVol += has > 0 ? p.dosis * has : 0;
        allProds[p.producto].totalCost += p.precio * p.dosis * has;
      }); });
      const summaryRows = Object.values(allProds).map(p => `<tr><td>${esc(p.producto)}</td><td style="text-align:right;font-family:var(--mono);">${p.totalVol > 0 ? fmt(p.totalVol) + ' ' + esc(p.unidad) : '--'}</td><td style="text-align:right;font-family:var(--mono);color:var(--accent);">$${fmt(p.totalCost)}</td></tr>`).join('');

      const grandTotalHa = (orderTotalHas > 0 ? orderTotalMonto / orderTotalHas : (orderTotalHa / (apps.length || 1))) + (o.costoLabor || 0);

      return `<div class="card ot-card estado-${o.estado || 'pendiente'}"><div class="ot-card-wrap"><div class="ot-card-main">
        <div class="ot-detail">${esc(o.aplicador || 'Sin aplicador')} · ${esc(o.tipo || '--')} · ${fecha}
          <span style="float:right;font-family:var(--mono);font-weight:700;color:var(--navy);font-size:13px;">$${fmt(grandTotalHa)}/ha</span></div>

        </div></div>

          <button class="st-pend${o.estado === 'pendiente' ? ' active' : ''}" data-oid="${esc(o.id)}" data-estado="pendiente">Pend.</button>
          <button class="st-curso${o.estado === 'en_curso' ? ' active' : ''}" data-oid="${esc(o.id)}" data-estado="en_curso">Curso</button>
          <button class="st-comp${o.estado === 'completada' ? ' active' : ''}" data-oid="${esc(o.id)}" data-estado="completada">Comp.</button>
        </div></div>
        <div class="ot-actions" style="display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--bg);">
          <button style="display:flex;align-items:center;justify-content:center;padding:7px;border-radius:8px;cursor:pointer;border:none;background:var(--accent);color:white;" onclick="App.editOrden('${esc(o.id)}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></button>
          <button style="display:flex;align-items:center;justify-content:center;padding:7px;border-radius:8px;cursor:pointer;border:none;background:#25d366;color:white;" onclick="App.compartirOrdenWA('${esc(o.id)}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></button>
          <button style="display:flex;align-items:center;justify-content:center;padding:7px;border-radius:8px;cursor:pointer;border:none;background:#e2e8f0;color:var(--text-sec);" onclick="App.duplicarOrden('${esc(o.id)}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
          <button style="display:flex;align-items:center;justify-content:center;padding:7px;border-radius:8px;cursor:pointer;border:none;background:var(--red);color:white;" onclick="App.deleteOrden('${esc(o.id)}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>
        </div></div>`;
    }).join('');

    el.querySelectorAll('.ot-status-col button').forEach(btn => btn.addEventListener('click', function(e) { e.preventDefault(); e.stopPropagation(); if (this.dataset.oid && this.dataset.estado) App.cambiarEstadoOrden(this.dataset.oid, this.dataset.estado); }));
  },

  /* ── ANALISIS ── */
  renderAnalisis() {
    const el = $('analisis-body'), filtLote = $('an-lote').value;
    const filtEstado = $('an-estado')?.value || '';

    let ordenes = data.ordenes.filter(o => o.campana === data.campana);
    if (filtEstado) ordenes = ordenes.filter(o => o.estado === filtEstado);
    if (filtLote) ordenes = ordenes.filter(o => (o.aplicaciones || []).some(a => (a.lotes || []).some(l => l.loteId === filtLote)));

    if (!ordenes.length) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">📊</div><p>Sin datos para analizar</p><p style="font-size:12px;margin-top:4px;">Crea ordenes de trabajo para ver el analisis</p></div>';
      return;
    }

    const catColors = { 'Herbicidas':'#16a34a','Fungicidas':'#2d6fc4','Insecticidas':'#d97706','Fertilizantes':'#8b5cf6','Coadyuvantes':'#ec4899','Otros':'#94a3b8','Semillas':'#0d9488','Inoculantes':'#6366f1','Labor':'#f97316' };

    // ── Aggregate data ──
    let totalHas = 0, totalCostInsumos = 0, totalCostLabor = 0, totalApps = 0, totalProdsUsed = 0;
    const byCategory = {}, byProduct = {}, byLote = {}, byTipo = {}, byMonth = {};
    const lotesSeen = new Set(), productosUnicos = new Set();
    const timeline = []; // { fecha, costoAcum }

    ordenes.forEach(o => {
      const costoLabor = o.costoLabor || 0;
      (o.aplicaciones || []).forEach(a => {
        const aLotes = (a.lotes || []).filter(l => !filtLote || l.loteId === filtLote);
        if (!aLotes.length) return;
        const has = aLotes.reduce((s, l) => s + (l.hectareas || 0), 0);
        aLotes.forEach(l => {
          const currentLote = data.lotes.find(x => x.id === l.loteId);
          const loteHas = currentLote ? currentLote.hectareas : (l.hectareas || 0);
          if (!lotesSeen.has(l.loteId)) { lotesSeen.add(l.loteId); totalHas += loteHas; }
          // Per-lote aggregation
          if (!byLote[l.loteId]) byLote[l.loteId] = { nombre: '', has: loteHas, costoInsumos: 0, costoLabor: 0, apps: 0 };
          const lData = data.lotes.find(x => x.id === l.loteId);
          byLote[l.loteId].nombre = lData?.nombre || '?';
        });
        totalApps++;

        let appInsumos = 0;
        (a.productos || []).forEach(p => {
          const cost = p.precio * p.dosis * has;
          const costHa = p.precio * p.dosis;
          appInsumos += cost;
          totalCostInsumos += cost;
          productosUnicos.add(p.producto);

          // By category
          const cat = p.categoria || 'Otros';
          byCategory[cat] = (byCategory[cat] || 0) + cost;

          // By product
          if (!byProduct[p.producto]) byProduct[p.producto] = { nombre: p.producto, cat, unidad: p.unidad || 'L', volTotal: 0, costoTotal: 0, costoHa: 0, nApps: 0 };
          byProduct[p.producto].volTotal += has > 0 ? p.dosis * has : 0;
          byProduct[p.producto].costoTotal += cost;
          byProduct[p.producto].costoHa += costHa;
          byProduct[p.producto].nApps++;
        });

        // Labor
        const lc = costoLabor * has;
        totalCostLabor += lc;
        if (lc > 0) byCategory['Labor'] = (byCategory['Labor'] || 0) + lc;

        // Per-lote costs
        aLotes.forEach(l => {
          const lHas = l.hectareas || 0;
          const ratio = has > 0 ? lHas / has : 0;
          byLote[l.loteId].costoInsumos += appInsumos * ratio;
          byLote[l.loteId].costoLabor += lc * ratio;
          byLote[l.loteId].apps++;
        });

        // By tipo de labor
        const tipo = o.tipo || 'Otros';
        byTipo[tipo] = (byTipo[tipo] || 0) + appInsumos + lc;

        // Timeline by month
        const mes = o.fecha ? o.fecha.substring(0, 7) : 'Sin fecha';
        byMonth[mes] = (byMonth[mes] || 0) + appInsumos + lc;
      });
    });

    const totalCost = totalCostInsumos + totalCostLabor;
    const costoHa = totalHas > 0 ? totalCost / totalHas : 0;
    const insumosHa = totalHas > 0 ? totalCostInsumos / totalHas : 0;
    const laborHa = totalHas > 0 ? totalCostLabor / totalHas : 0;
    totalProdsUsed = productosUnicos.size;

    // ── Build HTML ──
    let html = '';

    // KPIs (4 compactos)
    html += `<div class="card fu"><div class="stat-grid" style="margin-bottom:0;">
      <div class="stat-box"><div class="stat-val" style="color:var(--green);">$${fmt(costoHa)}</div><div class="stat-lbl">Costo / ha</div></div>
      <div class="stat-box"><div class="stat-val">$${fmt(totalCost)}</div><div class="stat-lbl">Inversion total</div></div>
      <div class="stat-box"><div class="stat-val">${fmtInt(totalHas)} ha</div><div class="stat-lbl">${totalApps} aplicaciones</div></div>
      <div class="stat-box"><div class="stat-val">${totalProdsUsed}</div><div class="stat-lbl">Productos</div></div>
    </div></div>`;

    // ── Desglose por categoría ──
    if (Object.keys(byCategory).length) {
      const maxCat = Math.max(...Object.values(byCategory), 1);
      html += `<div class="card fu"><div style="font-family:var(--title);font-size:11px;text-transform:uppercase;color:var(--text-sec);margin-bottom:10px;">Desglose por categoria</div><div class="bar-chart" style="margin:0;">`;
      Object.entries(byCategory).sort((a, b) => b[1] - a[1]).forEach(([cat, val]) => {
        const pct = (val / totalCost * 100).toFixed(1);
        const w = (val / maxCat * 100).toFixed(0);
        const perHa = totalHas > 0 ? fmt(val / totalHas) : '--';
        html += `<div class="bar-row"><span class="bar-label">${esc(cat)}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${catColors[cat] || '#94a3b8'};"><span>${pct}%</span></div></div>
          <span class="bar-amount" title="$${perHa}/ha">$${fmt(val)}</span></div>`;
      });
      html += '</div></div>';
    }

    // ── Comparativa por lote (principal) ──
    const loteEntries = Object.values(byLote);
    if (!filtLote && loteEntries.length > 0) {
      const maxLoteCost = Math.max(...loteEntries.map(l => (l.costoInsumos + l.costoLabor) / (l.has || 1)), 1);
      loteEntries.sort((a, b) => ((b.costoInsumos + b.costoLabor) / (b.has || 1)) - ((a.costoInsumos + a.costoLabor) / (a.has || 1)));
      html += `<div class="card fu"><div style="font-family:var(--title);font-size:11px;text-transform:uppercase;color:var(--text-sec);margin-bottom:10px;">Analisis por lote</div><div class="lote-compare">`;
      loteEntries.forEach(l => {
        const costHa = l.has > 0 ? (l.costoInsumos + l.costoLabor) / l.has : 0;
        const insHa = l.has > 0 ? l.costoInsumos / l.has : 0;
        const labHa = l.has > 0 ? l.costoLabor / l.has : 0;
        const totalLote = l.costoInsumos + l.costoLabor;
        const w = (costHa / maxLoteCost * 100).toFixed(0);
        const loteData = data.lotes.find(x => x.nombre === l.nombre);
        const cultivo = loteData?.cultivo || '';
        html += `<div class="lote-card-an">
          <div style="flex:1;min-width:0;">
            <div class="lc-name">${esc(l.nombre)} <span style="font-weight:400;font-size:11px;color:var(--text-mut);">${l.has} ha${cultivo ? ' · ' + esc(cultivo) : ''}</span></div>
            <div class="lc-detail">Insumos $${fmt(insHa)}/ha · Labor $${fmt(labHa)}/ha · ${l.apps} apps · Total $${fmt(totalLote)}</div>
            <div class="lc-bar"><div class="lc-bar-fill" style="width:${w}%;"></div></div>
          </div>
          <div class="lc-cost">$${fmt(costHa)}<div style="font-size:9px;font-weight:600;color:var(--text-mut);">por ha</div></div>
        </div>`;
      });
      html += '</div></div>';
    } else if (filtLote && loteEntries.length === 1) {
      const l = loteEntries[0];
      const costHa = l.has > 0 ? (l.costoInsumos + l.costoLabor) / l.has : 0;
      const insHa = l.has > 0 ? l.costoInsumos / l.has : 0;
      const labHa = l.has > 0 ? l.costoLabor / l.has : 0;
      const loteData = data.lotes.find(x => x.nombre === l.nombre);
      html += `<div class="card fu"><div style="font-family:var(--title);font-size:11px;text-transform:uppercase;color:var(--text-sec);margin-bottom:8px;">Detalle ${esc(l.nombre)}</div>
        <div class="stat-grid"><div class="stat-box"><div class="stat-val" style="color:var(--green);">$${fmt(costHa)}</div><div class="stat-lbl">Total / ha</div></div>
        <div class="stat-box"><div class="stat-val">$${fmt(insHa)}</div><div class="stat-lbl">Insumos / ha</div></div>
        <div class="stat-box"><div class="stat-val">$${fmt(labHa)}</div><div class="stat-lbl">Labor / ha</div></div>
        <div class="stat-box"><div class="stat-val">${l.apps}</div><div class="stat-lbl">Aplicaciones</div></div></div></div>`;
    }

    // ── Por tipo de labor ──
    if (Object.keys(byTipo).length > 1) {
      const maxTipo = Math.max(...Object.values(byTipo), 1);
      const tipoColors = ['#2d6fc4','#16a34a','#d97706','#8b5cf6','#ec4899','#0d9488'];
      html += `<div class="card fu"><div style="font-family:var(--title);font-size:11px;text-transform:uppercase;color:var(--text-sec);margin-bottom:10px;">Inversion por tipo de labor</div><div class="bar-chart" style="margin:0;">`;
      Object.entries(byTipo).sort((a, b) => b[1] - a[1]).forEach(([tipo, val], ti) => {
        const w = (val / maxTipo * 100).toFixed(0);
        html += `<div class="bar-row"><span class="bar-label">${esc(tipo)}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${tipoColors[ti % tipoColors.length]};"><span>${(val/totalCost*100).toFixed(0)}%</span></div></div>
          <span class="bar-amount">$${fmt(val)}</span></div>`;
      });
      html += '</div></div>';
    }

    // ── Timeline mensual ──
    const months = Object.entries(byMonth).sort((a, b) => a[0].localeCompare(b[0]));
    if (months.length > 0) {
      const maxMonth = Math.max(...months.map(m => m[1]), 1);
      let acum = 0;
      const monthNames = { '01':'Ene','02':'Feb','03':'Mar','04':'Abr','05':'May','06':'Jun','07':'Jul','08':'Ago','09':'Sep','10':'Oct','11':'Nov','12':'Dic' };
      html += `<div class="card fu"><div style="font-family:var(--title);font-size:11px;text-transform:uppercase;color:var(--text-sec);margin-bottom:10px;">Inversion mensual</div>`;
      html += '<div style="display:flex;gap:6px;align-items:flex-end;height:120px;padding:0 4px;">';
      months.forEach(([mes, val]) => {
        acum += val;
        const h = Math.max((val / maxMonth * 100), 4);
        const label = mes !== 'Sin fecha' ? (monthNames[mes.split('-')[1]] || mes.split('-')[1]) + ' ' + mes.split('-')[0].slice(2) : '?';
        html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;">
          <span style="font-family:var(--mono);font-size:9px;font-weight:700;color:var(--navy);">$${fmtInt(val)}</span>
          <div style="width:100%;height:${h}%;background:linear-gradient(180deg,var(--accent),var(--navy));border-radius:4px 4px 0 0;min-height:4px;"></div>
          <span style="font-size:9px;color:var(--text-mut);font-weight:600;">${label}</span>
        </div>`;
      });
      html += '</div>';
      if (months.length > 1) html += `<div style="text-align:right;margin-top:6px;font-size:11px;color:var(--text-sec);">Acumulado: <strong style="color:var(--navy);font-family:var(--mono);">USD ${fmt(acum)}</strong></div>`;
      html += '</div>';
    }

    // ── Top productos ──
    const prodEntries = Object.values(byProduct).sort((a, b) => b.costoTotal - a.costoTotal);
    if (prodEntries.length) {
      html += `<div class="card fu"><div style="font-family:var(--title);font-size:11px;text-transform:uppercase;color:var(--text-sec);margin-bottom:10px;">Productos utilizados (${totalProdsUsed})</div>`;
      html += `<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:12px;">
        <tr style="border-bottom:2px solid var(--border);">
          <th style="text-align:left;padding:6px 4px;font-size:10px;text-transform:uppercase;color:var(--text-mut);">Producto</th>
          <th style="text-align:center;padding:6px 4px;font-size:10px;text-transform:uppercase;color:var(--text-mut);">Cat.</th>
          <th style="text-align:right;padding:6px 4px;font-size:10px;text-transform:uppercase;color:var(--text-mut);">Vol. total</th>
          <th style="text-align:right;padding:6px 4px;font-size:10px;text-transform:uppercase;color:var(--text-mut);">USD total</th>
          <th style="text-align:right;padding:6px 4px;font-size:10px;text-transform:uppercase;color:var(--text-mut);">USD/ha</th>
          <th style="text-align:center;padding:6px 4px;font-size:10px;text-transform:uppercase;color:var(--text-mut);">Apps</th>
        </tr>`;
      prodEntries.forEach((p, i) => {
        const bgColor = i % 2 === 0 ? 'var(--bg)' : 'white';
        const catDot = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${catColors[p.cat] || '#94a3b8'};margin-right:3px;"></span>`;
        const avgHa = p.nApps > 0 ? p.costoHa / p.nApps : 0;
        html += `<tr style="background:${bgColor};">
          <td style="padding:5px 4px;font-weight:600;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.nombre)}</td>
          <td style="padding:5px 4px;text-align:center;font-size:10px;">${catDot}${esc(p.cat)}</td>
          <td style="padding:5px 4px;text-align:right;font-family:var(--mono);font-size:11px;">${p.volTotal > 0 ? fmt(p.volTotal) + ' ' + esc(p.unidad) : '--'}</td>
          <td style="padding:5px 4px;text-align:right;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent);">$${fmt(p.costoTotal)}</td>
          <td style="padding:5px 4px;text-align:right;font-family:var(--mono);font-size:11px;">$${fmt(avgHa)}</td>
          <td style="padding:5px 4px;text-align:center;font-size:11px;">${p.nApps}</td>
        </tr>`;
      });
      html += '</table></div></div>';
    }

    // ── Historial de aplicaciones ──
    const histTitle = filtLote ? 'Historial del lote' : 'Historial de aplicaciones';
    html += `<div class="card fu"><div style="font-family:var(--title);font-size:11px;text-transform:uppercase;color:var(--text-sec);margin-bottom:10px;">${histTitle}</div>`;
    let costoAcum = 0;
    ordenes.sort((a, b) => new Date(a.fecha || 0) - new Date(b.fecha || 0)).forEach(o => {
      (o.aplicaciones || []).forEach(a => {
        const aLotes = (a.lotes || []).filter(l => !filtLote || l.loteId === filtLote);
        if (!aLotes.length) return;
        const has = aLotes.reduce((s, l) => s + (l.hectareas || 0), 0);
        const lotesStr = aLotes.map(al => { const l = data.lotes.find(x => x.id === al.loteId); return l?.nombre || '?'; }).join(', ');
        const insumosHa = (a.productos || []).reduce((s, p) => s + p.precio * p.dosis, 0);
        const netoHa = insumosHa + (o.costoLabor || 0);
        const montoTotal = netoHa * has;
        if (filtLote) costoAcum += netoHa;
        const fecha = o.fecha ? new Date(o.fecha + 'T12:00:00').toLocaleDateString('es-AR') : '--';
        const estadoBadge = o.estado === 'completada' ? 'badge-completada' : o.estado === 'en_curso' ? 'badge-en_curso' : 'badge-pendiente';
        const estadoLabel = o.estado === 'completada' ? 'Comp.' : o.estado === 'en_curso' ? 'Curso' : 'Pend.';
        const nProds = (a.productos || []).length;
        const prodsStr = (a.productos || []).map(p => esc(p.producto)).join(', ');

        html += `<div style="padding:8px 0;border-bottom:1px solid var(--bg);">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:6px;">
            <div style="flex:1;min-width:0;">
              <div style="font-size:12px;"><span style="font-weight:700;">${fecha}</span>
                <span class="badge ${estadoBadge}" style="margin-left:4px;">${estadoLabel}</span></div>
              <div style="font-size:11px;color:var(--text-sec);margin-top:2px;">${esc(lotesStr)} · ${has} has · ${esc(o.tipo || '--')} · ${nProds} prod</div>
              ${filtLote ? `<div style="font-size:10px;color:var(--text-mut);margin-top:2px;">${prodsStr}</div>` : ''}
            </div>
            <div style="text-align:right;flex-shrink:0;">
              <div style="font-family:var(--mono);font-weight:700;color:var(--accent);font-size:13px;">$${fmt(netoHa)}/ha</div>
              ${has > 0 ? `<div style="font-family:var(--mono);font-size:10px;color:var(--text-mut);">$${fmt(montoTotal)} total</div>` : ''}
              ${filtLote ? `<div style="font-family:var(--mono);font-size:10px;color:var(--navy);font-weight:700;">Acum: $${fmt(costoAcum)}/ha</div>` : ''}
            </div>
          </div>
        </div>`;
      });
    });
    html += '</div>';

    el.innerHTML = html;
  },

  /* ── WA ── */
  _buildWAMsg(o) {
    const apps = o.aplicaciones || [];
    const fecha = o.fecha ? new Date(o.fecha + 'T12:00:00').toLocaleDateString('es-AR') : dateStr();
    const costoLabor = o.costoLabor || 0;
    let msg = `*ORDEN DE TRABAJO*\nFecha: ${fecha}\nLabor: ${o.tipo || '--'}\n`;
    if (o.aplicador) msg += `Aplicador: ${o.aplicador}\n`; msg += '\n';
    let grandTotalHa = 0, grandTotalMonto = 0, grandTotalHas = 0;

    apps.forEach(a => {
      const has = appTotalHas(a); grandTotalHas += has;
      const lotesStr = (a.lotes || []).map(al => { const l = data.lotes.find(x => x.id === al.loteId); return l?.nombre || '?'; }).join(', ');
      msg += `*${lotesStr}*\n${has} has\n`;
      let insHa = 0;
      (a.productos || []).forEach((r, i) => {
        const costoHa = r.precio * r.dosis;
        insHa += costoHa;
        const vol = has > 0 ? fmt(r.dosis * has) : '--';
        msg += `  ${i+1}. ${r.producto} - ${r.dosis} ${r.unidad||'L'}/ha`;
        if (r.precio > 0) msg += ` (USD ${fmt(r.precio)}/${r.unidad||'L'} = USD ${fmt(costoHa)}/ha)`;
        msg += ` - Vol: ${vol} ${r.unidad||'L'}\n`;
      });
      grandTotalHa += insHa; grandTotalMonto += insHa * has;
      msg += `  Subtotal: USD ${fmt(insHa + costoLabor)}/ha\n\n`;
    });

    if (apps.length > 1) {
      const allP = {};
      apps.forEach(a => { const has = appTotalHas(a); (a.productos || []).forEach(p => { if (!allP[p.producto]) allP[p.producto] = { p: p.producto, u: p.unidad||'L', v: 0 }; allP[p.producto].v += has > 0 ? p.dosis * has : 0; }); });
      msg += '*RESUMEN RETIRO:*\n'; Object.values(allP).forEach(p => msg += `  ${p.p}: ${p.v > 0 ? fmt(p.v)+' '+p.u : '--'}\n`); msg += '\n';
    }
    const avg = (grandTotalHas > 0 ? grandTotalMonto / grandTotalHas : (grandTotalHa / (apps.length || 1))) + costoLabor;
    if (costoLabor > 0) msg += `Labor: USD ${fmt(costoLabor)}/ha\n`;
    msg += `*Total: USD ${fmt(avg)}/ha*`;
    if (grandTotalHas > 0) msg += ` -- *USD ${fmt(grandTotalMonto + costoLabor * grandTotalHas)} total*`;
    msg += '\n'; if (o.notas) msg += `\nNotas: ${o.notas}\n`;
    msg += `\n_Campana ${o.campana || data.campana}_`;
    return msg;
  },
  compartirOrdenWA(oid) { const o = data.ordenes.find(x => x.id === oid); if (o) window.open('https://wa.me/?text=' + encodeURIComponent(App._buildWAMsg(o)), '_blank'); },
  compartirWA() { window.open('https://wa.me/?text=' + encodeURIComponent(App._buildWAMsg({ aplicador: $('ot-aplicador').value.trim(), fecha: $('ot-fecha').value, tipo: App.getTipo(), costoLabor: App.getCostoLabor(), notas: $('ot-notas').value.trim(), aplicaciones, campana: data.campana })), '_blank'); },

  /* ── PDF ── */
  exportarPDF() { App._generatePDF({ aplicador: $('ot-aplicador').value.trim(), fecha: $('ot-fecha').value, tipo: App.getTipo(), costoLabor: App.getCostoLabor(), notas: $('ot-notas').value.trim(), aplicaciones, campana: data.campana }); },
  exportarOrdenPDF(oid) { const o = data.ordenes.find(x => x.id === oid); if (o) App._generatePDF(o); },

  _generatePDF(o) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const W = 210, H = 297, m = 12, cW = W - m * 2;
    const apps = o.aplicaciones || [];
    const fecha = o.fecha ? new Date(o.fecha + 'T12:00:00').toLocaleDateString('es-AR') : dateStr();
    const productor = currentProductor || '';

    // Colors
    const dark = [20, 30, 48];
    const blue = [37, 99, 186];
    const lightBg = [245, 247, 252];
    const midGray = [120, 130, 145];
    const white = [255, 255, 255];

    // Helper: check page break
    const checkPage = (need) => { if (y + need > H - 15) { doc.addPage(); y = 15; } };

    let y = 0;

    // ═══ HEADER — clean, dark, professional ═══
    doc.setFillColor(...dark);
    doc.rect(0, 0, W, 38, 'F');

    // Accent line
    doc.setFillColor(...blue);
    doc.rect(0, 38, W, 2, 'F');

    doc.setTextColor(...white);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(20);
    doc.text('ORDEN DE TRABAJO', m, 16);

    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    doc.text(fecha, m, 25);
    if (o.tipo) doc.text(o.tipo, m, 32);

    // Right side: productor + campana
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    if (productor) doc.text(productor, W - m, 16, { align: 'right' });
    doc.setFont('helvetica', 'normal');
    doc.text('Campana ' + (o.campana || data.campana), W - m, 25, { align: 'right' });

    y = 48;

    // ═══ INFO BAR — aplicador, lotes summary ═══
    const allLoteNames = [];
    let grandTotalHas = 0;
    apps.forEach(a => {
      (a.lotes || []).forEach(al => {
        const l = data.lotes.find(x => x.id === al.loteId);
        const name = l?.nombre || '?';
        if (!allLoteNames.includes(name)) allLoteNames.push(name);
        grandTotalHas += al.hectareas || 0;
      });
    });

    doc.setFillColor(...lightBg);
    doc.roundedRect(m, y, cW, 18, 2, 2, 'F');

    doc.setFontSize(8);
    doc.setTextColor(...midGray);
    doc.text('APLICADOR', m + 4, y + 5);
    doc.text('LOTES', m + 65, y + 5);
    doc.text('HECTAREAS', W - m - 30, y + 5);

    doc.setFontSize(10);
    doc.setTextColor(...dark);
    doc.setFont('helvetica', 'bold');
    doc.text(o.aplicador || 'Sin asignar', m + 4, y + 13);
    doc.setFont('helvetica', 'normal');
    const lotesDisplay = allLoteNames.join(', ');
    doc.text(lotesDisplay.length > 35 ? lotesDisplay.substring(0, 33) + '...' : lotesDisplay, m + 65, y + 13);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(12);
    doc.text(fmtInt(grandTotalHas) + ' has', W - m - 4, y + 13, { align: 'right' });

    y += 26;

    // ═══ APLICACIONES ═══
    const allProds = {};
    let pdfGrandInsHa = 0, pdfGrandMonto = 0, pdfGrandHas = 0;
    const costoLabor = o.costoLabor || 0;

    apps.forEach((app, ai) => {
      const has = appTotalHas(app);
      pdfGrandHas += has;
      const lotesStr = (app.lotes || []).map(al => {
        const l = data.lotes.find(x => x.id === al.loteId);
        return (l?.nombre || '?') + ' (' + (al.hectareas || 0) + ' has)';
      }).join('  ·  ');

      checkPage(30);

      // App header bar
      doc.setFillColor(...blue);
      doc.roundedRect(m, y, cW, 9, 1.5, 1.5, 'F');
      doc.setTextColor(...white);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      doc.text(lotesStr, m + 4, y + 6.5);
      doc.text(has + ' has total', W - m - 4, y + 6.5, { align: 'right' });
      y += 12;

      // Table header — 6 columns
      const colX = { producto: m + 2, formulacion: m + 52, precio: m + 92, dosis: m + 115, costoHa: m + 143, vol: m + 165 };

      doc.setFillColor(230, 235, 245);
      doc.rect(m, y, cW, 7, 'F');
      doc.setTextColor(...midGray);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(6.5);
      doc.text('PRODUCTO', colX.producto, y + 5);
      doc.text('FORMULACION', colX.formulacion, y + 5);
      doc.text('PRECIO', colX.precio, y + 5);
      doc.text('DOSIS/HA', colX.dosis, y + 5);
      doc.text('USD/HA', colX.costoHa, y + 5);
      doc.text('VOL. TOTAL', colX.vol, y + 5);
      y += 8;

      // Product rows
      let appInsHa = 0;
      (app.productos || []).forEach((r, i) => {
        checkPage(11);
        if (i % 2 === 0) { doc.setFillColor(250, 251, 254); doc.rect(m, y, cW, 10, 'F'); }

        const vol = has > 0 ? r.dosis * has : 0;
        const volStr = vol > 0 ? fmt(vol) + ' ' + (r.unidad || 'L') : '--';
        const ch = r.precio * r.dosis;
        appInsHa += ch;

        // Producto
        doc.setTextColor(...dark); doc.setFont('helvetica', 'bold'); doc.setFontSize(8);
        const nombre = r.producto.length > 24 ? r.producto.substring(0, 22) + '...' : r.producto;
        doc.text(nombre, colX.producto, y + 6.5);

        // Formulacion
        doc.setFont('helvetica', 'normal'); doc.setFontSize(7); doc.setTextColor(...midGray);
        doc.text((r.formulacion || '--').substring(0, 18), colX.formulacion, y + 6.5);

        // Precio unitario
        doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(...midGray);
        doc.text(r.precio > 0 ? '$' + fmt(r.precio) : '--', colX.precio, y + 6.5);

        // Dosis — blue, bold
        doc.setFont('helvetica', 'bold'); doc.setFontSize(9); doc.setTextColor(...blue);
        doc.text(r.dosis + ' ' + (r.unidad || 'L') + '/ha', colX.dosis, y + 7);

        // $/ha — bold
        doc.setFont('helvetica', 'bold'); doc.setFontSize(9); doc.setTextColor(...dark);
        doc.text('$' + fmt(ch), colX.costoHa, y + 7);

        // Vol total
        doc.setFont('helvetica', 'bold'); doc.setFontSize(9); doc.setTextColor(...dark);
        doc.text(volStr, colX.vol, y + 7);

        y += 10;

        if (!allProds[r.producto]) allProds[r.producto] = { producto: r.producto, formulacion: r.formulacion || '', unidad: r.unidad || 'L', totalVol: 0, totalCost: 0 };
        allProds[r.producto].totalVol += vol;
        allProds[r.producto].totalCost += ch * has;
      });

      pdfGrandInsHa += appInsHa;
      pdfGrandMonto += appInsHa * has;

      // Subtotal row
      checkPage(14);
      doc.setFillColor(235, 240, 250); doc.rect(m, y, cW, 8, 'F');
      doc.setTextColor(...dark); doc.setFont('helvetica', 'bold'); doc.setFontSize(8);
      doc.text('Subtotal insumos', colX.producto, y + 5.5);
      doc.setFontSize(9); doc.setTextColor(...blue);
      doc.text('$' + fmt(appInsHa) + '/ha', colX.costoHa, y + 5.5);
      if (has > 0) { doc.setFontSize(7); doc.setTextColor(...midGray); doc.text('$' + fmt(appInsHa * has) + ' total', colX.vol, y + 5.5); }
      y += 10;

      if (costoLabor > 0) {
        doc.setTextColor(...midGray); doc.setFont('helvetica', 'normal'); doc.setFontSize(7);
        doc.text('Labor: $' + fmt(costoLabor) + '/ha', colX.producto, y + 4);
        doc.setFont('helvetica', 'bold');
        doc.text('Total: $' + fmt(appInsHa + costoLabor) + '/ha', colX.costoHa, y + 4);
        y += 6;
      }
      y += 4;
    });

    // ═══ RESUMEN RETIRO + COSTOS ═══
    const prodList = Object.values(allProds);
    if (prodList.length) {
      checkPage(20 + prodList.length * 10);

      y += 2;
      doc.setFillColor(...dark);
      doc.roundedRect(m, y, cW, 9, 1.5, 1.5, 'F');
      doc.setTextColor(...white);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(10);
      doc.text('RESUMEN — RETIRO DE DEPOSITO', m + 4, y + 6.5);
      y += 13;

      doc.setFillColor(230, 235, 245); doc.rect(m, y, cW, 7, 'F');
      doc.setTextColor(...midGray); doc.setFont('helvetica', 'bold'); doc.setFontSize(6.5);
      doc.text('PRODUCTO', m + 2, y + 5);
      doc.text('FORMULACION', m + 70, y + 5);
      doc.text('VOLUMEN TOTAL', m + 115, y + 5);
      doc.text('COSTO TOTAL', m + 155, y + 5);
      y += 9;

      prodList.forEach((p, i) => {
        checkPage(11);
        if (i % 2 === 0) { doc.setFillColor(250, 251, 254); doc.rect(m, y, cW, 10, 'F'); }
        doc.setTextColor(...dark); doc.setFont('helvetica', 'bold'); doc.setFontSize(8);
        doc.text(p.producto.length > 30 ? p.producto.substring(0, 28) + '...' : p.producto, m + 2, y + 7);
        doc.setFont('helvetica', 'normal'); doc.setFontSize(7); doc.setTextColor(...midGray);
        doc.text(p.formulacion.substring(0, 20), m + 70, y + 7);
        doc.setFont('helvetica', 'bold'); doc.setFontSize(10); doc.setTextColor(...blue);
        doc.text(p.totalVol > 0 ? fmt(p.totalVol) + ' ' + p.unidad : '--', m + 115, y + 7);
        doc.setFontSize(9); doc.setTextColor(...dark);
        doc.text(p.totalCost > 0 ? '$' + fmt(p.totalCost) : '--', m + 155, y + 7);
        y += 10;
      });
      y += 4;
    }

    // ═══ TOTAL GENERAL ═══
    checkPage(22);
    const avgInsHa = pdfGrandHas > 0 ? pdfGrandMonto / pdfGrandHas : (apps.length > 0 ? pdfGrandInsHa / apps.length : 0);
    const grandTotalHa = avgInsHa + costoLabor;
    const grandTotalUSD = pdfGrandMonto + costoLabor * pdfGrandHas;

    doc.setFillColor(...dark); doc.roundedRect(m, y, cW, 18, 2, 2, 'F');
    doc.setTextColor(180, 190, 210); doc.setFont('helvetica', 'normal'); doc.setFontSize(8);
    doc.text('Insumos: $' + fmt(avgInsHa) + '/ha', m + 5, y + 6);
    if (costoLabor > 0) doc.text('  +  Labor: $' + fmt(costoLabor) + '/ha', m + 60, y + 6);
    doc.setTextColor(...white); doc.setFont('helvetica', 'bold'); doc.setFontSize(13);
    doc.text('TOTAL: USD ' + fmt(grandTotalHa) + '/ha', m + 5, y + 14);
    if (pdfGrandHas > 0) {
      doc.setFontSize(10); doc.text('USD ' + fmt(grandTotalUSD), W - m - 5, y + 14, { align: 'right' });
      doc.setFontSize(7); doc.setFont('helvetica', 'normal'); doc.setTextColor(180, 190, 210);
      doc.text(fmtInt(pdfGrandHas) + ' has', W - m - 5, y + 6, { align: 'right' });
    }
    y += 24;

    // ═══ NOTAS ═══
    if (o.notas) {
      checkPage(20);
      doc.setFillColor(...lightBg);
      const notasLines = doc.splitTextToSize(o.notas, cW - 12);
      const notasH = 10 + notasLines.length * 4;
      doc.roundedRect(m, y, cW, notasH, 2, 2, 'F');

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(8);
      doc.setTextColor(...dark);
      doc.text('NOTAS', m + 5, y + 6);

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(...midGray);
      doc.text(notasLines, m + 5, y + 12);
      y += notasH + 4;
    }

    // ═══ FOOTER ═══
    const pageCount = doc.internal.getNumberOfPages();
    for (let p = 1; p <= pageCount; p++) {
      doc.setPage(p);
      doc.setFillColor(...dark);
      doc.rect(0, H - 10, W, 10, 'F');
      doc.setTextColor(180, 185, 195);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(7);
      doc.text('Orden de trabajo — ' + fecha, m, H - 4);
      doc.text('Pagina ' + p + '/' + pageCount, W - m, H - 4, { align: 'right' });
    }

    // ═══ SAVE ═══
    const fn = 'OT_' + (allLoteNames[0] || 'orden').replace(/\s+/g, '_') + '_' + (o.fecha || dateISO()) + '.pdf';
    try {
      const blob = doc.output('blob');
      const file = new File([blob], fn, { type: 'application/pdf' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: 'Orden de Trabajo' });
      } else {
        doc.save(fn);
      }
    } catch(err) {
      if (err.name !== 'AbortError') doc.save(fn);
    }
  },

  updateOrdenPrecio(oid, producto, valor) {
    const o = data.ordenes.find(x => x.id === oid);
    if (!o) return;
    const precio = parseFloat(valor) || 0;
    (o.aplicaciones || []).forEach(a => {
      (a.productos || []).forEach(p => {
        if (p.producto === producto) p.precio = precio;
      });
    });
    Storage.save(data);
    App.renderOrdenes();
  },

  duplicarOrden(oid) {
    const o = data.ordenes.find(x => x.id === oid); if (!o) return;
    const dup = JSON.parse(JSON.stringify(o));
    dup.id = Storage.nextId('ot'); dup.fecha = dateISO(); dup.estado = 'pendiente';
    dup.createdAt = new Date().toISOString(); dup.updatedAt = new Date().toISOString();
    data.ordenes.push(dup); Storage.save(data); App.renderOrdenes(); showToast('Orden duplicada');
  },
  deleteOrden(oid) { if (!confirm('Eliminar esta orden?')) return; data.ordenes = data.ordenes.filter(o => o.id !== oid); Storage.save(data); App.renderOrdenes(); showToast('Orden eliminada'); },
};


document.addEventListener('DOMContentLoaded', () => {
  // Render user buttons
  $('user-buttons').innerHTML = USUARIOS.map(u =>
    `<button data-uid="${u.id}" onclick="App.loginProductor('${u.id}')" style="padding:12px 20px;border:1.5px solid var(--accent);border-radius:12px;background:var(--accent-bg);color:var(--navy);font-weight:700;font-size:14px;cursor:pointer;font-family:var(--font);min-width:80px;">${u.nombre}</button>`
  ).join('');

  // Always show user selection — no auto-login

  // Delegated listeners (always active)
  $('ordenes-list').addEventListener('click', e => { const btn = e.target.closest('[data-oid][data-estado]'); if (btn) { e.stopPropagation(); App.cambiarEstadoOrden(btn.dataset.oid, btn.dataset.estado); } });
  $('ot-costo-labor').addEventListener('input', () => App._renderTotales());

});
</script>
</body>
