<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotizador Agroinsumos — Henderseeds v3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0d2d5e;
  --navy-light: #1a4a8a;
  --navy-sky: #2d6fc4;
  --accent: #2d6fc4;
  --accent-dark: #1a4a8a;
  --accent-bg: #e8f0fe;
  --accent-light: #5b9af5;
  --green: #16a34a;
  --green-bg: #dcfce7;
  --red: #ef4444;
  --bg: #f0f4fb;
  --card: #ffffff;
  --border: #e2e8f0;
  --accent-border: #b8cfef;
  --text: #0d2033;
  --text-sec: #64748b;
  --text-mut: #94a3b8;
  --radius: 14px;
  --radius-sm: 9px;
  --shadow: 0 2px 14px rgba(13,45,94,.08), 0 1px 3px rgba(13,45,94,.04);
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --title: 'Archivo Black', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  padding-bottom: 70px;
}
input, select, button { font-family: inherit; font-size: inherit; }

/* ── Header ── */

/* ── Status bar ── */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 4px 0 6px;
  font-size: .7rem;
  color: var(--text-mut);
}
.status-bar .vname { font-weight: 700; color: var(--navy-sky); cursor: pointer; }
.status-bar .vname:hover { text-decoration: underline; }

/* ── Tabs (underline style) ── */
.tabs {
  display: flex;
  border-bottom: 2px solid var(--border);
}
.tab-btn {
  flex: 1;
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  color: var(--text-mut);
  font-size: .76rem;
  font-weight: 500;
  padding: 10px 4px;
  cursor: pointer;
  transition: all .2s;
  font-family: var(--font);
  margin-bottom: -2px;
  white-space: nowrap;
}
.tab-btn.active { border-bottom-color: var(--accent); color: var(--navy); font-weight: 700; }

/* ── Vendor overlay ── */
#vendor-overlay {
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 60%, var(--navy-sky) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
}
#vendor-overlay.hidden { display: none; }
.vendor-card {
  background: #fff;
  border-radius: 18px;
  padding: 32px 28px;
  max-width: 340px;
  width: 90%;
  box-shadow: 0 12px 40px rgba(0,0,0,.25);
  text-align: center;
}
.vendor-card h2 { margin: 0 0 6px; font-size: 1.1rem; color: var(--navy); }
.vendor-card p { margin: 0 0 20px; font-size: .78rem; color: var(--text-sec); }
.vendor-btn {
  display: block;
  width: 100%;
  padding: 14px;
  margin-bottom: 10px;
  border: 2px solid var(--border);
  border-radius: 12px;
  background: #fff;
  font-family: var(--font);
  font-size: .88rem;
  font-weight: 600;
  color: var(--navy);
  cursor: pointer;
  transition: all .15s;
}
.vendor-btn:hover { border-color: var(--accent); background: var(--accent-bg); }
.vendor-btn:last-child { margin-bottom: 0; }

/* ── Animations ── */
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.fu { animation: fadeUp .26s ease both; }
.fu1 { animation-delay: .05s; } .fu2 { animation-delay: .1s; } .fu3 { animation-delay: .16s; }

/* ── Layout principal ── */
.main { max-width: 920px; margin: 0 auto; padding: 8px 8px 52px; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Layout: una sola columna, referencia abajo */
.layout-2col {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}

/* ── Card ── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
}
.card-title {
  font-family: var(--title);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--text-sec);
  margin-bottom: 10px;
}

/* ── Inputs ── */
.inp {
  width: 100%;
  padding: 8px 10px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  background: white;
  color: var(--text);
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.inp:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(217,119,6,.12); }
.inp-sm { padding: 6px 8px; font-size: 13px; }
.inp-xs { padding: 4px 6px; font-size: 12px; width: 70px; text-align: right; font-family: var(--mono); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.form-lbl {
  font-size: .7rem;
  font-weight: 700;
  color: var(--accent-dark);
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: 5px;
}

/* ── Filas de cotización ── */
.rows-scroll {
  overflow-x: auto;
  margin: 0 -12px;
  padding: 0 12px;
}
.rows-header {
  display: grid;
  grid-template-columns: 1fr 52px 68px 62px 58px 62px 68px 24px;
  gap: 6px;
  padding: 6px 10px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-sec);
  text-transform: uppercase;
  letter-spacing: .3px;
}
.row-item {
  display: grid;
  grid-template-columns: 1fr 52px 68px 62px 58px 62px 68px 24px;
  gap: 6px;
  align-items: center;
  background: var(--card);
  border-radius: var(--radius-sm);
  padding: 10px 10px;
  margin-bottom: 6px;
  box-shadow: var(--shadow);
  animation: slideIn .2s ease;
  min-height: 48px;
}
.row-inp {
  width: 100%;
  padding: 3px 4px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  text-align: right;
  color: var(--text);
  background: white;
  outline: none;
}
.row-inp:focus { border-color: var(--accent); background: var(--accent-bg); }
/* Fila nueva (buscador inline) */
.row-new {
  display: grid;
  grid-template-columns: 1fr 52px 68px 62px 58px 62px 68px 24px;
  gap: 6px;
  align-items: center;
  background: var(--bg);
  border: 1px dashed var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  margin-bottom: 5px;
}
.row-new-search {
  position: static;
}
.row-new { position: relative; }
.app-dropdown .dropdown {
  left: 0;
  right: 0;
  top: 100%;
}
.row-new-search input {
  width: 100%;
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 13px;
  font-family: var(--font);
  outline: none;
  background: white;
}
.row-new-search input:focus { border-color: var(--accent); }
.row-new-search input::placeholder { color: var(--text-mut); }
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}
.row-prod { display: flex; flex-direction: column; min-width: 0; }
.row-prod-name {
  font-size: 13px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.row-prod-meta { font-size: 10px; color: var(--text-mut); }
.row-val {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  text-align: right;
}
.row-val.costo { color: var(--accent); font-weight: 700; font-size: 13px; }
.row-rm {
  background: none;
  border: none;
  color: var(--text-mut);
  font-size: 16px;
  cursor: pointer;
  padding: 2px;
  line-height: 1;
  text-align: center;
}
.row-rm:hover { color: var(--red); }

/* ── Dropdown ── */
.dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: white;
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  max-height: 250px;
  overflow-y: auto;
  z-index: 50;
  box-shadow: 0 8px 24px rgba(0,0,0,.12);
  display: none;
}
.dropdown.show { display: block; }
.dd-cat {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--accent);
  padding: 8px 12px 4px;
  background: var(--bg);
}
.dd-item {
  padding: 4px 12px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  border-bottom: 1px solid var(--bg);
}
.dd-item:hover, .dd-item.highlighted { background: var(--accent-bg); }
.dd-item-price {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  white-space: nowrap;
}

.cliente-dd { z-index: 500; max-height: 60vh; }
.cliente-dd .dd-item { font-size: 13px; padding: 6px 12px; }
.cliente-dd .dd-add { color: var(--accent); font-weight: 700; font-size: 12px; }

/* ── Plazo ── */
.plazo-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}
.plazo-chip {
  flex: 1;
  padding: 8px 6px;
  border-radius: 10px;
  font-size: .7rem;
  font-weight: 700;
  border: 1.5px solid var(--border);
  background: white;
  cursor: pointer;
  text-align: center;
  transition: all .15s;
  line-height: 1.2;
  font-family: var(--font);
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.plazo-chip.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 2px 8px rgba(217,119,6,.2); }
.plazo-chip small { display: block; font-weight: 400; font-size: .7rem; opacity: .7; margin-top: 1px; }

/* ── Totales ── */
.totales {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 55%, var(--navy-sky) 100%);
  color: white;
  border-radius: var(--radius);
  padding: 14px 18px;
  margin-bottom: 10px;
}
.tot-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: .78rem; }
.tot-row span:first-child { opacity: .7; font-size: .72rem; }
.tot-row.big {
  border-top: 1px solid rgba(255,255,255,.15);
  margin-top: 6px;
  padding-top: 10px;
  font-size: 1.1rem;
  font-weight: 700;
}
.tot-row.big span:first-child { opacity: 1; }
.tot-row .mono { font-family: var(--mono); color: var(--accent-light); }

/* ── Botones ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 13px 18px;
  border: none;
  border-radius: 99px;
  font-size: .82rem;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font);
  transition: opacity .15s;
}
.btn:hover { opacity: .87; }
.btn-accent { background: var(--accent); color: white; box-shadow: 0 3px 12px rgba(217,119,6,.26); }
.btn-green { background: #25d366; color: white; box-shadow: 0 3px 12px rgba(37,211,102,.26); }
.btn-outline { background: var(--navy-light); color: #fff; box-shadow: 0 3px 12px rgba(30,41,59,.22); }
.btn-sm { font-size: .7rem; padding: 6px 14px; }

/* ── Panel referencia (abajo) ── */
.ref-panel { }
.ref-panel .card { margin-bottom: 0; }
.ref-table-wrap {
  max-height: calc(100vh - 200px);
  overflow-y: auto;
  overflow-x: auto;
  border-radius: var(--radius-sm);
}
.ref-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.ref-table th {
  position: sticky;
  top: 0;
  background: var(--navy);
  color: white;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .3px;
  padding: 8px 6px;
  text-align: left;
  white-space: nowrap;
  z-index: 2;
}
.ref-table th.num { text-align: right; }
.ref-table td {
  padding: 6px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.ref-table td.num {
  text-align: right;
  font-family: var(--mono);
  white-space: nowrap;
}
.ref-table tr:hover { background: var(--accent-bg); }
.ref-table tr.cat-row td {
  background: var(--bg);
  font-family: var(--title);
  font-size: 11px;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: .5px;
  padding: 6px;
  border-bottom: 2px solid var(--accent);
}
.ref-table .prod-name { font-weight: 600; white-space: nowrap; }
.ref-table .droga { font-size: 10px; color: var(--text-sec); max-width: 180px; }
.ref-table .prov { font-size: 11px; color: var(--text-sec); }
.ref-table .resid { font-size: 11px; text-align: center; }
.ref-table .precio-col { color: var(--accent); font-weight: 700; }
.ref-table .costo-ha-col { color: var(--green); font-weight: 600; }

/* Filtro referencia */
.ref-filter {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
}
.ref-filter-inp {
  flex: 1;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  outline: none;
}
.ref-filter-inp:focus { border-color: var(--accent); }

/* Panel referencia toggle */
.ref-toggle {
  display: block;
  width: 100%;
  padding: 10px;
  background: var(--navy-light);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 10px;
}
.ref-panel { display: none; }
.ref-panel.open { display: block; }

/* ── App blocks (aplicaciones) ── */
.app-block { background: var(--card); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow); }
.app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.app-title { font-family: var(--title); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--accent-dark); }
.app-header-actions { display: flex; gap: 6px; align-items: center; }
.app-toggle, .app-delete { background: none; border: none; cursor: pointer; font-size: 14px; color: var(--text-mut); padding: 2px 4px; }
.app-toggle:hover, .app-delete:hover { color: var(--navy); }
.app-body { }
.app-block.collapsed .app-body { display: none; }
.app-summary { font-size: 11px; color: var(--text-sec); margin-left: 12px; }
.app-totales { background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 55%, var(--navy-sky) 100%); color: white; border-radius: var(--radius-sm); padding: 10px 14px; margin-top: 8px; }
.app-tot-row { display: flex; justify-content: space-between; font-size: .72rem; padding: 2px 0; }
.app-tot-row span:first-child { opacity: .7; }
.app-tot-row.big { border-top: 1px solid rgba(255,255,255,.15); margin-top: 4px; padding-top: 6px; font-weight: 700; font-size: .85rem; }
.btn-add-app { width: 100%; padding: 12px; border: 2px dashed var(--accent); border-radius: var(--radius); background: var(--accent-bg); color: var(--accent-dark); font-weight: 700; font-size: .8rem; cursor: pointer; margin-bottom: 10px; transition: all .15s; }
.btn-add-app:hover { background: var(--accent); color: white; }
.resumen-card { background: var(--card); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow); border: 2px solid var(--accent-border); }
.resumen-title { font-family: var(--title); font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--accent-dark); margin-bottom: 10px; }
.resumen-row { display: grid; grid-template-columns: 1fr 70px 65px 85px; gap: 6px; padding: 4px 0; font-size: .75rem; border-bottom: 1px solid var(--bg); align-items: center; }
.resumen-row:last-child { border-bottom: none; }

/* ── WA bar ── */
.wa-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 936px;
  background: white;
  border-top: 1px solid var(--border);
  padding: 10px 8px;
  display: flex;
  gap: 8px;
  z-index: 90;
  box-sizing: border-box;
}
.wa-bar .btn { flex: 1; }

/* ── WA preview ── */
.wa-preview {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 200;
  justify-content: center;
  align-items: flex-end;
}
.wa-preview.show { display: flex; }
.wa-sheet {
  background: white;
  border-radius: 16px 16px 0 0;
  width: 100%;
  max-width: 600px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 20px 16px;
  animation: sheetUp .25s ease;
}
@keyframes sheetUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.wa-msg {
  background: #DCF8C6;
  border-radius: 8px;
  padding: 12px;
  font-size: 13px;
  font-family: var(--mono);
  white-space: pre-wrap;
  line-height: 1.5;
  margin-bottom: 16px;
  word-break: break-word;
}
.wa-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.wa-actions .btn-green { grid-column: 1 / -1; }

/* ── Lista de precios ── */
.lista-cat {
  font-family: var(--title);
  font-size: 13px;
  color: var(--accent);
  padding: 8px 0 4px;
  text-transform: uppercase;
  border-bottom: 2px solid var(--accent);
  margin-bottom: 4px;
  margin-top: 14px;
}
.lista-cat:first-child { margin-top: 0; }
.lista-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
.lista-name { font-size: 13px; font-weight: 500; }
.lista-unit { font-size: 11px; color: var(--text-mut); }
.lista-price { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--accent); white-space: nowrap; }

/* ── Historial ── */
.hist-empty { text-align: center; padding: 40px 20px; color: var(--text-mut); }

/* ── Status ── */
.status { display: flex; align-items: center; gap: 5px; font-size: .7rem; color: var(--text-mut); padding: 6px 4px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); }
.status-dot.on { background: var(--green); }

/* ── Mobile ── */
@media (max-width: 639px) {
  .status-bar { flex-wrap: wrap; justify-content: center; gap: 4px 10px; }
  .col-cotiz { min-width: 0; }
  .app-body { overflow-x: auto; }
  .rows-scroll { margin: 0 -14px; padding: 0 14px; -webkit-overflow-scrolling: touch; }
  .rows-header, .row-item, .row-new { min-width: 0; }
  .mob-hide { display: none !important; }
  .row-new { display: flex; gap: 6px; min-width: 0; }
  .row-new .row-new-search { flex: 1; }
  .row-new .row-val, .row-new > span:last-child { display: none; }
  .plazo-bar { flex-wrap: wrap; }
  #fin-config { flex-basis: 100%; flex-wrap: wrap; gap: 6px !important; }
  .resumen-row { grid-template-columns: 1fr 60px 55px 75px; font-size: .7rem; }
  .wa-bar { padding: 8px 6px; gap: 6px; }
  .wa-bar .btn { font-size: .72rem; padding: 10px 8px; }
  .app-header { flex-wrap: wrap; gap: 4px; }
  .app-summary { font-size: 10px; }
}
.cond-table{width:100%;border-collapse:collapse;font-size:.72rem;table-layout:fixed}
.cond-table th{font-size:.7rem;font-weight:600;color:#64748b;padding:5px 8px;border-bottom:1px solid var(--border)}
.cond-table th:first-child{text-align:left;width:40%}
.cond-table th:nth-child(2),.cond-table th:nth-child(3),.cond-table th:nth-child(4){text-align:right;width:20%}
.cond-table td{padding:6px 8px;border-bottom:1px solid #f1f5f9}
.cond-table td:first-child{font-weight:600;color:#0d2033;text-align:left}

<script>
const $ = id => document.getElementById(id);
const fmt = n => Number(n).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const dateStr = (d = new Date()) => d.toLocaleDateString('es-AR');
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

async function captureAndShare(el, filename, opts={}) {
  const canvas = await html2canvas(el, {scale:3, useCORS:true, backgroundColor:'#ffffff', logging:false, windowWidth:opts.width||400, width:opts.width||400, height:el.scrollHeight});
  if(opts.pdf) {
    const imgData = canvas.toDataURL('image/png');
    const pxW = canvas.width, pxH = canvas.height;
    const mmW = (pxW / 3) * 25.4 / 96, mmH = (pxH / 3) * 25.4 / 96;
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: mmW > mmH ? 'l' : 'p', unit: 'mm', format: [mmW, mmH] });
    pdf.addImage(imgData, 'PNG', 0, 0, mmW, mmH, '', 'FAST');
    const pdfBlob = pdf.output('blob');
    const pdfFile = new File([pdfBlob], filename.replace(/\.png$/i,'.pdf'), {type:'application/pdf'});
    if(opts.share && navigator.canShare && navigator.canShare({files:[pdfFile]})) {
      await navigator.share({files:[pdfFile], title:opts.title||filename});
      return;
    }
    const url = URL.createObjectURL(pdfBlob);
    const a = document.createElement('a'); a.href=url; a.download=pdfFile.name; a.click();
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
    return;
  }
  const blob = await new Promise(r => canvas.toBlob(r,'image/png',1.0));
  if(opts.share && navigator.canShare) {
    const file = new File([blob], filename, {type:'image/png'});
    if(navigator.canShare({files:[file]})) { await navigator.share({files:[file], title:opts.title||filename}); return; }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

function debounce(fn, ms=150) { let t; return (...a) => { clearTimeout(t); t=setTimeout(()=>fn(...a), ms); }; }

/* ══════════════════════════════════════════
   CATÁLOGO FALLBACK — copia de "Catalogo Agronomia" en Sheets
   Columnas: producto, presentacion, formulacion, proveedor,
   iva_pct, costo_usd, margen_pct, precio_usd, dosis_sug, stock
   Cuando conecte a Sheets se sobreescribe con datos frescos.
   ══════════════════════════════════════════ */
/* Catálogo vacío — SIEMPRE se carga desde Sheets. Sin fallback de precios. */
const CATALOGO_FALLBACK = {};

const FINANCIACION_FALLBACK = [
  { plazo: "contado", label: "Contado", recargo_pct: 0 },
  { plazo: "mayo2026", label: "Mayo 2026", recargo_pct: 2 },
  { plazo: "dic2026", label: "Dic 2026", recargo_pct: 6 }
];

/* ── Logo para PDF (se carga como base64 al inicio) ── */
let logoDataUrl = null;
(function loadLogo() {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    const c = document.createElement('canvas');
    c.width = img.naturalWidth;
    c.height = img.naturalHeight;
    c.getContext('2d').drawImage(img, 0, 0);
    logoDataUrl = c.toDataURL('image/png');
  };
  img.src = 'assets/logo-henderseeds.png';
})();

/* ── Estado ── */
let catalogo = JSON.parse(localStorage.getItem('hs_agro_catalogo_cache') || 'null') || CATALOGO_FALLBACK;
let financiacion = JSON.parse(localStorage.getItem('hs_agro_financiacion_cache') || 'null') || FINANCIACION_FALLBACK;
let aplicaciones = [];
let appId = 0;
let rowId = 0;
let activeDropdownApp = null;
let plazoActual = 'contado';
let prodSeleccionado = null;
let highlightIdx = -1;
let ddItems = [];
let clientes = JSON.parse(localStorage.getItem('hs_agro_clientes_cache') || '[]');
let clienteHighlight = -1;
let clienteMatches = [];

/* ── Calc ── */
const Calc = {
  recargo(plazo) {
    const f = financiacion.find(f => f.plazo === plazo);
    return f ? f.recargo_pct : 0;
  },
  precioConRecargo(precio, plazo) {
    return precio * (1 + Calc.recargo(plazo) / 100);
  },
  costoHa(precio, dosis, plazo) {
    return Calc.precioConRecargo(precio, plazo) * dosis;
  }
};

/* ── Local Backup — localStorage fallback for agro quotes ── */
const LocalBackup = {
  KEY: 'hs_agro_cotizaciones_backup',
  save(cotizacion) {
    try {
      const all = this.getAll();
      all.unshift(cotizacion);
      if(all.length>50) all.length=50;
      localStorage.setItem(this.KEY, JSON.stringify(all));
    } catch(e) { console.warn('LocalBackup save error:', e); }
  },
  getAll() {
    try { return JSON.parse(localStorage.getItem(this.KEY)||'[]'); }
    catch(e) { return []; }
  },
  markSynced(localId) {
    try {
      const all = this.getAll();
      const q = all.find(c=>c.localId===localId);
      if(q) { q.synced=true; localStorage.setItem(this.KEY, JSON.stringify(all)); }
    } catch(e) {}
  },
  getPending() {
    return this.getAll().filter(c=>!c.synced);
  }
};

/* ══════════════════════════════════════════
   API_URL — Pegá acá la URL de tu Apps Script deploy
   Dejala vacía para usar datos fallback locales
   ══════════════════════════════════════════ */
const API_URL = 'https://script.google.com/macros/s/AKfycbyoK9r8Scj6WBhl_XUUiAU_kcpTVtGKSlDH9WHmVlRGNo-jt-QbLqlg5BNY5RGAhHV8kw/exec';

/* ── Market (conexión a Sheets) ── */
const Market = {
  online: false,

  init() {
    if (!API_URL) {
      Market.setStatus(false, 'Offline — datos locales');
      return;
    }
    // Show cached data immediately
    const hasCachedCat = localStorage.getItem('hs_agro_catalogo_cache');
    const totalCached = Object.values(catalogo).reduce((s,arr) => s + arr.length, 0);
    Market.setStatus(hasCachedCat ? true : null, hasCachedCat ? 'Cache — ' + totalCached + ' productos' : 'Conectando...');

    // Background refresh all data
    Promise.all([
      Market.fetch('getCatalogoAgro'),
      Market.fetch('getFinanciacionAgro'),
      Market.fetch('getClientes')
    ]).then(([catRes, finRes, cliRes]) => {
      if (catRes.ok && catRes.catalogo) {
        catalogo = catRes.catalogo;
        localStorage.setItem('hs_agro_catalogo_cache', JSON.stringify(catalogo));
        var totalProds = Object.values(catalogo).reduce((s, arr) => s + arr.length, 0);
        Market.setStatus(true, 'Sheets — ' + totalProds + ' productos');
      } else if (!hasCachedCat) {
        Market.setStatus(false, 'Error catálogo — datos locales');
      }
      if (finRes.ok && finRes.financiacion) {
        financiacion = finRes.financiacion;
        localStorage.setItem('hs_agro_financiacion_cache', JSON.stringify(financiacion));
      }
      if (cliRes.ok && cliRes.clientes) {
        clientes = cliRes.clientes;
        localStorage.setItem('hs_agro_clientes_cache', JSON.stringify(clientes));
      }
      App.renderLista(plazoActual);
      // Sync pending local quotes
      const pending = LocalBackup.getPending();
      if (pending.length) {
        (async () => {
          for (const cot of pending) {
            try {
              await Market.post({ action:'registrarAgro', vendedor:cot.vendedor, cliente:cot.cliente, items:cot.items });
              LocalBackup.markSynced(cot.localId);
            } catch(e) { break; }
          }
        })();
      }
    }).catch(err => {
      console.error('Market.init error:', err);
      Market.setStatus(hasCachedCat ? true : false, hasCachedCat ? 'Sin conexión — usando cache' : 'Error — datos locales');
    });
  },

  async fetch(action) {
    const res = await fetch(API_URL + '?action=' + action + '&_t=' + Date.now(), { cache: 'no-store' });
    return res.json();
  },

  async post(data) {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify(data)
    });
    return res.json();
  },

  async registrarCotizacion() {
    if (!API_URL) return null;
    try {
      const fin = financiacion.find(f => f.plazo === plazoActual);
      const firstApp = aplicaciones[0] || { hectareas: 0, establecimiento: '' };
      const allRows = aplicaciones.flatMap(a => a.rows);
      const data = {
        action: 'registrarAgro',
        vendedor: vendor,
        cliente: $('cliente').value,
        localidad: '',
        hectareas: firstApp.hectareas,
        establecimiento: firstApp.establecimiento,
        plazo: fin ? fin.label : 'Contado',
        recargo_pct: fin ? fin.recargo_pct : 0,
        lineas: allRows.map(r => ({
          categoria: r.cat,
          producto: r.producto,
          unidad: r.unidad,
          precio: r.precio,
          dosis: r.dosis,
          iva_pct: r.iva_pct
        })),
        aplicaciones: aplicaciones.map(a => ({
          establecimiento: a.establecimiento,
          hectareas: a.hectareas,
          lineas: a.rows.map(r => ({
            categoria: r.cat,
            producto: r.producto,
            unidad: r.unidad,
            precio: r.precio,
            dosis: r.dosis,
            iva_pct: r.iva_pct
          }))
        }))
      };
      return await Market.post(data);
    } catch (err) {
      console.error('Registrar error:', err);
      return null;
    }
  },

  setStatus(online, text) {
    Market.online = online;
    const dot = $('status-dot');
    const txt = $('status-text');
    if (!dot || !txt) return;
    dot.classList.remove('on');
    if (online === true) dot.classList.add('on');
    if (online === null) dot.style.background = 'var(--accent)';
    else dot.style.background = '';
    txt.textContent = text;
  }
};

/* ── Historial ── */
const Historial = {
  items: JSON.parse(localStorage.getItem('hs_agro_historial_cache') || '[]'),
  async cargar() {
    // Show cached immediately, then refresh
    if (Historial.items.length) Historial.render();
    if (!API_URL) { if (!Historial.items.length) Historial.render(); return; }
    try {
      const res = await Market.fetch('getHistorialAgro');
      if (res.ok && res.historial) {
        Historial.items = res.historial;
        localStorage.setItem('hs_agro_historial_cache', JSON.stringify(res.historial));
      }
    } catch(e) { console.error('Error cargando historial:', e); }
    Historial.render();
  },

      const est = estados[h.numero] || 'Pendiente';
      const thead = `<div style="display:grid; grid-template-columns:1fr 50px 55px 50px 50px 55px; gap:2px; padding:4px 0; border-bottom:1px solid var(--border); font-size:9px; font-weight:700; color:var(--text-mut); text-transform:uppercase;">
        <span>Producto</span><span style="text-align:right">Dosis</span><span style="text-align:right">Vol.</span><span style="text-align:right">Precio</span><span style="text-align:right">$/ha</span><span style="text-align:right">Monto</span>
      </div>`;
      const trows = (h.lineas || []).map(l =>
        `<div style="display:grid; grid-template-columns:1fr 50px 55px 50px 50px 55px; gap:2px; padding:3px 0; border-bottom:1px solid var(--bg); font-size:11px;">

        const active = est === s;
        return `<button onclick="Historial.setEstado('${h.numero}','${s}')" style="padding:5px 4px;font-size:10px;font-weight:${active?'800':'600'};border-radius:6px;border:1.5px solid ${estadoColors[s]};cursor:pointer;font-family:var(--font);background:${active?estadoColors[s]:'#fff'};color:${active?'#fff':estadoColors[s]};white-space:nowrap;">${s}</button>`;
      }).join('');
      return `<div class="card" style="margin-bottom:10px;display:flex;gap:10px;">
        <div style="flex:1;min-width:0;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
            <div style="display:flex; gap:6px; align-items:center;">
              <span style="font-family:var(--mono); font-size:12px; color:var(--accent);">#${h.numero || '—'}</span>
              ${tipoTag}
            </div>
            <span style="font-size:11px; color:var(--text-mut);">${h.fecha} · ${h.vendedor || ''} · ${h.plazo || ''}</span>
          </div>
          <div style="font-weight:700; font-size:14px; margin-bottom:1px;">${h.cliente || 'Sin nombre'}</div>

          <div style="margin-top:4px; overflow-x:auto;">
            ${thead}${trows}

          <div style="display:flex; justify-content:space-between; margin-top:6px; padding-top:4px; border-top:1px solid var(--border);">

            <span style="font-size:11px; color:var(--text-sec);">Total ${h.hectareas} has</span>
            <span style="font-family:var(--mono); font-size:11px; font-weight:700;">USD ${h.totalHas || '—'}</span>

          <div style="display:flex; gap:6px; margin-top:8px; padding-top:6px; border-top:1px solid var(--border);">
            <button style="flex:1;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 0;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:5px;" onclick="Historial.modificar(${idx})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg> Modificar</button>
            <button style="background:#f0fdf4;color:#15803d;border:1.5px solid #bbf7d0;border-radius:8px;padding:7px 10px;cursor:pointer;display:flex;align-items:center;" onclick="Historial.compartir(${idx})"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></button>
            <button onclick="Historial.eliminar(${idx})" style="background:#fee2e2;color:#dc2626;border:1.5px solid #fecaca;border-radius:8px;padding:7px 10px;cursor:pointer;display:flex;align-items:center;" ><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>

          ${statusHtml}
        </div>
      </div>`;
    }).join('');
    // bodyInline is the only target now (hist tab was replaced by condiciones)
  },
  setEstado(numero, estado) {
    const estados = JSON.parse(localStorage.getItem('hs_agro_quote_estados') || '{}');
    estados[numero] = estado;
    localStorage.setItem('hs_agro_quote_estados', JSON.stringify(estados));
    this.render();
  },
  modificar(idx) {
    const h = Historial.items[idx];
    if (!h) return;
    // Set client
    $('cliente').value = h.cliente || '';
    // Clear existing aplicaciones and load from history
    aplicaciones.length = 0;
    appId++;
    const app = { id: appId, establecimiento: h.establecimiento || '', hectareas: h.hectareas || 0, rows: [] };
    (h.lineas || []).forEach(l => {
      rowId++;
      app.rows.push({
        id: rowId,
        producto: l.producto || '',
        cat: l.categoria || '',
        precio: parseFloat(l.precio) || 0,
        unidad: l.unidad || 'L',
        dosis: parseFloat(l.dosis) || 0,
        iva_pct: l.iva_pct || 21,
        proveedor: '',
        costo_usd: 0,
        margen_pct: 0,
        precio_margen: parseFloat(l.precio) || 0,
        formulacion: l.formulacion || '',
        presentacion: 0
      });
    });
    aplicaciones.push(app);
    App.renderAplicaciones();
    // Switch to cotizar tab
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelector('[data-tab="cotizar"]').classList.add('active');
    $('tab-cotizar').classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    alert('Cotización #' + (h.numero || '') + ' cargada', 'Editá y compartí.');
  },
  async compartir(idx) {
    await Historial.exportar(idx);
  },
  async eliminar(idx) {
    const h = Historial.items[idx];
    if (!h) return;
    if (!confirm('¿Eliminar cotización #' + (h.numero || '') + '? Esta acción no se puede deshacer.')) return;
    try {
      const r = await fetch(API_URL, { method: 'POST', redirect: 'follow', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'deleteCotizacionAgro', numero: h.numero }) });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const text = await r.text();
      let d; try { d = JSON.parse(text); } catch(e) { throw new Error('Respuesta no JSON'); }
      if (d.ok) {
        Historial.items.splice(idx, 1);
        localStorage.setItem('hs_agro_historial_cache', JSON.stringify(Historial.items));
        Historial.render();
        alert('Eliminada', 'Cotización eliminada.');
      } else { alert('Error', d.error || 'No se pudo eliminar'); }
    } catch(e) { alert('Error de conexión', e.message); }
  },
  async recargar() {
    await Historial.cargar();
  },
  async exportar(idx) {
    const h = Historial.items[idx];
    if (!h) return;

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const W = 210, margin = 15, contentW = W - margin * 2;
    let y = 15;
    const navy = [30, 41, 59], accent = [217, 119, 6], gris = [100, 116, 139];

    // Header
    const headerH = 20;
    doc.setFillColor(...navy);
    doc.rect(0, 0, W, headerH, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(13);
    doc.setFont('helvetica', 'bold');
    doc.text('COTIZACIÓN #' + (h.numero || ''), margin, 10);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'normal');
    doc.text(h.fecha + ' · ' + (h.vendedor || '') + '  ·  ' + (h.plazo || ''), margin, 16);
    if (logoDataUrl) {
      const logoW = 28, logoH = logoW / 2.51;
      try { doc.addImage(logoDataUrl, 'PNG', W - margin - logoW, 3, logoW, logoH); } catch(e) {}
    }
    y = headerH + 4;

    // Info
    const infoItems = [];
    if (h.cliente) infoItems.push(['Cliente:', h.cliente]);
    if (h.establecimiento) infoItems.push(['Establecimiento:', h.establecimiento]);
    if (h.hectareas) infoItems.push(['Superficie:', h.hectareas + ' has']);
    if (infoItems.length) {
      const boxH = 6 + infoItems.length * 6;
      doc.setFillColor(254, 243, 199);
      doc.roundedRect(margin, y, contentW, boxH, 2, 2, 'F');
      doc.setFontSize(9);
      doc.setTextColor(...navy);
      infoItems.forEach((item, i) => {
        const iy = y + 5 + i * 6;
        doc.setFont('helvetica', 'bold');
        doc.text(item[0], margin + 4, iy);
        doc.setFont('helvetica', 'normal');
        doc.text(item[1], margin + 35, iy);
      });
      y += boxH + 4;
    }

    // Tabla
    const colC = [margin, margin + 60, margin + 85, margin + 110, margin + 135, margin + 158];
    doc.setFillColor(...navy);
    doc.rect(margin, y, contentW, 8, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(7.5);
    doc.setFont('helvetica', 'bold');
    doc.text('PRODUCTO', colC[0] + 3, y + 5.5);
    doc.text('DOSIS/HA', colC[1] + 2, y + 5.5);
    doc.text('VOLUMEN', colC[2] + 2, y + 5.5);
    doc.text('PRECIO', colC[3] + 2, y + 5.5);
    doc.text('$/HA', colC[4] + 2, y + 5.5);
    doc.text('MONTO', colC[5] + 2, y + 5.5);
    y += 8;

    (h.lineas || []).forEach((l, i) => {
      if (y > 265) { doc.addPage(); y = 15; }
      if (i % 2 === 0) { doc.setFillColor(248, 250, 252); doc.rect(margin, y, contentW, 7, 'F'); }
      doc.setTextColor(...navy);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(7);
      const nombre = l.producto.length > 32 ? l.producto.substring(0, 30) + '...' : l.producto;
      doc.text(nombre, colC[0] + 3, y + 4.5);
      doc.setFontSize(7.5);
      doc.text(l.dosis + ' ' + (l.unidad || 'L'), colC[1] + 2, y + 4.5);
      doc.setTextColor(...gris);
      doc.text(l.vol || '—', colC[2] + 2, y + 4.5);
      doc.setTextColor(...navy);
      doc.text('$' + l.precio, colC[3] + 2, y + 4.5);
      doc.text('$' + l.costoHa, colC[4] + 2, y + 4.5);
      doc.setFont('helvetica', 'bold');
      doc.text(l.monto !== '—' ? '$' + l.monto : '—', colC[5] + 2, y + 4.5);
      y += 7;
    });

    // Totales
    y += 3;
    doc.setFillColor(...navy);
    doc.rect(margin, y, contentW, h.hectareas ? 22 : 12, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'normal');
    doc.text('Total/ha', margin + 4, y + 8);
    doc.text('USD ' + h.total, W - margin - 4, y + 8, { align: 'right' });
    if (h.hectareas) {
      doc.setFontSize(11);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(...accent);
      doc.text('TOTAL ' + h.hectareas + ' has', margin + 4, y + 18);
      doc.text('USD ' + h.totalHas, W - margin - 4, y + 18, { align: 'right' });
    }
    y += (h.hectareas ? 28 : 16);

    // Footer
    doc.setFontSize(7);
    doc.setTextColor(...gris);
    doc.setFont('helvetica', 'italic');
    doc.text('Precios expresados en USD. Sujetos a cambio sin previo aviso.', margin, y + 4);
    doc.text('Henderseeds SRL — ' + h.fecha, margin, y + 8);

    // Compartir o descargar
    const cliente = h.cliente || 'cotizacion';
    const fileName = 'Henderseeds_Cotizacion_' + (h.numero || '') + '_' + cliente.replace(/\s+/g, '_') + '.pdf';
    try {
      const pdfBlob = doc.output('blob');
      const file = new File([pdfBlob], fileName, { type: 'application/pdf' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'Cotización #' + h.numero });
      } else {
        doc.save(fileName);
      }
    } catch(err) {
      if (err.name !== 'AbortError') doc.save(fileName);
    }
  }
};

/* ══════════════════════════════════════
   CONDICIONES
   ══════════════════════════════════════ */
const Condiciones = {
  data: JSON.parse(localStorage.getItem('hs_condiciones_cache') || 'null'),
  fmtRate(v) {
    if (v === null || v === undefined || v === '') return '—';
    const n = Number(v);
    if (isNaN(n)) return String(v);
    if (n < 1) return (n * 100).toFixed(1) + '%';
    return n.toFixed(1) + '%';
  },
  async load() {
    if (this.data) { this.renderTable(); }
    if (!API_URL) return;
    try {
      const r = await fetch(API_URL + '?action=getCondiciones&_t=' + Date.now(), { cache: 'no-store' });
      const d = await r.json();
      if (Array.isArray(d) && d.length) {
        this.data = d;
        localStorage.setItem('hs_condiciones_cache', JSON.stringify(d));
        this.renderTable();
      } else if (!this.data) {
        $('condTable').innerHTML = '<p style="color:var(--text-mut);font-size:.75rem;">Sin condiciones disponibles</p>';
      }
    } catch(e) {
      if (!this.data) $('condTable').innerHTML = '<p style="color:var(--text-mut);font-size:.75rem;">Error al cargar condiciones</p>';
    }
  },
  buildTableHTML(data) {
    if(!data||!data.length) return '<p style="color:var(--text-mut);font-size:.75rem;">Sin condiciones cargadas</p>';
    const groups={};
    data.forEach(r=>{ const key=r.moneda||'Otro'; if(!groups[key])groups[key]=[]; groups[key].push(r); });
    let h='';
    Object.keys(groups).forEach(moneda=>{
      h+=`<div style="margin-bottom:12px;"><p style="margin:0 0 6px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);border-bottom:2px solid var(--accent);padding-bottom:4px;">${moneda}</p>`;
      h+='<table class="cond-table"><thead><tr><th>Detalle</th><th>TNA</th><th>TEA</th><th>Plazo</th></tr></thead><tbody>';
      groups[moneda].forEach((r,i)=>{
        const bg=i%2===0?'#fafbfc':'#fff';
        h+=`<tr style="background:${bg};"><td>${r.detalle||''}</td><td>${this.fmtRate(r.tna)}</td><td>${this.fmtRate(r.tea)}</td><td>${r.plazo||''}d</td></tr>`;
      });
      h+='</tbody></table></div>';
    });
    return h;
  },
  renderTable() { $('condTable').innerHTML=this.buildTableHTML(this.data); },
  async share() {
    if (!this.data) { await this.load(); }
    if (!this.data) return;
    $('cond-share-fecha').innerText = dateStr();
    $('cond-share-table').innerHTML = this.buildTableHTML(this.data);
    const card = $('cond-share-card');
    card.style.position = 'fixed'; card.style.left = '0'; card.style.top = '0'; card.style.zIndex = '9999';
    try {
      await captureAndShare($('cond-share-content'), 'Condiciones_Henderseeds.pdf', {share:true, pdf:true, title:'Condiciones Comerciales — Henderseeds'});
    } catch(e) { if (e.name !== 'AbortError') alert('Error al generar PDF'); }
    finally { card.style.position = 'absolute'; card.style.left = '-9999px'; card.style.zIndex = ''; }
  }
};

/* ══════════════════════════════════════
   APP
   ══════════════════════════════════════ */
let vendor = '';
const App = {
  selectVendor(name) {
    vendor = name;
    localStorage.setItem('vendedor', name);
    localStorage.setItem('henderseeds_vendor', name);
    $('currentVendor').textContent = name;
    $('vendor-overlay').classList.add('hidden');
  },
  changeVendor() { $('vendor-overlay').classList.remove('hidden'); },
  init() {
    const saved = localStorage.getItem('henderseeds_vendor') || localStorage.getItem('vendedor');
    if (saved) App.selectVendor(saved);
    if ($('displayDate')) $('displayDate').textContent = dateStr();

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        $('tab-' + btn.dataset.tab).classList.add('active');
        if (btn.dataset.tab === 'condiciones') Condiciones.load();
      });
    });

    document.addEventListener('click', e => {
      if (!e.target.closest('.row-new-search') && !e.target.closest('.app-dropdown')) App.hideDropdown();
      if (!e.target.closest('#cliente') && !e.target.closest('#cliente-dd')) App.hideClienteDD();
    });

    // Keyboard nav for cliente dropdown
    $('cliente').addEventListener('keydown', e => {
      const dd = $('cliente-dd');
      if (!dd.classList.contains('show')) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); App.moveClienteHighlight(1); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); App.moveClienteHighlight(-1); }
      else if (e.key === 'Enter') { e.preventDefault(); App.selectClienteHighlight(); }
      else if (e.key === 'Escape') { App.hideClienteDD(); }
    });

    App.addAplicacion();
    // Render lista immediately with cached data, refresh in background
    App.renderLista(plazoActual);
    Market.init();

    // Auto-load historial when scrolled into view
    const histCard = $('hist-inline-card');
    if (histCard) {
      let histLoaded = false;
      const obs = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting && !histLoaded) {
          histLoaded = true;
          Historial.cargar();
        }
      }, { threshold: 0.1 });
      obs.observe(histCard);
    }
  },

  /* ── Render plazos dinámicos (si vienen de Sheets) ── */
  renderPlazos() {
    const bars = document.querySelectorAll('.plazo-bar');
    bars.forEach(bar => {
      bar.innerHTML = financiacion.map((f, i) => {
        const active = f.plazo === plazoActual ? ' active' : '';
        const small = f.recargo_pct > 0 ? `<small>+${f.recargo_pct}%</small>` : '<small>0%</small>';
        const handler = bar.closest('#tab-cotizar') ? `App.setPlazo(this)` : `App.setListaPlazo(this)`;
        return `<button class="plazo-chip${active}" data-plazo="${f.plazo}" onclick="${handler}">${f.label} ${small}</button>`;
      }).join('');
    });
  },

  /* ── Ref panel toggle (mobile) ── */
  toggleRef() {
    const p = $('ref-panel');
    const isOpen = p.classList.toggle('open');
    $('ref-toggle').textContent = isOpen ? 'Ocultar tabla de referencia' : 'Ver tabla de precios de referencia';
  },

  /* ── Render tabla de referencia ── */
  renderRef() {
    const q = ($('ref-filter')?.value || '').toLowerCase().trim();
    let html = '';

    Object.entries(catalogo).forEach(([cat, prods]) => {
      const filtered = prods.filter(p =>
        !q ||
        p.producto.toLowerCase().includes(q) ||
        cat.toLowerCase().includes(q) ||
        (p.formulacion && p.formulacion.toLowerCase().includes(q)) ||
        (p.proveedor && p.proveedor.toLowerCase().includes(q))
      );
      if (!filtered.length) return;
      html += `<tr class="cat-row"><td colspan="7">${cat}</td></tr>`;
      filtered.forEach(p => {
        const stockClass = p.stock > 0 ? 'color:var(--green)' : 'color:var(--text-mut)';
        html += `<tr>
          <td class="prod-name">${p.producto}</td>
          <td class="droga">${p.formulacion || '—'}</td>
          <td class="prov">${(p.proveedor || '').replace(/ S\.A\.?/g, '')}</td>
          <td class="num precio-col">$${fmt(p.precio_usd)}</td>
          <td class="num">${p.presentacion || '—'}</td>
          <td class="num">${p.margen_pct || 0}%</td>
          <td class="num" style="${stockClass}">${p.stock || 0}</td>
        </tr>`;
      });
    });

    $('ref-tbody').innerHTML = html;
  },

  /* ── Plazo ── */
  setModo(el) {
    document.querySelectorAll('#tab-cotizar .plazo-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    const modo = el.dataset.modo;
    plazoActual = modo;
    const finConfig = $('fin-config');
    if (modo === 'financiacion') {
      finConfig.style.display = 'flex';
      if (!$('fin-fecha').value) {
        // Default: 3 meses adelante
        const d = new Date();
        d.setMonth(d.getMonth() + 3);
        $('fin-fecha').value = d.toISOString().slice(0, 7);
      }
      App.calcFinanciacion();
    } else {
      finConfig.style.display = 'none';
    }
    App.renderAplicaciones();
  },
  calcFinanciacion() {
    const fechaStr = $('fin-fecha').value;
    if (!fechaStr) return;
    const tasa = parseFloat($('fin-tasa').value) || 0.75;
    const fecha = new Date(fechaStr + '-01');
    const hoy = new Date();
    const meses = Math.max(0, (fecha.getFullYear() - hoy.getFullYear()) * 12 + (fecha.getMonth() - hoy.getMonth()));
    const recargo = tasa * meses;
    $('fin-info').textContent = meses + ' meses · +' + recargo.toFixed(1) + '%';
    App.renderAplicaciones();
  },
  getRecargo() {
    if (plazoActual !== 'financiacion') return 0;
    const fechaStr = $('fin-fecha').value;
    if (!fechaStr) return 0;
    const tasa = (parseFloat($('fin-tasa').value) || 0.75) / 100;
    const fecha = new Date(fechaStr + '-01');
    const hoy = new Date();
    const meses = Math.max(0, (fecha.getFullYear() - hoy.getFullYear()) * 12 + (fecha.getMonth() - hoy.getMonth()));
    return tasa * meses;
  },

  /* ── Aplicaciones CRUD ── */
  addAplicacion() {
    appId++;
    aplicaciones.push({ id: appId, establecimiento: '', hectareas: 0, rows: [], collapsed: false });
    App.renderAplicaciones();
  },
  removeAplicacion(aid) {
    if (aplicaciones.length <= 1) return;
    aplicaciones = aplicaciones.filter(a => a.id !== aid);
    App.renderAplicaciones();
  },
  toggleCollapse(aid) {
    const app = aplicaciones.find(a => a.id === aid);
    if (app) { app.collapsed = !app.collapsed; App.renderAplicaciones(); }
  },
  updateAppField(aid, field, val) {
    const app = aplicaciones.find(a => a.id === aid);
    if (!app) return;
    if (field === 'hectareas') {
      app.hectareas = parseFloat(val) || 0;
      // Update row values inline without full re-render (keeps focus)
      const has = app.hectareas;
      const recargo = App.getRecargo();
      const appBlock = document.querySelector(`.app-block[data-appid="${aid}"]`);
      if (appBlock) {
        app.rows.forEach(r => {
          const rowEl = appBlock.querySelector(`[data-rowid="${r.id}"]`);
          if (!rowEl) return;
          const precioF = r.precio * (1 + recargo);
          const costoHa = precioF * r.dosis;
          const volumen = has > 0 ? r.dosis * has : null;
          const monto = has > 0 ? costoHa * has : null;
          const vals = rowEl.querySelectorAll('.row-val');
          if (vals[1]) vals[1].textContent = volumen ? fmt(volumen) : '—';
          if (vals[2]) vals[2].textContent = fmt(costoHa);
          if (vals[3]) vals[3].textContent = monto ? fmt(monto) : '—';
        });
      }
      App.renderConsolidado();
    } else {
      app[field] = val;
      // Update title inline
      const appBlock = document.querySelector(`.app-block[data-appid="${aid}"]`);
      if (appBlock) {
        const title = appBlock.querySelector('.app-title');
        if (title) title.textContent = val || ('Aplicación ' + (aplicaciones.indexOf(app) + 1));
      }
    }
  },

  /* ── Dropdown (multi-app) ── */
  showDropdown(aid) {
    activeDropdownApp = aid;
    App.filterDropdown(aid);
    const dd = $('dropdown-' + aid);
    if (dd) dd.classList.add('show');
  },
  hideDropdown() {
    if (activeDropdownApp !== null) {
      const dd = $('dropdown-' + activeDropdownApp);
      if (dd) dd.classList.remove('show');
    }
    // Also hide any visible dropdown
    document.querySelectorAll('.app-dropdown .dropdown.show').forEach(d => d.classList.remove('show'));
    highlightIdx = -1;
    activeDropdownApp = null;
  },
  filterDropdown(aid) {
    if (aid === undefined) aid = activeDropdownApp;
    if (aid === null) return;
    const searchEl = $('search-' + aid);
    const ddEl = $('dropdown-' + aid);
    if (!searchEl || !ddEl) return;
    const q = searchEl.value.toLowerCase().trim();
    let html = '';
    ddItems = [];
    Object.entries(catalogo).forEach(([cat, prods]) => {
      const filtered = prods.filter(p =>
        p.producto.toLowerCase().includes(q) ||
        cat.toLowerCase().includes(q) ||
        (p.formulacion && p.formulacion.toLowerCase().includes(q)) ||
        (p.proveedor && p.proveedor.toLowerCase().includes(q))
      );
      if (!filtered.length) return;
      html += `<div class="dd-cat">${cat}</div>`;
      filtered.forEach(p => {
        const idx = ddItems.length;
        ddItems.push({ ...p, cat });
        html += `<div class="dd-item" onclick="App.selectFromDropdown(${aid},${idx})">
          <div>
            <span style="font-weight:600;">${esc(p.producto)}</span>
            <span style="font-size:10px; color:var(--text-mut);"> · ${esc((p.proveedor||'').replace(/ S\.A\.?/g,''))}</span>
          </div>
          <div class="dd-item-price">$${fmt(p.precio_usd)}/${p.unidad||'U'}</div>
        </div>`;
      });
    });
    const nombreManual = searchEl.value.trim();
    if (nombreManual) {
      html += `<div class="dd-item dd-add" onclick="App.addManual(${aid},'${nombreManual.replace(/'/g, "\\'")}')">
        <span style="color:var(--accent); font-weight:700;">+ Agregar "${esc(nombreManual)}" manualmente</span>
      </div>`;
    }
    if (!html) html = '<div style="padding:12px; color:var(--text-mut); font-size:13px;">Escribí para buscar o agregar</div>';
    ddEl.innerHTML = html;
    ddEl.classList.add('show');
    highlightIdx = -1;
  },
  moveHighlight(dir) {
    if (!ddItems.length || activeDropdownApp === null) return;
    highlightIdx = Math.max(0, Math.min(ddItems.length - 1, highlightIdx + dir));
    const dd = $('dropdown-' + activeDropdownApp);
    if (!dd) return;
    dd.querySelectorAll('.dd-item').forEach((el, i) => el.classList.toggle('highlighted', i === highlightIdx));
    const el = dd.querySelector('.dd-item.highlighted');
    if (el) el.scrollIntoView({ block: 'nearest' });
  },

  selectFromDropdown(aid, idx) {
    const p = ddItems[idx];
    if (!p) return;
    const app = aplicaciones.find(a => a.id === aid);
    if (!app) return;
    App.hideDropdown();
    const searchEl = $('search-' + aid);
    if (searchEl) searchEl.value = '';

    rowId++;
    app.rows.push({
      id: rowId,
      producto: p.producto,
      cat: p.cat,
      precio: p.precio_usd,
      unidad: p.unidad || 'L',
      dosis: p.dosis_sug || 0,
      iva_pct: p.iva_pct,
      proveedor: p.proveedor || '',
      costo_usd: p.costo_usd || 0,
      margen_pct: p.margen_pct || 0,
      precio_margen: p.precio_usd || 0,
      formulacion: p.formulacion || '',
      presentacion: p.presentacion || 0
    });
    App.renderAplicaciones();
    setTimeout(() => {
      const lastRow = document.querySelector(`[data-rowid="${rowId}"]`);
      if (lastRow) { const inps = lastRow.querySelectorAll('.row-inp'); if (inps[1]) { inps[1].focus(); inps[1].select(); } }
      else { var si = document.getElementById('search-' + aid); if (si) si.focus(); }
    }, 50);
  },

  addManual(aid, nombre) {
    const app = aplicaciones.find(a => a.id === aid);
    if (!app) return;
    App.hideDropdown();
    const searchEl = $('search-' + aid);
    if (searchEl) searchEl.value = '';

    rowId++;
    app.rows.push({
      id: rowId,
      producto: nombre,
      cat: 'Otros',
      precio: 0,
      unidad: 'L',
      dosis: 1,
      iva_pct: 21,
      proveedor: '',
      costo_usd: 0,
      margen_pct: 0,
      precio_margen: 0,
      formulacion: '',
      presentacion: 0
    });
    App.renderAplicaciones();
    setTimeout(() => {
      const lastRow = document.querySelector(`[data-rowid="${rowId}"]`);
      if (lastRow) { const inps = lastRow.querySelectorAll('.row-inp'); if (inps[0]) { inps[0].focus(); inps[0].select(); } }
      else { var si = document.getElementById('search-' + aid); if (si) si.focus(); }
    }, 50);
  },

    App.renderConsolidado();

  updateField(aid, rid, field, val) {
    const app = aplicaciones.find(a => a.id === aid);
    if (!app) return;
    const r = app.rows.find(r => r.id === rid);
    if (!r) return;
    r[field] = parseFloat(val) || 0;

    const has = app.hectareas || 0;
    const recargo = App.getRecargo();

    // Recalc app totals
    let netoHa = 0, ivaHa = 0;
    app.rows.forEach(r => {
      const precioF = r.precio * (1 + recargo);
      const costoHa = precioF * r.dosis;
      netoHa += costoHa;
      ivaHa += costoHa * (r.iva_pct / 100);
    });

    // Update row DOM — find .row-val elements by position
    const rowEl = document.querySelector(`[data-rowid="${rid}"]`);
    if (rowEl) {
      const precioF = r.precio * (1 + recargo);
      const costoHa = precioF * r.dosis;
      const volumen = has > 0 ? r.dosis * has : null;
      const monto = has > 0 ? costoHa * has : null;
      const vals = rowEl.querySelectorAll('.row-val');
      // With financiacion: [0]=sug, [1]=pfin, [2]=vol, [3]=costo, [4]=monto
      // Without: [0]=sug, [1]=vol, [2]=costo, [3]=monto
      const offset = recargo > 0 ? 1 : 0;
      if (recargo > 0 && vals[1]) vals[1].textContent = '$' + fmt(precioF);
      if (vals[1 + offset]) vals[1 + offset].textContent = volumen ? fmt(volumen) : '—';
      if (vals[2 + offset]) vals[2 + offset].textContent = fmt(costoHa);
      if (vals[3 + offset]) vals[3 + offset].textContent = monto ? fmt(monto) : '—';
    }

    App.renderConsolidado();
  },

  removeRow(aid, rid) {
    const app = aplicaciones.find(a => a.id === aid);
    if (!app) return;
    app.rows = app.rows.filter(r => r.id !== rid);
    App.renderAplicaciones();
  },

  /* ── Consolidated summary ── */
  renderConsolidado() {
    const el = $('resumen-consolidado');
    const appsWithRows = aplicaciones.filter(a => a.rows.length > 0);
    if (!appsWithRows.length) { el.style.display = 'none'; return; }

    const recargo = App.getRecargo();
    let grandNeto = 0, grandIva = 0;

    // Group products across apps: sum vol, precio promedio ponderado, monto total
    const productMap = {};
    aplicaciones.forEach(app => {
      const has = app.hectareas || 0;
      app.rows.forEach(r => {
        const precioF = r.precio * (1 + recargo);
        const vol = has > 0 ? r.dosis * has : 0;
        const monto = precioF * vol;
        grandNeto += monto;
        grandIva += monto * (r.iva_pct / 100);
        const key = r.producto;
        if (!productMap[key]) productMap[key] = { producto: r.producto, unidad: r.unidad || 'L', totalVol: 0, precio: precioF, totalMonto: 0 };
        productMap[key].totalVol += vol;
        productMap[key].totalMonto += monto;
        productMap[key].precio = precioF; // last price (usually same)
      });
    });

    let html = '<div class="resumen-card">';
    html += '<div class="resumen-title">Resumen</div>';
    // Header
    html += `<div class="resumen-row" style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--text-sec);border-bottom:1.5px solid var(--border);padding-bottom:4px;">
      <span>Producto</span>
      <span style="text-align:right;">Volumen</span>
      <span style="text-align:right;">Precio</span>
      <span style="text-align:right;">Monto s/IVA</span>
    </div>`;
    Object.values(productMap).forEach(p => {
      html += `<div class="resumen-row">
        <span style="font-weight:600;font-size:.78rem;">${esc(p.producto)}</span>
        <span style="font-family:var(--mono);font-weight:600;text-align:right;">${p.totalVol > 0 ? fmt(p.totalVol) + ' ' + p.unidad : '—'}</span>
        <span style="font-family:var(--mono);text-align:right;">$${fmt(p.precio)}</span>
        <span style="font-family:var(--mono);font-weight:600;text-align:right;">${p.totalMonto > 0 ? '$' + fmt(p.totalMonto) : '—'}</span>
      </div>`;
    });
    html += `<div class="resumen-row" style="border-top:2px solid var(--accent-border);margin-top:6px;padding-top:8px;font-weight:700;">
      <span>TOTAL (s/IVA)</span><span></span><span></span>
      <span style="font-family:var(--mono);color:var(--navy);text-align:right;font-size:.92rem;">USD ${fmt(grandNeto)}</span>
    </div>`;
    html += `<div class="resumen-row" style="font-weight:700;">
      <span>TOTAL (c/IVA)</span><span></span><span></span>
      <span style="font-family:var(--mono);color:var(--accent);text-align:right;font-size:1rem;">USD ${fmt(grandNeto + grandIva)}</span>
    </div>`;
    html += '</div>';
    el.innerHTML = html;
    el.style.display = 'block';
  },

  async _registrarYGuardar(modo) {
    const firstApp = aplicaciones[0] || { hectareas: 0, establecimiento: '', rows: [] };
    const has = firstApp.hectareas;
    const fin = financiacion.find(f => f.plazo === plazoActual);
    const allRows = aplicaciones.flatMap(a => a.rows);
    let totalHa = 0;
    const lineas = allRows.map(r => {
      const precioP = r.precio * (1 + App.getRecargo() / 100);
      const costoHa = precioP * r.dosis;
      const vol = has > 0 ? r.dosis * has : null;
      const monto = has > 0 ? precioP * r.dosis * has : null;
      totalHa += costoHa;
      return { producto: r.producto, dosis: r.dosis, unidad: r.unidad, precio: fmt(precioP), costoHa: fmt(costoHa), vol: vol ? fmt(vol) : '—', monto: monto ? fmt(monto) : '—' };
    });
    // Save local backup immediately (before network call)
    const localId = 'agro_'+Date.now();
    const backup = {
      localId,
      fecha: dateStr(),
      vendedor: vendor,
      cliente: $('cliente').value||'—',
      items: lineas,
      synced: false
    };
    LocalBackup.save(backup);

    // Registrar en Sheets
    let numero = '—';
    try {
      const result = await Market.registrarCotizacion();
      if (result && result.ok) { numero = result.numero; LocalBackup.markSynced(localId); }
    } catch(e) { console.error(e); }
    // Recargar historial desde Sheets
    Historial.recargar();
  },

  async guardarCotizacion() {
    const allRows = aplicaciones.flatMap(a => a.rows);
    if (!allRows.length) { alert('Sin productos cargados'); return; }
    if (!$('cliente').value.trim()) { alert('Falta cliente'); return; }
    const btn = $('btnSaveAgroInline');
    const orig = btn.innerHTML;
    btn.disabled = true; btn.innerHTML = '⏳ Guardando...';
    try {
      await App._registrarYGuardar('cotizacion');
      alert('Cotización guardada en Sheets');
    } catch(e) {
      alert('Error: ' + e.message);
    } finally {
      btn.disabled = false; btn.innerHTML = orig;
    }
  },

  /* ── PDF profesional (multi-aplicacion) ── */
  generarPDF(modo) {
    const esReceta = modo === 'receta';
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const W = 210, margin = 15;
    const contentW = W - margin * 2;
    let y = 0;

    const navy = [30, 41, 59];
    const gris = [100, 116, 139];
    const black = [0, 0, 0];

    // ── Header (blanco, compacto) ──
    // Logo a la derecha
    if (logoDataUrl) {
      const logoW = 26, logoH = logoW / 2.51;
      try { doc.addImage(logoDataUrl, 'PNG', W - margin - logoW, 6, logoW, logoH); } catch(e) {}
    }
    // Cliente a la izquierda, fecha debajo
    const cliente = $('cliente').value || '';
    doc.setTextColor(...navy);
    doc.setFontSize(11);
    doc.setFont('helvetica', 'bold');
    doc.text(cliente || '—', margin, 12);
    doc.setFontSize(7.5);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(...gris);
    doc.text(dateStr(), margin, 17);
    // Línea separadora
    doc.setDrawColor(200, 200, 200);
    doc.setLineWidth(0.3);
    doc.line(margin, 20, W - margin, 20);
    y = 23;

    // ── Loop through each aplicacion ──
    let grandTotalHa = 0, grandTotalIvaHa = 0;
    // Collect retiro data for consolidated summary
    const retiroMap = {};

    aplicaciones.forEach((app, appIdx) => {
      if (!app.rows.length) return;
      const has = app.hectareas || 0;
      const appLabel = app.establecimiento || ('Aplicación ' + (appIdx + 1));

      // Sub-header compacto (línea fina, no bloque grande)
      if (y > 260) { doc.addPage(); y = 12; }
      doc.setDrawColor(180, 180, 180);
      doc.setLineWidth(0.2);
      doc.line(margin, y, W - margin, y);
      y += 3;
      doc.setTextColor(...navy);
      doc.setFontSize(7.5);
      doc.setFont('helvetica', 'bold');
      doc.text(appLabel.toUpperCase() + (has > 0 ? '  —  ' + has + ' has' : ''), margin, y + 1);
      y += 4;

      if (esReceta) {
        const colR = [margin, margin + 78, margin + 108, margin + 142];
        // Header de tabla (gris oscuro, compacto)
        doc.setFillColor(60, 60, 60);
        doc.rect(margin, y, contentW, 6, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(6.5);
        doc.setFont('helvetica', 'bold');
        doc.text('PRODUCTO', colR[0] + 2, y + 4);
        doc.text('DOSIS/HA', colR[1] + 2, y + 4);
        doc.text('VOLUMEN', colR[2] + 2, y + 4);
        doc.text('FORMULACIÓN', colR[3] + 2, y + 4);
        y += 6;

        app.rows.forEach((r, i) => {
          if (y > 272) { doc.addPage(); y = 12; }
          const vol = has > 0 ? r.dosis * has : null;
          if (i % 2 === 0) { doc.setFillColor(245, 245, 245); doc.rect(margin, y, contentW, 5.5, 'F'); }
          doc.setTextColor(...black);
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(7);
          const nombre = r.producto.length > 40 ? r.producto.substring(0, 38) + '...' : r.producto;
          doc.text(nombre, colR[0] + 2, y + 3.8);
          doc.text(r.dosis + ' ' + (r.unidad||'L') + '/ha', colR[1] + 2, y + 3.8);
          doc.setFont('helvetica', 'bold');
          doc.text(vol ? fmt(vol) + ' ' + (r.unidad||'L') : '—', colR[2] + 2, y + 3.8);
          doc.setFont('helvetica', 'normal');
          doc.setTextColor(...gris);
          doc.text(r.formulacion || '—', colR[3] + 2, y + 3.8);
          y += 5.5;
          // Accumulate retiro
          const key = r.producto;
          if (!retiroMap[key]) retiroMap[key] = { producto: r.producto, unidad: r.unidad || 'L', totalVol: 0 };
          if (vol) retiroMap[key].totalVol += vol;
        });
      } else {
        const pdfRecargo = App.getRecargo();
        const colC = pdfRecargo > 0
          ? [margin, margin + 56, margin + 76, margin + 96, margin + 116, margin + 138, margin + 158]
          : [margin, margin + 62, margin + 86, margin + 110, margin + 134, margin + 158];
        doc.setFillColor(60, 60, 60);
        doc.rect(margin, y, contentW, 6, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(6.5);
        doc.setFont('helvetica', 'bold');
        if (pdfRecargo > 0) {
          doc.text('PRODUCTO', colC[0] + 2, y + 4);
          doc.text('DOSIS/HA', colC[1] + 2, y + 4);
          doc.text('VOLUMEN', colC[2] + 2, y + 4);
          doc.text('CONTADO', colC[3] + 2, y + 4);
          doc.text('FINANC.', colC[4] + 2, y + 4);
          doc.text('$/HA', colC[5] + 2, y + 4);
          doc.text('MONTO', colC[6] + 2, y + 4);
        } else {
          doc.text('PRODUCTO', colC[0] + 2, y + 4);
          doc.text('DOSIS/HA', colC[1] + 2, y + 4);
          doc.text('VOLUMEN', colC[2] + 2, y + 4);
          doc.text('PRECIO', colC[3] + 2, y + 4);
          doc.text('$/HA', colC[4] + 2, y + 4);
          doc.text('MONTO', colC[5] + 2, y + 4);
        }
        y += 6;

        let appTotalHa = 0, appTotalIvaHa = 0;

        app.rows.forEach((r, i) => {
          if (y > 272) { doc.addPage(); y = 12; }
          const precioContado = r.precio;
          const precioFin = r.precio * (1 + pdfRecargo);
          const precioActivo = pdfRecargo > 0 ? precioFin : precioContado;
          const costoHa = precioActivo * r.dosis;
          const vol = has > 0 ? r.dosis * has : null;
          const monto = has > 0 ? precioActivo * r.dosis * has : null;
          appTotalHa += costoHa;
          appTotalIvaHa += costoHa * (r.iva_pct / 100);

          if (i % 2 === 0) { doc.setFillColor(245, 245, 245); doc.rect(margin, y, contentW, 5.5, 'F'); }
          doc.setTextColor(...black);
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(6.5);
          const nombre = r.producto.length > 34 ? r.producto.substring(0, 32) + '...' : r.producto;
          doc.text(nombre, colC[0] + 2, y + 3.8);
          doc.setFontSize(7);
          doc.text(r.dosis + ' ' + (r.unidad||'L'), colC[1] + 2, y + 3.8);
          doc.setTextColor(...gris);
          doc.text(vol ? fmt(vol) + ' ' + (r.unidad||'L') : '—', colC[2] + 2, y + 3.8);
          doc.setTextColor(...black);
          doc.text('$' + fmt(precioContado), colC[3] + 2, y + 3.8);
          if (pdfRecargo > 0) {
            doc.setTextColor(45, 111, 196);
            doc.text('$' + fmt(precioFin), colC[4] + 2, y + 3.8);
            doc.setTextColor(...black);
            doc.text('$' + fmt(costoHa), colC[5] + 2, y + 3.8);
            doc.setFont('helvetica', 'bold');
            doc.text(monto ? '$' + fmt(monto) : '—', colC[6] + 2, y + 3.8);
          } else {
            doc.text('$' + fmt(costoHa), colC[4] + 2, y + 3.8);
            doc.setFont('helvetica', 'bold');
            doc.text(monto ? '$' + fmt(monto) : '—', colC[5] + 2, y + 3.8);
          }
          y += 5.5;
          // Accumulate retiro
          const key = r.producto;
          if (!retiroMap[key]) retiroMap[key] = { producto: r.producto, unidad: r.unidad || 'L', totalVol: 0 };
          if (vol) retiroMap[key].totalVol += vol;
        });

        grandTotalHa += appTotalHa * (has > 0 ? has : 1);
        grandTotalIvaHa += appTotalIvaHa * (has > 0 ? has : 1);
      }

      y += 2; // spacing between apps
    });

    // ── Resumen de retiro (SIEMPRE si hay productos con volumen) ──
    const retiroProducts = Object.values(retiroMap).filter(p => p.totalVol > 0);
    if (retiroProducts.length > 0) {
      if (y > 250) { doc.addPage(); y = 12; }
      y += 2;
      doc.setDrawColor(120, 120, 120);
      doc.setLineWidth(0.3);
      doc.line(margin, y, W - margin, y);
      y += 4;
      doc.setTextColor(...navy);
      doc.setFontSize(7.5);
      doc.setFont('helvetica', 'bold');
      doc.text('RETIRO TOTAL', margin, y);
      y += 3;
      retiroProducts.forEach((p, i) => {
        if (y > 278) { doc.addPage(); y = 12; }
        if (i % 2 === 0) { doc.setFillColor(245, 245, 245); doc.rect(margin, y, contentW, 5, 'F'); }
        doc.setTextColor(...black);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(7);
        doc.text(p.producto, margin + 2, y + 3.5);
        doc.setFont('helvetica', 'bold');
        doc.text(fmt(p.totalVol) + ' ' + p.unidad, W - margin - 4, y + 3.5, { align: 'right' });
        y += 5;
      });
      y += 2;
    }

    // ── Grand total (if 2+ apps, cotizacion mode) ──
    if (!esReceta && aplicaciones.filter(a => a.rows.length > 0).length >= 2) {
      if (y > 265) { doc.addPage(); y = 12; }
      doc.setFillColor(30, 41, 59);
      doc.rect(margin, y, contentW, 8, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'bold');
      doc.text('TOTAL GENERAL (c/IVA)', margin + 3, y + 5.5);
      doc.text('USD ' + fmt(grandTotalHa + grandTotalIvaHa), W - margin - 4, y + 5.5, { align: 'right' });
      y += 12;
    }

    // ── Footer ──
    if (y > 275) { doc.addPage(); y = 15; }
    doc.setFontSize(7);
    doc.setTextColor(...gris);
    doc.setFont('helvetica', 'italic');
    doc.text('Henderseeds SRL — ' + dateStr(), margin, y + 6);

    return doc;
  },

  async compartirPDF(modo) {
    if (!aplicaciones.some(a => a.rows.length > 0)) return;
    const esReceta = modo === 'receta';
    const btnSelector = esReceta ? '#acciones-inline .btn-outline' : '#acciones-inline .btn-green';
    const btn = document.querySelector(btnSelector);
    if (!btn) return;
    const origText = btn.textContent;
    btn.textContent = 'Generando...';
    btn.disabled = true;

    try {
      const doc = App.generarPDF(modo);
      const cliente = $('cliente').value || (esReceta ? 'receta' : 'cotizacion');
      const prefix = esReceta ? 'Receta' : 'Cotizacion';
      const fileName = 'Henderseeds_' + prefix + '_' + cliente.replace(/\s+/g, '_') + '_' + dateStr().replace(/\//g, '-') + '.pdf';
      const pdfBlob = doc.output('blob');
      const file = new File([pdfBlob], fileName, { type: 'application/pdf' });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({
          files: [file],
          title: (esReceta ? 'Receta' : 'Cotización') + ' Henderseeds',
          text: (esReceta ? 'Receta' : 'Cotización') + ' ' + cliente
        });
      } else {
        doc.save(fileName);
      }
    } catch (err) {
      if (err.name === 'AbortError') {
        return; // User cancelled — do not register
      }
      console.error('Error compartiendo PDF:', err);
      try {
        const doc = App.generarPDF(modo);
        doc.save('Henderseeds_' + (esReceta ? 'Receta' : 'Cotizacion') + '.pdf');
      } catch(e) { console.error(e); }
    } finally {
      btn.textContent = origText;
      btn.disabled = false;
    }

    // Registrar en Sheets e historial
    App._registrarYGuardar(modo);
  },

  /* ── Clientes ── */
  filterClientes(showAll) {
    const q = $('cliente').value.trim().toLowerCase();
    const dd = $('cliente-dd');
    if (!clientes.length) { dd.classList.remove('show'); return; }
    clienteMatches = q
      ? clientes.filter(c => c.nombre.toLowerCase().includes(q)).slice(0, 30)
      : (showAll ? clientes.slice(0, 30) : []);
    if (!clienteMatches.length && !q) { dd.classList.remove('show'); return; }
    let html = clienteMatches.map((c, i) =>
      `<div class="dd-item${i === clienteHighlight ? ' highlighted' : ''}" onclick="App.selectCliente('${c.nombre.replace(/'/g, "\\'")}')">
        <span>${esc(c.nombre)}</span>
        <span style="font-size:11px;color:var(--text-mut);">${esc(c.cuit || '')}</span>
      </div>`
    ).join('');
    if (q && (!clienteMatches.length || !clienteMatches.some(c => c.nombre.toLowerCase() === q))) {
      html += `<div class="dd-item dd-add" onclick="App.addCliente()">+ Agregar "${esc($('cliente').value.trim())}"</div>`;
    }
    dd.innerHTML = html;
    dd.classList.add('show');
    clienteHighlight = -1;
  },
  moveClienteHighlight(dir) {
    if (!clienteMatches.length) return;
    clienteHighlight = Math.max(0, Math.min(clienteMatches.length - 1, clienteHighlight + dir));
    $('cliente-dd').querySelectorAll('.dd-item').forEach((el, i) => el.classList.toggle('highlighted', i === clienteHighlight));
    const el = $('cliente-dd').querySelector('.dd-item.highlighted');
    if (el) el.scrollIntoView({ block: 'nearest' });
  },
  selectClienteHighlight() {
    if (clienteHighlight >= 0 && clienteHighlight < clienteMatches.length) {
      App.selectCliente(clienteMatches[clienteHighlight].nombre);
    }
  },
  selectCliente(nombre) {
    $('cliente').value = nombre;
    $('cliente-dd').classList.remove('show');
    clienteHighlight = -1;
  },
  hideClienteDD() {
    $('cliente-dd').classList.remove('show');
    clienteHighlight = -1;
  },
  async addCliente() {
    const nombre = $('cliente').value.trim();
    if (!nombre) return;
    $('cliente-dd').classList.remove('show');
    clientes.push({ nombre, localidad: '' });
    if (API_URL) {
      try {
        await Market.post({ action: 'addCliente', nombre });
        console.log('Cliente agregado a Sheets:', nombre);
      } catch (err) { console.error('Error agregando cliente:', err); }
    }
  },

  /* ── Lista ── */
  setListaPlazo(el) {
    document.querySelectorAll('#tab-lista .plazo-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    App.renderLista(el.dataset.plazo);
  },
  renderLista(plazo) {
    // Use current active plazo if not passed
    if (!plazo) {
      const activeChip = document.querySelector('#tab-lista .plazo-chip.active');
      plazo = activeChip ? activeChip.dataset.plazo : 'contado';
    }
    const q = ($('lista-search') ? $('lista-search').value : '').toLowerCase().trim();
    // Agrupar todos los productos por proveedor
    const porProveedor = {};
    Object.entries(catalogo).forEach(([cat, prods]) => {
      prods.forEach(p => {
        // Filter by search
        if (q && !p.producto.toLowerCase().includes(q) && !(p.formulacion||'').toLowerCase().includes(q) && !cat.toLowerCase().includes(q) && !(p.proveedor||'').toLowerCase().includes(q)) return;
        const prov = p.proveedor || 'Sin proveedor';
        if (!porProveedor[prov]) porProveedor[prov] = [];
        porProveedor[prov].push({ ...p, categoria: cat });
      });
    });
    const proveedores = Object.keys(porProveedor).sort();
    let html = '';
    proveedores.forEach(prov => {
      html += `<div class="lista-cat">${prov}</div>`;
      porProveedor[prov].forEach(p => {
        const precio = Calc.precioConRecargo(p.precio_usd, plazo);
        const mg = Number(p.margen_pct) || 0;
        const mgColor = mg >= 25 ? '#16a34a' : mg >= 15 ? '#d97706' : '#dc2626';
        const costo = Number(p.costo_usd) || 0;
        const pSug = Number(p.precio_usd) || 0;
        const diff = precio - pSug;
        const diffTxt = diff > 0.01 ? `<span style="font-size:9px;color:#16a34a;">+${fmt(diff)}</span>` : diff < -0.01 ? `<span style="font-size:9px;color:#dc2626;">${fmt(diff)}</span>` : '';
        html += `<div class="lista-row" style="display:grid;grid-template-columns:1fr 62px 46px 62px 72px;gap:8px;align-items:center;">
          <div style="min-width:0;">
            <div class="lista-name">${p.producto}</div>
            <div class="lista-unit">${p.categoria} · ${p.unidad}${p.formulacion ? ' · '+p.formulacion : ''}</div>
          </div>
          <span style="text-align:right;font-family:var(--mono);font-size:12px;color:#475569;">$${fmt(costo)}</span>
          <span style="text-align:center;font-family:var(--mono);font-size:12px;font-weight:700;color:#16a34a;">${mg}%</span>
          <span style="text-align:right;font-family:var(--mono);font-size:12px;color:#475569;">$${fmt(pSug)}</span>
          <span style="text-align:right;">
            <span class="lista-price" style="font-size:13px;">$${fmt(precio)}</span>
            ${diffTxt}
          </span>
        </div>`;
      });
    });
    if (!html && q) html = '<div style="padding:20px;text-align:center;color:var(--text-mut);font-size:.82rem;">Sin resultados para "' + q + '"</div>';
    $('lista-body').innerHTML = html;
  }
};
App._debouncedFilterClientes = debounce(() => App.filterClientes(), 200);
App._debouncedFilterDropdown = debounce((aid) => App.filterDropdown(aid), 200);
App._debouncedUpdateField = debounce((aid, rid, field, val) => App.updateField(aid, rid, field, val), 150);

document.addEventListener('DOMContentLoaded', App.init);
</script>
</body>
</html>
